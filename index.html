<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evaluación de Proyectos — Servimeters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
:root {
  --bg: #0f1419; --bg-elevated: #1a212b; --bg-panel: #131920;
  --border: #232b36; --text: #e4e7eb; --text-muted: #8892a0;
  --accent: #4f9eff; --accent-strong: #6bb1ff;
  --success: #4caf50; --warning: #ffa726; --danger: #ef5350; --info: #a78bfa;
  --radius: 8px; --shadow: 0 2px 8px rgba(0,0,0,0.3);
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; line-height: 1.5;
}
button, select, input { font-family: inherit; }
.app {
  display: grid;
  grid-template-columns: 240px 1fr;
  grid-template-rows: 60px 1fr;
  grid-template-areas: "sidebar topbar" "sidebar main";
  min-height: 100vh;
}
.topbar {
  grid-area: topbar; background: var(--bg-elevated);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; font-weight: 600;
}
.topbar-right { display: flex; gap: 16px; align-items: center; font-weight: 400; font-size: 0.9rem; color: var(--text-muted); }
.scenario-selector, select {
  background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 12px; font-size: 0.9rem;
}
.save-badge {
  padding: 4px 10px; border-radius: 12px;
  font-size: 0.8rem; font-weight: 600;
}
.save-badge.clean { background: rgba(76,175,80,0.15); color: var(--success); }
.save-badge.dirty { background: rgba(255,167,38,0.15); color: var(--warning); }
.sidebar {
  grid-area: sidebar; background: var(--bg-elevated);
  border-right: 1px solid var(--border); padding: 20px 0; overflow-y: auto;
}
.sidebar-title {
  padding: 0 20px; font-size: 0.75rem;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-muted); margin: 20px 0 8px;
}
.sidebar ul { list-style: none; padding: 0; margin: 0; }
.project-link {
  display: block; width: 100%; background: none; border: none;
  color: var(--text); padding: 10px 20px; text-align: left;
  cursor: pointer; font-size: 0.9rem; transition: background 0.15s;
}
.project-link:hover { background: var(--bg-panel); }
.project-link.active {
  background: var(--bg-panel);
  border-left: 3px solid var(--accent); padding-left: 17px;
}
.brand {
  padding: 0 20px 20px; font-size: 1.1rem; font-weight: 700;
  color: var(--accent); border-bottom: 1px solid var(--border);
}
.main { grid-area: main; overflow-y: auto; padding: 24px 32px; }
.project-header h1 { margin: 0 0 8px; font-size: 1.8rem; font-weight: 700; }
.project-meta {
  display: flex; gap: 12px; align-items: center;
  color: var(--text-muted); font-size: 0.9rem; flex-wrap: wrap;
}
.badge {
  display: inline-block; padding: 2px 10px; border-radius: 12px;
  font-size: 0.75rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.badge-planning { background: rgba(255,167,38,0.15); color: var(--warning); }
.badge-approved { background: rgba(76,175,80,0.15); color: var(--success); }
.badge-tracking { background: rgba(79,158,255,0.15); color: var(--accent); }
.badge-closed { background: rgba(136,146,160,0.15); color: var(--text-muted); }
.badge-scenario, .badge-info { background: rgba(79,158,255,0.15); color: var(--accent); }
.badge-warning { background: rgba(255,167,38,0.15); color: var(--warning); }
.badge-O { background: rgba(76,175,80,0.15); color: var(--success); }
.badge-R { background: rgba(79,158,255,0.15); color: var(--accent); }
.badge-C { background: rgba(255,167,38,0.15); color: var(--warning); }
.badge-P { background: rgba(239,83,80,0.15); color: var(--danger); }
.nav-tabs {
  display: flex; gap: 4px; border-bottom: 1px solid var(--border);
  margin: 32px 0 24px; overflow-x: auto;
}
.nav-tab {
  background: none; border: none; color: var(--text-muted);
  padding: 12px 20px; cursor: pointer; font-size: 0.9rem;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s; white-space: nowrap;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.panel { display: none; }
.panel.active { display: block; }
.section-title {
  font-size: 1.1rem; font-weight: 600; margin: 24px 0 12px;
  color: var(--text); display: flex; align-items: center; gap: 12px;
}
.section-title small { color: var(--text-muted); font-weight: 400; font-size: 0.85rem; }
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.stat-card {
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow);
}
.stat-card--primary { border-color: var(--accent); }
.stat-card--success { border-color: var(--success); }
.stat-card--warning { border-color: var(--warning); background: rgba(255,167,38,0.05); }
.stat-card--danger { border-color: var(--danger); }
.stat-label {
  font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-muted); margin-bottom: 8px;
}
.stat-value { font-size: 1.4rem; font-weight: 700; color: var(--text); word-break: break-word; }
.stat-value small { font-size: 0.85rem; color: var(--text-muted); font-weight: 400; }
.stat-sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; }
.kpi-table {
  width: 100%; border-collapse: collapse; margin-top: 16px;
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.kpi-table th, .kpi-table td {
  padding: 10px 14px; text-align: right; font-size: 0.88rem;
  border-bottom: 1px solid var(--border);
}
.kpi-table th { background: var(--bg-elevated); font-weight: 600; text-align: right; }
.kpi-table th:first-child, .kpi-table td:first-child { text-align: left; }
.kpi-table tr:last-child td { border-bottom: none; }
.kpi-table tr:hover td { background: rgba(79,158,255,0.05); }
.kpi-table.sm th, .kpi-table.sm td { padding: 6px 10px; font-size: 0.82rem; }
.kpi-table .pos { color: var(--success); font-weight: 600; }
.kpi-table .neg { color: var(--danger); font-weight: 600; }
.placeholder {
  background: var(--bg-panel); border: 1px dashed var(--border);
  border-radius: var(--radius); padding: 40px; text-align: center; color: var(--text-muted);
}
.placeholder h2 { margin: 0 0 12px; color: var(--text); }
.placeholder code {
  background: var(--bg); padding: 2px 6px; border-radius: 4px;
  color: var(--accent); font-family: 'SF Mono', Monaco, Consolas, monospace;
}
.diff-banner {
  background: rgba(76,175,80,0.1); border: 1px solid var(--success);
  border-radius: var(--radius); padding: 12px 16px;
  color: var(--success); font-size: 0.9rem; margin-bottom: 24px;
}
.diff-banner.warn { background: rgba(255,167,38,0.1); border-color: var(--warning); color: var(--warning); }
.diff-banner strong { color: inherit; }
.chart-panel {
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  margin-bottom: 20px; box-shadow: var(--shadow);
}
.chart-panel svg { max-width: 100%; }

/* --- Requerimientos --- */
.req-tabs {
  display: flex; gap: 4px; border-bottom: 1px solid var(--border);
  margin: 12px 0 20px;
}
.req-tab {
  background: none; border: none; color: var(--text-muted);
  padding: 8px 16px; cursor: pointer; font-size: 0.9rem;
  border-bottom: 2px solid transparent;
}
.req-tab:hover { color: var(--text); }
.req-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.req-panel { display: none; }
.req-panel.active { display: block; }
.form-section-title {
  font-size: 1rem; font-weight: 600; margin: 20px 0 12px;
  color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 8px;
}
.form-section-title small { color: var(--text-muted); font-weight: 400; font-size: 0.85rem; margin-left: 8px; }
.form-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px; margin-bottom: 20px;
}
.form-field label {
  display: block; font-size: 0.78rem; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 6px;
}
.form-field input, .form-field select {
  width: 100%; background: var(--bg-panel); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 8px 12px; font-size: 0.9rem;
}
.form-field input:focus, .form-field select:focus {
  outline: none; border-color: var(--accent);
}
.form-check {
  display: flex; align-items: center; gap: 8px; grid-column: span 2;
}
.form-check label { margin: 0; text-transform: none; letter-spacing: normal; }
.form-check input { width: auto; }
.form-actions { display: flex; gap: 12px; margin: 20px 0; }
.btn {
  padding: 10px 20px; border-radius: 6px; border: 1px solid transparent;
  font-size: 0.9rem; font-weight: 600; cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-strong); }
.btn-secondary {
  background: transparent; color: var(--text-muted); border-color: var(--border);
}
.btn-secondary:hover { color: var(--text); border-color: var(--text-muted); }
.form-hint {
  font-size: 0.85rem; color: var(--text-muted);
  background: var(--bg-panel); border-left: 3px solid var(--accent);
  padding: 10px 14px; border-radius: 4px; margin-top: 12px;
}
.table-scroll {
  overflow-x: auto; overflow-y: hidden;
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 12px;
}
.table-scroll-big { max-height: 65vh; overflow-y: auto; }
.edit-grid {
  border-collapse: collapse; font-size: 0.82rem; min-width: 100%;
}
.edit-grid th, .edit-grid td {
  padding: 4px 8px; border: 1px solid var(--border); text-align: left;
  white-space: nowrap;
}
.edit-grid thead th {
  background: var(--bg-elevated); font-weight: 600; color: var(--text);
  position: sticky; top: 0; z-index: 2;
}
.edit-grid .cantidad-total { background: rgba(79,158,255,0.08); color: var(--accent); }
.edit-grid input {
  background: transparent; color: var(--text); border: 1px solid transparent;
  border-radius: 4px; padding: 3px 6px; width: 70px;
  font-size: 0.82rem;
}
.edit-grid input:focus {
  border-color: var(--accent); background: var(--bg);
  outline: none;
}
.edit-grid input.num { width: 100px; text-align: right; }
.edit-grid input.pct { width: 60px; text-align: right; }
.edit-grid input.mes { width: 55px; text-align: right; }
.edit-grid input.check { width: auto; }
.edit-grid .lin-input.num { width: 110px; }
.edit-grid select.lin-input { width: 130px; padding: 3px 6px; font-size: 0.8rem; }
.edit-grid .row-driver td { background: rgba(76,175,80,0.05); font-style: italic; opacity: 0.85; }
.plan-grid tbody tr:hover td { background: rgba(79,158,255,0.03); }
.btn-danger-sm {
  background: none; border: 1px solid transparent; color: var(--text-muted);
  cursor: pointer; padding: 2px 8px; border-radius: 4px;
}
.btn-danger-sm:hover { background: rgba(239,83,80,0.2); color: var(--danger); border-color: var(--danger); }

/* --- Seguimiento --- */
.chip {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 0.75rem; font-weight: 600;
}
.chip-ok { background: rgba(76,175,80,0.15); color: var(--success); }
.chip-bad { background: rgba(239,83,80,0.15); color: var(--danger); }
.chip-neutral { background: rgba(136,146,160,0.15); color: var(--text-muted); }
.alert-card {
  display: flex; gap: 14px;
  background: var(--bg-panel); border: 1px solid var(--border);
  border-left-width: 4px;
  border-radius: var(--radius); padding: 14px 18px;
  margin-bottom: 10px;
}
.alert-crit { border-left-color: var(--danger); }
.alert-warn { border-left-color: var(--warning); }
.alert-info { border-left-color: var(--info); }
.alert-icon { font-size: 1.4rem; }
.alert-crit .alert-icon { color: var(--danger); }
.alert-warn .alert-icon { color: var(--warning); }
.alert-info .alert-icon { color: var(--info); }
.alert-title { font-weight: 600; color: var(--text); margin-bottom: 4px; }
.alert-desc { color: var(--text-muted); font-size: 0.9rem; }
.alert-reco { font-size: 0.85rem; color: var(--text-muted); margin-top: 6px; }

/* --- Sidebar project management --- */
.sidebar-actions {
  padding: 0 20px 12px;
  border-bottom: 1px solid var(--border);
}
.btn-full {
  display: block; width: 100%;
  padding: 8px 12px; border-radius: 6px;
  background: var(--accent); color: white;
  border: none; cursor: pointer;
  font-size: 0.85rem; font-weight: 600;
  transition: background 0.15s;
}
.btn-full:hover { background: var(--accent-strong); }
.sidebar li {
  display: flex; align-items: center; gap: 4px;
  padding-right: 8px;
}
.sidebar li .project-link { flex: 1; }
.project-menu {
  position: relative; opacity: 0; transition: opacity 0.15s;
}
.sidebar li:hover .project-menu { opacity: 1; }
.project-menu-btn {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; padding: 4px 8px; border-radius: 4px;
  font-size: 1rem;
}
.project-menu-btn:hover { background: var(--bg-panel); color: var(--text); }
.project-menu-dropdown {
  display: none;
  position: absolute; right: 0; top: 100%;
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 0; min-width: 140px;
  box-shadow: var(--shadow); z-index: 100;
}
.project-menu-dropdown.open { display: block; }
.project-menu-dropdown button {
  display: block; width: 100%; text-align: left;
  background: none; border: none; color: var(--text);
  padding: 8px 14px; font-size: 0.85rem; cursor: pointer;
}
.project-menu-dropdown button:hover { background: var(--bg-panel); }
.project-menu-dropdown button.danger { color: var(--danger); }

/* --- Modal --- */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px;
}
.modal {
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px;
  max-width: 520px; width: 100%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.modal h3 { margin: 0 0 16px; font-size: 1.2rem; }

/* --- Contexto (BMC) --- */
.contexto-section {
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
}
.contexto-section h3 {
  margin: 0 0 16px; font-size: 1rem; color: var(--accent);
  border-bottom: 1px solid var(--border); padding-bottom: 8px;
}
.contexto-field { margin-bottom: 16px; }
.contexto-field label {
  display: block; font-size: 0.78rem; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 6px;
}
.contexto-field textarea, .contexto-field input {
  width: 100%; background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 10px 12px; font-size: 0.9rem; font-family: inherit;
  min-height: 60px; resize: vertical;
}
.contexto-field textarea:focus, .contexto-field input:focus {
  outline: none; border-color: var(--accent);
}
.list-editor { margin-top: 4px; }
.list-item {
  display: flex; gap: 8px; margin-bottom: 8px;
}
.list-item input {
  flex: 1; background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 8px 12px; font-size: 0.9rem;
}
.btn-sm-add {
  background: transparent; border: 1px dashed var(--border);
  color: var(--text-muted); padding: 6px 12px; border-radius: 6px;
  cursor: pointer; font-size: 0.85rem;
}
.btn-sm-add:hover { border-color: var(--accent); color: var(--accent); }

/* Business Model Canvas grid */
.bmc-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(2, minmax(140px, auto));
  gap: 10px;
  margin: 16px 0;
}
.bmc-cell {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 12px;
  display: flex; flex-direction: column;
}
.bmc-cell label {
  font-size: 0.7rem; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--accent); margin-bottom: 8px;
  font-weight: 600;
}
.bmc-cell textarea {
  flex: 1; background: transparent; color: var(--text);
  border: none; padding: 0; font-size: 0.82rem; font-family: inherit;
  resize: none; min-height: 80px; line-height: 1.4;
}
.bmc-cell textarea:focus { outline: none; }
.bmc-cell.wide-2 { grid-column: span 2; }
.bmc-cell.tall-2 { grid-row: span 2; }
@media (max-width: 1100px) {
  .bmc-grid { grid-template-columns: 1fr 1fr; grid-template-rows: none; }
  .bmc-cell.wide-2, .bmc-cell.tall-2 { grid-column: span 1; grid-row: span 1; }
}

/* --- Portafolio dashboard --- */
.portfolio-header {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.portfolio-charts {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.portfolio-table-actions {
  display: flex; gap: 6px;
}
.portfolio-table-actions button {
  background: none; border: 1px solid var(--border);
  color: var(--text-muted); padding: 4px 10px; border-radius: 4px;
  cursor: pointer; font-size: 0.8rem;
}
.portfolio-table-actions button:hover { border-color: var(--accent); color: var(--accent); }
.portfolio-table-actions .btn-open { color: var(--accent); border-color: var(--accent); }
.portfolio-table td.link {
  color: var(--accent); cursor: pointer;
}
.portfolio-table td.link:hover { text-decoration: underline; }


/* --- Contexto (nueva estructura estilo project charter) --- */
.contexto-section h4.subsection {
  font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-muted); margin: 16px 0 8px; font-weight: 600;
}
.contexto-section .total-line {
  padding: 8px 12px; background: rgba(79,158,255,0.08); border-radius: 6px;
  font-size: 0.9rem; margin-bottom: 12px;
}
.escenarios-grid input { width: 100px; }
.escenarios-grid input.num { text-align: right; }
.escenarios-grid input.pct { width: 80px; text-align: right; }

/* --- Seguimiento nuevo (per-línea) --- */
.seg-controls {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 12px; padding: 12px;
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius);
}
.seg-controls select {
  background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 8px 12px;
}
.seg-cierre-grid td, .seg-cierre-grid th { padding: 6px 10px; }
.seg-cierre-grid .linea-label { font-weight: 500; }
.seg-cierre-grid input {
  width: 130px; text-align: right;
  background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 4px 8px; font-size: 0.85rem;
}
.seg-cierre-grid input:focus { border-color: var(--accent); outline: none; }
.seg-cierre-grid .group-header td {
  background: var(--bg-elevated); color: var(--accent);
  padding: 8px 12px; border-top: 2px solid var(--border);
}
.seg-cierre-grid .subtotal-row td {
  background: rgba(79,158,255,0.06);
  border-top: 1px solid var(--border);
  font-weight: 600;
}
.seg-cierre-grid .total-row td {
  background: rgba(76,175,80,0.10);
  border-top: 2px solid var(--success);
  font-weight: 700; color: var(--success);
}
.text-right { text-align: right; }
.text-muted { color: var(--text-muted); }
.small { font-size: 0.8em; }

/* ============================================================
   PRESENTACIÓN — Estilo ejecutivo editorial (cream+navy+gold)
   ============================================================ */
.pres2 {
  --p2-ink: #0f1923;
  --p2-ink-soft: #354656;
  --p2-muted: #7a8fa0;
  --p2-bg: #f5f3ee;
  --p2-card: #ffffff;
  --p2-gold: #c9972b;
  --p2-gold-light: #f0d98a;
  --p2-teal: #1a6b6b;
  --p2-teal-light: #e2f2f2;
  --p2-rose: #b83433;
  --p2-rose-light: #fdecea;
  --p2-blue: #1a4f8a;
  --p2-blue-light: #e8f0fb;
  --p2-green: #1d6e3a;
  --p2-green-light: #d6f0dd;
  --p2-amber: #b85e10;
  --p2-amber-light: #fff2e6;
  --p2-line: #e2dfd8;
  --p2-radius: 20px;

  background: var(--p2-bg);
  color: var(--p2-ink);
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 24px 8px 60px;
  border-radius: 12px;
  overflow: hidden;
}
.pres2 * { box-sizing: border-box; }
.pres2 p { margin: 0 0 12px; color: var(--p2-ink-soft); }
.pres2 strong { color: var(--p2-ink); }

/* Action bar */
.pres2-actions {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; background: var(--bg-panel);
  border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 20px;
}
.pres2-actions-left { display: flex; align-items: center; gap: 14px; }
.pres2-badge {
  background: rgba(201,151,43,0.15); color: #c9972b;
  padding: 4px 10px; border-radius: 12px;
  font-size: 0.75rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px;
}
.pres2-actions-hint { color: var(--text-muted); font-size: 0.85rem; }
.pres2-actions select {
  background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 12px; font-size: 0.85rem;
}
.btn-print {
  background: var(--accent); color: white; border: none;
  padding: 10px 20px; border-radius: 8px;
  font-weight: 600; font-size: 0.9rem; cursor: pointer;
}
.btn-print:hover { background: var(--accent-strong); }

/* HERO */
.pres2-hero {
  position: relative;
  background: var(--p2-ink);
  border-radius: 24px;
  padding: 48px 48px 40px;
  margin: 0 20px 24px;
  overflow: hidden;
}
.pres2-hero-bg {
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 800px 600px at 110% -5%, rgba(201,151,43,0.35) 0%, transparent 55%),
    radial-gradient(ellipse 600px 500px at -10% 120%, rgba(26,107,107,0.30) 0%, transparent 55%),
    radial-gradient(ellipse 500px 400px at 50% 50%, rgba(26,79,138,0.12) 0%, transparent 65%);
}
.pres2-hero-grid {
  display: grid; grid-template-columns: 1.2fr 1fr;
  gap: 40px; align-items: center; position: relative; z-index: 1;
}
.pres2-eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--p2-gold-light);
  margin-bottom: 22px; display: flex; align-items: center; gap: 12px;
}
.pres2-eyebrow::before {
  content: ''; width: 32px; height: 1px; background: var(--p2-gold);
}
.pres2-h1 {
  font-family: 'Fraunces', Georgia, 'Times New Roman', serif;
  font-size: clamp(32px, 4.5vw, 52px);
  font-weight: 900; color: #fff; line-height: 1.05;
  margin: 0 0 22px; letter-spacing: -1px;
}
.pres2-h1 span { color: var(--p2-gold-light); }
.pres2-sub {
  font-size: 14px; color: rgba(255,255,255,0.78);
  line-height: 1.75; max-width: 560px; margin: 0 0 28px;
}
.pres2-tags { display: flex; gap: 10px; flex-wrap: wrap; }
.pres2-tag {
  font-size: 11px; font-weight: 600; padding: 8px 14px;
  border-radius: 999px; border: 1.5px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.92);
}
.pres2-tag-gold {
  background: rgba(201,151,43,0.2); border-color: var(--p2-gold);
  color: var(--p2-gold-light);
}
.pres2-hero-metric {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px; padding: 32px 28px;
  backdrop-filter: blur(10px);
}
.pres2-hero-metric-label {
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--p2-gold-light); font-weight: 700; margin-bottom: 8px;
}
.pres2-hero-metric-value {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 42px; font-weight: 900; color: white; line-height: 1;
  margin-bottom: 6px;
}
.pres2-hero-metric-sub {
  font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 500;
}
.pres2-hero-metric-divider {
  height: 1px; background: rgba(255,255,255,0.15); margin: 22px 0 18px;
}
.pres2-hero-mini-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px 20px;
}
.pres2-hero-mini-grid > div { display: flex; flex-direction: column; }
.pres2-hero-mini-grid span {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
  color: rgba(255,255,255,0.55); font-weight: 600;
}
.pres2-hero-mini-grid strong {
  font-size: 15px; color: white; font-weight: 600; margin-top: 2px;
}

/* HEALTH SCORE */
.pres2-health {
  margin: 0 20px 32px; padding: 20px 28px;
  background: var(--p2-card); border-radius: 16px;
  border: 1px solid var(--p2-line);
  display: grid; grid-template-columns: auto 1fr auto auto;
  gap: 20px; align-items: center;
}
.pres2-health-label {
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  font-weight: 700; color: var(--p2-muted);
}
.pres2-health-bar {
  height: 12px; background: #ecebe6; border-radius: 999px; overflow: hidden;
}
.pres2-health-fill {
  height: 100%; border-radius: 999px;
  transition: width 0.4s ease;
}
.pres2-health-green { background: linear-gradient(90deg, #4dbd6a, #1d6e3a); }
.pres2-health-blue  { background: linear-gradient(90deg, #4a90d0, #1a4f8a); }
.pres2-health-amber { background: linear-gradient(90deg, #f5a623, #b85e10); }
.pres2-health-rose  { background: linear-gradient(90deg, #e57373, #b83433); }
.pres2-health-score {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 36px; font-weight: 900;
}
.pres2-health-score small { font-size: 14px; color: var(--p2-muted); font-weight: 400; }
.pres2-health-verdict {
  font-size: 12px; font-weight: 700;
  padding: 8px 14px; border-radius: 999px;
}
.pres2-health-verdict.pres2-health-green { background: var(--p2-green-light); color: var(--p2-green); }
.pres2-health-verdict.pres2-health-blue  { background: var(--p2-blue-light);  color: var(--p2-blue); }
.pres2-health-verdict.pres2-health-amber { background: var(--p2-amber-light); color: var(--p2-amber); }
.pres2-health-verdict.pres2-health-rose  { background: var(--p2-rose-light);  color: var(--p2-rose); }

/* SECTION DIVIDER */
.pres2-divider {
  display: flex; align-items: center; gap: 16px;
  padding: 32px 20px 20px;
}
.pres2-divider-num {
  width: 44px; height: 44px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fraunces', Georgia, serif;
  font-size: 18px; font-weight: 900; color: white; flex-shrink: 0;
}
.pres2-dn-gold  { background: linear-gradient(135deg, #c9972b, #f0d98a); color: #0f1923 !important; }
.pres2-dn-blue  { background: linear-gradient(135deg, #1a4f8a, #4a90d0); }
.pres2-dn-teal  { background: linear-gradient(135deg, #1a6b6b, #38a0b0); }
.pres2-dn-green { background: linear-gradient(135deg, #1d6e3a, #4dbd6a); }
.pres2-dn-rose  { background: linear-gradient(135deg, #b83433, #e57373); }
.pres2-dn-amber { background: linear-gradient(135deg, #b85e10, #f5a623); }
.pres2-divider-label {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 22px; font-weight: 900; color: var(--p2-ink); line-height: 1.1;
}
.pres2-divider-sub {
  font-size: 12px; color: var(--p2-muted); margin-top: 3px;
}
.pres2-divider-line {
  flex: 1; height: 1px; background: var(--p2-line);
  margin-left: 8px;
}

/* KPI GRID */
.pres2-kpi-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px; padding: 0 20px;
}
.pres2-kpi {
  background: var(--p2-card); border-radius: 18px;
  padding: 22px 24px; border: 1px solid var(--p2-line);
  border-top: 4px solid;
  transition: transform 0.2s;
}
.pres2-kpi:hover { transform: translateY(-2px); }
.pres2-kpi-gold  { border-top-color: var(--p2-gold); }
.pres2-kpi-blue  { border-top-color: var(--p2-blue); }
.pres2-kpi-teal  { border-top-color: var(--p2-teal); }
.pres2-kpi-green { border-top-color: var(--p2-green); }
.pres2-kpi-rose  { border-top-color: var(--p2-rose); }
.pres2-kpi-amber { border-top-color: var(--p2-amber); }
.pres2-kpi-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--p2-muted); font-weight: 700; margin-bottom: 10px;
}
.pres2-kpi-value {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 32px; font-weight: 900; color: var(--p2-ink);
  line-height: 1.05; margin-bottom: 6px;
}
.pres2-kpi-good .pres2-kpi-value { color: var(--p2-green); }
.pres2-kpi-bad  .pres2-kpi-value { color: var(--p2-rose); }
.pres2-kpi-context {
  font-size: 12px; color: var(--p2-muted); font-weight: 500;
}

/* METRIC STRIP */
.pres2-metric-strip {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 2px; margin: 20px; background: var(--p2-line);
  border-radius: 14px; overflow: hidden;
}
.pres2-metric-box {
  background: var(--p2-card); padding: 16px 18px;
}
.pres2-metric-name {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--p2-muted); font-weight: 700; margin-bottom: 6px;
}
.pres2-metric-value {
  font-size: 15px; font-weight: 700; color: var(--p2-ink);
}

/* TWO COLUMN LAYOUT */
.pres2-two-col {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 20px; padding: 0 20px 8px;
}
.pres2-two-col-uneven {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 20px; padding: 0 20px; align-items: start;
}

.pres2-card {
  background: var(--p2-card); border-radius: 18px;
  padding: 26px 28px; border: 1px solid var(--p2-line);
  position: relative;
}
.pres2-card-highlight { background: linear-gradient(135deg, #ffffff, #e8f0fb 100%); }
.pres2-card-vision    { background: linear-gradient(135deg, #ffffff, #fff8e8 100%); }
.pres2-card-icon {
  width: 42px; height: 42px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; margin-bottom: 14px;
}
.pres2-icon-teal  { background: var(--p2-teal-light); }
.pres2-icon-gold  { background: rgba(201,151,43,0.15); }
.pres2-icon-blue  { background: var(--p2-blue-light); }
.pres2-icon-rose  { background: var(--p2-rose-light); }
.pres2-card-h3 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 20px; font-weight: 700; color: var(--p2-ink);
  margin: 0 0 12px;
}
.pres2-card-p {
  font-size: 14px; color: var(--p2-ink-soft); line-height: 1.7;
}
.pres2-card-tag {
  margin-top: 12px; padding: 10px 14px;
  background: rgba(26,79,138,0.06); border-left: 3px solid var(--p2-blue);
  font-size: 12px; color: var(--p2-ink-soft); border-radius: 4px;
}

/* CHART CONTAINERS */
.pres2-chart-container {
  display: grid; grid-template-columns: 2fr 1fr;
  gap: 16px; padding: 0 20px; align-items: start;
}
.pres2-chart-panel {
  background: var(--p2-card); border-radius: 18px;
  padding: 20px 24px; border: 1px solid var(--p2-line);
}
.pres2-chart-panel svg text { fill: var(--p2-ink-soft) !important; }
.pres2-chart-summary {
  display: flex; flex-direction: column; gap: 12px;
}
.pres2-summary-stat {
  background: var(--p2-card); border-radius: 14px;
  padding: 14px 18px; border: 1px solid var(--p2-line);
}
.pres2-summary-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--p2-muted); font-weight: 700; margin-bottom: 4px;
}
.pres2-summary-value {
  font-size: 16px; font-weight: 700; color: var(--p2-ink);
}
.pres2-summary-hint {
  font-size: 11px; color: var(--p2-muted); margin-top: 3px;
}

/* SCENARIO CARDS */
.pres2-scenario-cards {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 14px; padding: 0 20px;
}
.pres2-scen-card {
  background: var(--p2-card); border-radius: 16px;
  padding: 20px; border: 1px solid var(--p2-line);
  border-left: 4px solid; transition: transform 0.15s;
}
.pres2-scen-active {
  transform: scale(1.02);
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
}
.pres2-scen-green { border-left-color: var(--p2-green); }
.pres2-scen-blue  { border-left-color: var(--p2-blue); }
.pres2-scen-amber { border-left-color: var(--p2-amber); }
.pres2-scen-rose  { border-left-color: var(--p2-rose); }
.pres2-scen-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
}
.pres2-scen-name {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 16px; font-weight: 700; color: var(--p2-ink);
}
.pres2-scen-badge {
  background: var(--p2-gold); color: white;
  padding: 3px 10px; border-radius: 10px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
}
.pres2-scen-metrics { display: grid; gap: 8px; }
.pres2-scen-metrics > div {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 13px;
}
.pres2-scen-metrics span { color: var(--p2-muted); font-weight: 500; }
.pres2-scen-metrics strong { color: var(--p2-ink); font-weight: 700; }
.pres2-pos { color: var(--p2-green) !important; }
.pres2-neg { color: var(--p2-rose) !important; }

/* MARKET STATS HERO */
.pres2-market-hero {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px; padding: 0 20px; margin-bottom: 20px;
}
.pres2-market-stat {
  background: var(--p2-card); border-radius: 16px;
  padding: 24px 20px; text-align: center;
  border: 1px solid var(--p2-line); position: relative;
  overflow: hidden;
}
.pres2-market-stat::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--p2-gold), var(--p2-gold-light));
}
.pres2-market-value {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 26px; font-weight: 900; color: var(--p2-ink);
  line-height: 1.05; margin-bottom: 4px;
}
.pres2-market-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--p2-muted); font-weight: 600;
}

/* Chip lists */
.pres2-chip-list { list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; gap: 8px; }
.pres2-chip {
  background: var(--p2-blue-light); color: var(--p2-blue);
  padding: 6px 14px; border-radius: 999px;
  font-size: 12px; font-weight: 600;
}
.pres2-chip-gold  { background: rgba(201,151,43,0.12); color: var(--p2-gold); }
.pres2-chip-amber { background: var(--p2-amber-light); color: var(--p2-amber); }

/* INVESTMENT PANEL */
.pres2-invest-panel {
  display: grid; grid-template-columns: 1fr 1.3fr;
  gap: 20px; padding: 0 20px;
}
.pres2-invest-total {
  background: linear-gradient(135deg, var(--p2-ink), var(--p2-ink-soft));
  color: white; border-radius: 20px; padding: 32px 28px;
}
.pres2-invest-total > div:first-child {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--p2-gold-light); font-weight: 700; margin-bottom: 8px;
}
.pres2-invest-big {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 40px; font-weight: 900; margin-bottom: 24px; line-height: 1;
}
.pres2-invest-items { display: flex; flex-direction: column; gap: 14px; }
.pres2-invest-item { color: rgba(255,255,255,0.9); }
.pres2-invest-concepto {
  font-size: 12px; font-weight: 600; margin-bottom: 4px;
  display: flex; justify-content: space-between; align-items: baseline;
}
.pres2-invest-monto { font-size: 15px; font-weight: 700; color: white; }
.pres2-invest-bar-wrap {
  height: 5px; background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden;
  margin-top: 6px;
}
.pres2-invest-bar {
  height: 100%; background: var(--p2-gold-light);
  transition: width 0.4s;
}
.pres2-invest-context { display: flex; flex-direction: column; gap: 16px; }
.pres2-ordered-list {
  counter-reset: item; list-style: none; padding: 0; margin: 8px 0 0;
}
.pres2-ordered-list li {
  counter-increment: item;
  position: relative; padding: 10px 0 10px 42px;
  font-size: 14px; color: var(--p2-ink-soft); line-height: 1.6;
  border-bottom: 1px solid var(--p2-line);
}
.pres2-ordered-list li:last-child { border-bottom: none; }
.pres2-ordered-list li::before {
  content: counter(item, decimal-leading-zero);
  position: absolute; left: 0; top: 10px;
  font-family: 'Fraunces', Georgia, serif;
  font-size: 15px; font-weight: 900; color: var(--p2-gold);
}

/* CAPACITY */
.pres2-capacity-grid {
  display: grid; grid-template-columns: 1fr auto 1fr;
  gap: 16px; padding: 0 20px; align-items: center;
  margin-top: 20px;
}
.pres2-capacity-card {
  background: var(--p2-card); border-radius: 16px; padding: 20px 24px;
  border: 1px solid var(--p2-line);
}
.pres2-capacity-future {
  background: linear-gradient(135deg, #ffffff, var(--p2-green-light));
  border-color: rgba(29,110,58,0.3);
}
.pres2-capacity-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--p2-muted); font-weight: 700; margin-bottom: 8px;
}
.pres2-capacity-card p {
  font-size: 14px; color: var(--p2-ink); margin: 0; line-height: 1.6;
}
.pres2-capacity-arrow {
  font-size: 30px; color: var(--p2-gold); font-weight: 900;
  text-align: center;
}

/* COST BREAKDOWN */
.pres2-cost-context {
  background: var(--p2-card); border-radius: 18px;
  padding: 26px 28px; border: 1px solid var(--p2-line);
}
.pres2-apoyo { margin-top: 20px; }

/* RISK GRID */
.pres2-risk-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 14px; padding: 0 20px;
}
.pres2-risk-card {
  background: var(--p2-card); border-radius: 16px;
  padding: 20px 22px; border: 1px solid var(--p2-line);
  border-left: 4px solid var(--p2-rose);
  display: flex; gap: 16px; align-items: flex-start;
}
.pres2-risk-num {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 24px; font-weight: 900; color: var(--p2-rose);
  line-height: 1; flex-shrink: 0;
}
.pres2-risk-text {
  font-size: 14px; color: var(--p2-ink-soft); line-height: 1.6;
}

/* PRINT STYLES */
@media print {
  html, body { background: white !important; }
  .app { display: block; }
  .sidebar, .topbar, .nav-tabs, .no-print, #project-header { display: none !important; }
  .main { padding: 0 !important; overflow: visible; }
  .panel:not(#panel-presentacion) { display: none !important; }
  .pres2 {
    background: white !important; padding: 0 !important; border-radius: 0 !important;
  }
  .pres2-hero {
    margin: 0 !important; border-radius: 0 !important;
    page-break-after: always; padding: 30mm 25mm !important;
  }
  .pres2-divider { page-break-before: auto; page-break-inside: avoid; padding: 20mm 25mm 10mm !important; }
  .pres2-kpi-grid, .pres2-metric-strip, .pres2-two-col, .pres2-two-col-uneven,
  .pres2-market-hero, .pres2-scenario-cards, .pres2-risk-grid, .pres2-invest-panel,
  .pres2-capacity-grid, .pres2-chart-container {
    padding: 0 25mm !important; page-break-inside: avoid;
  }
  .pres2-health { margin: 0 25mm 20px !important; }
  @page { size: A4; margin: 0; }
}

/* Media queries */
@media (max-width: 900px) {
  .pres2-hero-grid, .pres2-invest-panel, .pres2-two-col, .pres2-two-col-uneven,
  .pres2-chart-container, .pres2-capacity-grid { grid-template-columns: 1fr !important; }
  .pres2-capacity-arrow { transform: rotate(90deg); }
  .pres2-h1 { font-size: 32px !important; }
  .pres2-hero-metric-value { font-size: 32px !important; }
  .pres2-health { grid-template-columns: 1fr; gap: 8px; }
}

/* ============================================================
   GENERADOR de cantidad de servicios
   ============================================================ */
.gen-table thead th {
  padding: 8px 12px; text-align: center;
  font-size: 0.75rem;
}
.gen-table thead th small {
  display: block; font-size: 0.65rem;
  text-transform: none; letter-spacing: normal;
  color: var(--text-muted); font-weight: 400; margin-top: 2px;
}
.gen-table td { padding: 8px 12px; text-align: center; }
.gen-table td:first-child { text-align: left; }
.gen-table .gen-cell {
  width: 90px; text-align: center;
  background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 6px 8px; font-size: 0.9rem;
}
.gen-table .gen-cell:focus { border-color: var(--accent); outline: none; }
.gen-table .gen-cell.pct { width: 80px; }
.btn.btn-sm { padding: 6px 14px; font-size: 0.8rem; }

/* ============================================================
   GUÍA — Estilo ejecutivo (comparte paleta con Presentación)
   ============================================================ */
.guia {
  --g-ink: #0f1923;
  --g-ink-soft: #354656;
  --g-muted: #7a8fa0;
  --g-bg: #f5f3ee;
  --g-card: #ffffff;
  --g-gold: #c9972b;
  --g-gold-light: #f0d98a;
  --g-teal: #1a6b6b;
  --g-teal-light: #e2f2f2;
  --g-blue: #1a4f8a;
  --g-blue-light: #e8f0fb;
  --g-green: #1d6e3a;
  --g-green-light: #d6f0dd;
  --g-rose: #b83433;
  --g-rose-light: #fdecea;
  --g-amber: #b85e10;
  --g-amber-light: #fff2e6;
  --g-line: #e2dfd8;

  background: var(--g-bg);
  color: var(--g-ink);
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  padding: 24px 12px 60px;
  border-radius: 12px;
  overflow: hidden;
}
.guia * { box-sizing: border-box; }
.guia p { margin: 0 0 12px; color: var(--g-ink-soft); line-height: 1.65; }
.guia strong { color: var(--g-ink); }

/* HERO */
.guia-hero {
  position: relative;
  background: var(--g-ink);
  border-radius: 24px;
  padding: 60px 52px 52px;
  margin: 0 20px 32px;
  overflow: hidden;
}
.guia-hero-bg {
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 900px 700px at 105% -10%, rgba(201,151,43,0.35) 0%, transparent 55%),
    radial-gradient(ellipse 700px 550px at -5% 110%, rgba(26,107,107,0.3) 0%, transparent 55%);
}
.guia-hero-content { position: relative; z-index: 1; max-width: 780px; }
.guia-eyebrow {
  font-size: 12px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--g-gold-light); font-weight: 700;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 24px;
}
.guia-eyebrow::before { content: ''; width: 32px; height: 1px; background: var(--g-gold); }
.guia-h1 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: clamp(38px, 5.5vw, 58px); font-weight: 900;
  color: white; line-height: 1.05; margin: 0 0 24px;
  letter-spacing: -1px;
}
.guia-h1 span { color: var(--g-gold-light); }
.guia-lead {
  font-size: 16px; color: rgba(255,255,255,0.82);
  line-height: 1.7; max-width: 640px;
  margin: 0;
}

/* SECTIONS */
.guia-section {
  padding: 0 20px;
  margin-bottom: 32px;
}
.guia-section-header {
  display: flex; align-items: flex-start; gap: 20px;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--g-line);
}
.guia-section-num {
  width: 48px; height: 48px; border-radius: 14px;
  background: linear-gradient(135deg, var(--g-gold), var(--g-gold-light));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fraunces', Georgia, serif;
  font-size: 22px; font-weight: 900; color: var(--g-ink);
  flex-shrink: 0;
}
.guia-section h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 28px; font-weight: 900; color: var(--g-ink);
  margin: 0 0 6px; line-height: 1.1;
}
.guia-section-header p {
  font-size: 14px; color: var(--g-muted); margin: 0;
}

/* INTRO GRID */
.guia-intro-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}
.guia-intro-card {
  background: var(--g-card); border: 1px solid var(--g-line);
  border-radius: 20px; padding: 28px 26px;
}
.guia-intro-icon {
  width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; margin-bottom: 16px;
}
.guia-icon-teal  { background: var(--g-teal-light); }
.guia-icon-gold  { background: rgba(201,151,43,0.15); }
.guia-icon-blue  { background: var(--g-blue-light); }
.guia-intro-card h3 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 20px; font-weight: 800; margin: 0 0 12px; color: var(--g-ink);
}
.guia-intro-card ul {
  list-style: none; padding: 0; margin: 0;
}
.guia-intro-card li {
  padding: 6px 0 6px 20px; position: relative;
  font-size: 14px; color: var(--g-ink-soft); line-height: 1.6;
  border-bottom: 1px solid var(--g-line);
}
.guia-intro-card li:last-child { border-bottom: none; }
.guia-intro-card li::before {
  content: '›'; position: absolute; left: 0; top: 6px;
  color: var(--g-gold); font-weight: 900; font-size: 18px;
}

/* STEPS */
.guia-steps {
  display: grid; gap: 12px;
}
.guia-step {
  display: flex; align-items: flex-start; gap: 20px;
  padding: 20px 24px;
  background: var(--g-card);
  border: 1px solid var(--g-line);
  border-radius: 16px;
  border-left: 4px solid var(--g-gold);
  transition: transform 0.15s;
}
.guia-step:hover { transform: translateX(4px); }
.guia-step-num {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 32px; font-weight: 900; color: var(--g-gold);
  line-height: 1; flex-shrink: 0;
  min-width: 32px;
}
.guia-step-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 17px; font-weight: 700; color: var(--g-ink);
  margin-bottom: 4px;
}
.guia-step-desc {
  font-size: 14px; color: var(--g-ink-soft);
  line-height: 1.6;
}
.guia-step-desc strong { color: var(--g-ink); font-weight: 700; }

/* MODULE GRID */
.guia-module-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
.guia-module-card {
  background: var(--g-card); border: 1px solid var(--g-line);
  border-top: 4px solid;
  border-radius: 18px;
  padding: 24px 22px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.guia-module-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}
.guia-mod-blue  { border-top-color: var(--g-blue); }
.guia-mod-gold  { border-top-color: var(--g-gold); }
.guia-mod-teal  { border-top-color: var(--g-teal); }
.guia-mod-green { border-top-color: var(--g-green); }
.guia-mod-rose  { border-top-color: var(--g-rose); }
.guia-mod-amber { border-top-color: var(--g-amber); }
.guia-mod-icon {
  font-size: 32px; margin-bottom: 12px;
}
.guia-mod-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 20px; font-weight: 800; color: var(--g-ink);
  margin-bottom: 8px;
}
.guia-mod-desc {
  font-size: 13px; color: var(--g-ink-soft);
  line-height: 1.55; margin-bottom: 14px;
}
.guia-mod-cta {
  font-size: 12px; font-weight: 700; color: var(--g-gold);
  text-transform: uppercase; letter-spacing: 0.6px;
}

/* CONCEPTS */
.guia-concepts {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 14px;
}
.guia-concept {
  background: var(--g-card); border: 1px solid var(--g-line);
  border-radius: 14px; padding: 18px 20px;
  border-left: 3px solid var(--g-teal);
}
.guia-concept-term {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 15px; font-weight: 800; color: var(--g-ink);
  margin-bottom: 6px;
}
.guia-concept-def {
  font-size: 13.5px; color: var(--g-ink-soft);
  line-height: 1.65;
}
.guia-concept-def strong { color: var(--g-ink); font-weight: 700; }

/* TIP FINAL */
.guia-tip {
  background: linear-gradient(135deg, var(--g-ink), var(--g-ink-soft));
  border-radius: 20px;
  padding: 32px 36px;
  display: flex; gap: 24px; align-items: center;
  color: white;
}
.guia-tip-icon {
  font-size: 44px;
  flex-shrink: 0;
}
.guia-tip h3 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 22px; font-weight: 800; margin: 0 0 8px;
  color: white;
}
.guia-tip p {
  color: rgba(255,255,255,0.85);
  font-size: 15px; margin: 0 0 16px;
}
.guia-tip strong { color: var(--g-gold-light); }
.guia-tip .btn-primary {
  background: var(--g-gold);
  color: var(--g-ink);
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 700;
}
.guia-tip .btn-primary:hover { background: var(--g-gold-light); }

@media (max-width: 768px) {
  .guia-tip { flex-direction: column; text-align: center; }
  .guia-h1 { font-size: 36px !important; }
}


/* ============================================================
   NEW SIDEBAR — Estilo dashboard moderno
   ============================================================ */
.app {
  display: grid;
  grid-template-columns: 260px 1fr;
  grid-template-rows: 64px 1fr;
  grid-template-areas: "sidebar topbar" "sidebar main";
  min-height: 100vh;
}
.topbar {
  grid-area: topbar;
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  font-weight: 600;
}
.topbar-brand {
  font-size: 0.95rem; font-weight: 500;
  color: var(--text-muted); letter-spacing: 0.2px;
}
.topbar-brand strong { color: var(--accent); font-weight: 700; }
.mobile-menu-btn {
  display: none;
  background: none; border: 1px solid var(--border);
  color: var(--text); padding: 6px 8px; border-radius: 6px;
  margin-right: 12px; cursor: pointer;
}
.topbar-right { display: flex; gap: 14px; align-items: center; }
.scenario-selector, .topbar-right select {
  background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 12px; font-size: 0.85rem;
}
.save-badge {
  padding: 4px 10px; border-radius: 12px;
  font-size: 0.75rem; font-weight: 600;
}
.save-badge.clean { background: rgba(76,175,80,0.15); color: var(--success); }
.save-badge.dirty { background: rgba(255,167,38,0.15); color: var(--warning); }
.topbar-right label { font-size: 0.85rem; color: var(--text-muted); }

/* Sidebar */
.sidebar {
  grid-area: sidebar;
  background: var(--bg-elevated);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex; flex-direction: column;
}

/* Brand section */
.sidebar-brand {
  padding: 20px 20px 16px;
  display: flex; align-items: center; gap: 14px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo {
  width: 44px; height: 44px;
  background: white; padding: 2px; border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  flex-shrink: 0;
}
.sidebar-brand-text { display: flex; flex-direction: column; line-height: 1.1; }
.brand-title { font-size: 0.9rem; font-weight: 800; color: var(--text); letter-spacing: 0.5px; }
.brand-sub   { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); letter-spacing: 0.4px; }
.brand-tag   { font-size: 0.7rem; color: var(--accent); font-weight: 700; margin-top: 2px; letter-spacing: 0.6px; text-transform: uppercase; }

/* Active project section */
.sidebar-project {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(79,158,255,0.03);
}
.sidebar-project-label {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-muted); font-weight: 700; margin-bottom: 6px;
}
.sidebar-project-name {
  font-size: 0.9rem; font-weight: 600; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  margin-bottom: 10px;
}
.sidebar-project-actions {
  display: flex; gap: 6px;
}
.sb-mini-btn {
  flex: 1;
  background: transparent; color: var(--text-muted);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 8px; font-size: 0.75rem; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px;
  transition: all 0.15s;
}
.sb-mini-btn:hover { color: var(--text); border-color: var(--text-muted); }
.sb-mini-btn.accent {
  background: var(--accent); border-color: var(--accent); color: white;
}
.sb-mini-btn.accent:hover { background: var(--accent-strong); border-color: var(--accent-strong); }

/* Sidebar menu */
.sidebar-menu {
  flex: 1;
  padding: 12px 12px 20px;
}
.sidebar-menu-title {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--text-muted); font-weight: 700;
  padding: 14px 8px 8px;
}
.sb-item {
  display: flex; align-items: center; gap: 12px;
  width: 100%; padding: 9px 12px;
  background: none; border: none; border-radius: 8px;
  color: var(--text-muted); font-size: 0.88rem; font-weight: 500;
  text-align: left; cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 2px;
}
.sb-item svg { opacity: 0.7; flex-shrink: 0; }
.sb-item:hover {
  background: rgba(255,255,255,0.03);
  color: var(--text);
}
.sb-item:hover svg { opacity: 1; }
.sb-item.active {
  background: rgba(79,158,255,0.15);
  color: var(--accent);
}
.sb-item.active svg { opacity: 1; color: var(--accent); }
.sb-item span { flex: 1; }

/* Print: hide sidebar */
@media print { .sidebar { display: none !important; } }

/* Modal: project list */
.modal-lg { max-width: 640px !important; }
.modal-project-list {
  max-height: 400px; overflow-y: auto;
  border: 1px solid var(--border); border-radius: 8px;
}
.modal-project-item {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; cursor: pointer;
  transition: background 0.15s;
}
.modal-project-item:last-child { border-bottom: none; }
.modal-project-item:hover { background: var(--bg-panel); }
.modal-project-item.active { background: rgba(79,158,255,0.1); }
.modal-project-info { flex: 1; min-width: 0; }
.modal-project-name {
  font-size: 0.95rem; font-weight: 600; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.modal-project-badge {
  display: inline-block; margin-top: 4px;
  padding: 2px 8px; border-radius: 10px;
  background: rgba(79,158,255,0.15); color: var(--accent);
  font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}
.modal-project-buttons {
  display: flex; gap: 4px; flex-shrink: 0;
}
.btn-sm-mini {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-muted); padding: 4px 10px; border-radius: 4px;
  font-size: 0.75rem; font-weight: 600; cursor: pointer;
}
.btn-sm-mini:hover { color: var(--text); border-color: var(--text-muted); }
.btn-sm-mini.danger { color: var(--danger); border-color: transparent; }
.btn-sm-mini.danger:hover { background: rgba(239,83,80,0.1); border-color: var(--danger); }

/* Adjust main */
.main {
  grid-area: main;
  overflow-y: auto;
  padding: 24px 32px;
}

/* Responsive: sidebar collapses on mobile */
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; grid-template-areas: "topbar" "main"; }
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 260px; z-index: 1500;
    transform: translateX(-100%);
    transition: transform 0.25s;
  }
  .sidebar.mobile-open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,0.4); }
  .mobile-menu-btn { display: flex; align-items: center; }
  .main { padding: 16px 20px; }
}


/* ============================================================
   COMPARADOR — tarjetas de escenario + charts
   ============================================================ */
.chart-row-2 {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
@media (max-width: 900px) { .chart-row-2 { grid-template-columns: 1fr; } }

.comp-cards-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 14px; margin-bottom: 24px;
}
.comp-card {
  background: var(--bg-panel); border: 1px solid var(--border);
  border-left: 4px solid; border-radius: var(--radius);
  padding: 16px 18px; transition: transform .15s, box-shadow .15s;
}
.comp-card:hover { transform: translateY(-2px); }
.comp-O { border-left-color: var(--success); }
.comp-R { border-left-color: var(--accent); }
.comp-C { border-left-color: var(--warning); }
.comp-P { border-left-color: var(--danger); }
.comp-active { box-shadow: 0 0 0 1px var(--accent), 0 8px 24px rgba(0,0,0,.25); }
.comp-card-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.comp-card-name { font-size: 1rem; font-weight: 700; color: var(--text); }
.comp-badge-active {
  background: rgba(79,158,255,.15); color: var(--accent);
  padding: 3px 10px; border-radius: 10px;
  font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
}
.comp-set-btn {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-muted); padding: 3px 10px; border-radius: 10px;
  font-size: .68rem; font-weight: 600; cursor: pointer;
}
.comp-set-btn:hover { border-color: var(--accent); color: var(--accent); }
.comp-wins {
  font-size: .72rem; color: var(--success); font-weight: 600;
  margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.comp-wins-empty { color: var(--text-muted); }
.comp-card-kpis { display: grid; gap: 5px; }
.comp-card-kpis > div {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: .8rem;
}
.comp-card-kpis span { color: var(--text-muted); }
.comp-card-kpis strong { color: var(--text); font-weight: 700; }
.comp-card-kpis strong.pos { color: var(--success); }
.comp-card-kpis strong.neg { color: var(--danger); }

.kpi-table td.cell-best {
  background: rgba(76,175,80,.10);
  font-weight: 700; color: var(--success);
}
.best-dot { color: var(--success); font-size: .7rem; }

/* Presentación: extras */
.pres2-chart-container-full { padding: 0 20px; margin-bottom: 4px; }
.pres2-chart-container-full .pres2-chart-panel { width: 100%; }
.pres2-meta-strip {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; margin-top: 16px; padding-top: 14px;
  border-top: 1px solid var(--p2-line);
}
.pres2-meta-strip > div { display: flex; flex-direction: column; }
.pres2-meta-strip span {
  font-size: 10px; text-transform: uppercase; letter-spacing: .8px;
  color: var(--p2-muted); font-weight: 700;
}
.pres2-meta-strip strong {
  font-size: 14px; color: var(--p2-ink); font-weight: 700; margin-top: 2px;
}


/* Dashboard sub-tabs */
.dash-subtabs {
  display: flex; gap: 0;
  border-bottom: 2px solid var(--border);
  margin-bottom: 20px;
}
.dash-stab {
  background: none; border: none;
  color: var(--text-muted); font-size: 0.9rem; font-weight: 600;
  padding: 12px 22px; cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: all 0.15s;
}
.dash-stab:hover { color: var(--text); }
.dash-stab.active { color: var(--accent); border-bottom-color: var(--accent); }
.dash-stab-panel { display: none; }
.dash-stab-panel.active { display: block; }
/* Highlight fila activa en tabla comparador */
.row-active-esc td { background: rgba(79,158,255,0.06); }


/* Contexto: indicadores financieros */
.ctx-kpi-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px; margin-bottom: 20px;
}
.ctx-kpi-card {
  background: var(--bg-panel); border: 1px solid var(--border);
  border-top: 4px solid; border-radius: var(--radius); padding: 16px 18px;
}
.ctx-kpi-green { border-top-color: var(--success); }
.ctx-kpi-blue  { border-top-color: var(--accent); }
.ctx-kpi-amber { border-top-color: var(--warning); }
.ctx-kpi-rose  { border-top-color: var(--danger); }
.ctx-kpi-esc   { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; letter-spacing: 0.6px; }
.ctx-kpi-row   { display: flex; justify-content: space-between; align-items: baseline; font-size: 0.82rem; border-bottom: 1px solid var(--border); padding: 5px 0; }
.ctx-kpi-row:last-child { border-bottom: none; }
.ctx-kpi-row span { color: var(--text-muted); }
.ctx-kpi-row strong { color: var(--text); font-weight: 700; }
.ctx-kpi-row strong.pos { color: var(--success); }
.ctx-kpi-row strong.neg { color: var(--danger); }
.ctx-conclusiones { display: flex; flex-direction: column; gap: 12px; }
.ctx-concl-item {
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 18px;
  display: flex; gap: 14px; align-items: flex-start;
  font-size: 0.88rem; line-height: 1.6; color: var(--text-muted);
}
.ctx-concl-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 1px; }
.ctx-concl-text strong { color: var(--text); }


/* ─── Comparador anual ─────────────────────────────────────── */
.anual-charts-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  margin-bottom: 20px;
}
@media (max-width: 900px) { .anual-charts-row { grid-template-columns: 1fr; } }
.anual-chart-cell {}

.anual-tables-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
@media (max-width: 900px) { .anual-tables-grid { grid-template-columns: 1fr; } }

.anual-table-card {
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  box-shadow: var(--shadow);
}
.anual-table-title {
  font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--accent);
  padding: 10px 16px 8px; border-bottom: 1px solid var(--border);
  background: rgba(79,158,255,0.04);
}
.anual-table {
  width: 100%; border-collapse: collapse; font-size: 0.82rem;
}
.anual-table thead th {
  background: var(--bg-elevated); font-weight: 700; color: var(--text);
  padding: 8px 12px; text-align: right; border-bottom: 1px solid var(--border);
}
.anual-table thead th:first-child { text-align: left; }
.anual-table tbody td {
  padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: right;
}
.anual-table tbody td:first-child { text-align: left; }
.anual-table tbody tr:last-child td { border-bottom: none; }
.anual-row-active td { background: rgba(79,158,255,0.06); }
.anual-row:hover td { background: rgba(255,255,255,0.02); }
.anual-best {
  color: var(--success) !important; font-weight: 700;
  background: rgba(76,175,80,0.08) !important;
}
.total-col { background: rgba(79,158,255,0.04); font-weight: 600; }
.anual-esc-cell {
  display: flex; align-items: center; gap: 8px;
  font-weight: 600; color: var(--text);
}
.anual-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.anual-badge {
  background: rgba(79,158,255,0.15); color: var(--accent);
  padding: 1px 6px; border-radius: 8px;
  font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.4px;
}

/* ─── Presentación: mejor escenario ────────────────────────── */
.pres2-best-banner {
  display: flex; gap: 20px; align-items: flex-start;
  padding: 28px 32px; border-radius: 20px;
  margin: 0 20px 20px;
  background: var(--p2-card); border: 1px solid var(--p2-line);
  border-left: 6px solid;
}
.pres2-best-green { border-left-color: var(--p2-green); }
.pres2-best-blue  { border-left-color: var(--p2-blue); }
.pres2-best-amber { border-left-color: var(--p2-amber); }
.pres2-best-rose  { border-left-color: var(--p2-rose); }
.pres2-best-icon { font-size: 36px; flex-shrink: 0; }
.pres2-best-body { flex: 1; }
.pres2-best-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 20px; font-weight: 800; color: var(--p2-ink);
  margin-bottom: 10px;
}
.pres2-best-desc {
  font-size: 14px; color: var(--p2-ink-soft); line-height: 1.7;
}
.pres2-best-desc strong { color: var(--p2-ink); font-weight: 700; }
.pres2-best-kpis {
  display: grid; grid-template-rows: repeat(4, auto);
  gap: 8px; padding: 16px 20px;
  background: rgba(0,0,0,0.03); border-radius: 12px;
  min-width: 160px; flex-shrink: 0;
}
.pres2-best-kpis > div {
  display: flex; flex-direction: column; gap: 2px;
}
.pres2-best-kpis span {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--p2-muted); font-weight: 600;
}
.pres2-best-kpis strong {
  font-size: 16px; font-weight: 800; color: var(--p2-ink);
}

/* ─── Presentación: conclusión ejecutiva ────────────────────── */
.pres2-concl-grid {
  display: grid; grid-template-columns: 1.3fr 1fr 1fr;
  gap: 16px; padding: 0 20px; margin-bottom: 24px;
}
@media (max-width: 1000px) { .pres2-concl-grid { grid-template-columns: 1fr; } }
.pres2-concl-card {
  background: var(--p2-card); border: 1px solid var(--p2-line);
  border-radius: 18px; padding: 24px 22px;
}
.pres2-concl-main { border-top: 4px solid var(--p2-blue); }
.pres2-concl-risk { border-top: 4px solid var(--p2-amber); }
.pres2-concl-recom { border-top: 4px solid var(--p2-green); }
.pres2-concl-icon { font-size: 28px; margin-bottom: 10px; }
.pres2-concl-card h3 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 17px; font-weight: 800; margin: 0 0 10px; color: var(--p2-ink);
}
.pres2-concl-card p {
  font-size: 13px; color: var(--p2-ink-soft); line-height: 1.65; margin-bottom: 8px;
}
.pres2-concl-card p strong { color: var(--p2-ink); }
.pres2-concl-esc {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--p2-ink-soft); margin-top: 6px;
}
.pres2-concl-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.pres2-concl-ok   { background: var(--p2-green); }
.pres2-concl-fail { background: var(--p2-rose); }


.req-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; gap: 16px; flex-wrap: wrap;
}
.req-toolbar-actions {
  display: flex; gap: 8px; flex-shrink: 0;
}


@keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }


.req-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; margin-bottom: 20px;
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: var(--radius); gap: 16px; flex-wrap: wrap;
}
.req-toolbar-title {
  font-size: 0.95rem; font-weight: 700; color: var(--text);
}
.req-toolbar-actions { display: flex; gap: 8px; }
.req-import-label {
  display: inline-flex; align-items: center;
  cursor: pointer !important;
}


/* Cloud sync */
.cloud-badge {
  display: inline-flex; align-items: center;
  padding: 4px 10px; border-radius: 999px;
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.3px;
  white-space: nowrap;
}
.cloud-badge-ok    { background: rgba(29,110,58,0.18);  color: var(--success); }
.cloud-badge-local { background: rgba(122,143,160,0.18);color: var(--text-muted); }
.btn-topbar {
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  color: var(--text); padding: 5px 12px; border-radius: 6px;
  font-size: 0.82rem; font-weight: 600; cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
.btn-topbar:hover { background: rgba(255,255,255,0.1); }
.btn-topbar-icon  { padding: 5px 9px; }
.topbar-divider   { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }

/* Cloud modal */
.cloud-modal { max-width: 560px !important; }
.cloud-steps { display: flex; flex-direction: column; gap: 12px; }
.cloud-step  { display: flex; gap: 14px; align-items: flex-start; font-size: 0.88rem; color: var(--text-muted); line-height: 1.55; }
.cloud-step a { color: var(--accent); }
.cloud-step-num {
  width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
  background: var(--accent); color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; font-weight: 800;
}
.cloud-status    { font-size: 0.8rem; font-weight: 600; margin-top: 12px; }
.cloud-status-ok   { color: var(--success); }
.cloud-status-warn { color: var(--warning); }
.cloud-loading   { padding: 24px; text-align: center; color: var(--text-muted); font-size: 0.88rem; }
.cloud-project-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  font-size: 0.88rem; gap: 12px;
}
.cloud-project-item:last-child { border-bottom: none; }


.btn-save-local {
  background: transparent;
  border-color: var(--border);
  color: var(--text-muted);
}
.btn-save-local-dirty {
  background: rgba(255,167,38,0.12) !important;
  border-color: var(--warning) !important;
  color: var(--warning) !important;
  font-weight: 700;
}
.topbar-right { gap: 8px; }


/* ── Botón de análisis ────────────────────────────────── */
.analysis-btn {
  position: absolute; top: 6px; right: 6px;
  background: rgba(79,158,255,0.1); border: 1px solid rgba(79,158,255,0.3);
  border-radius: 50%; width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; cursor: pointer; z-index: 10;
  transition: all 0.15s; padding: 0; line-height: 1;
  opacity: 0; /* visible on hover of parent */
}
.stat-card:hover .analysis-btn,
.chart-panel:hover .analysis-btn-chart,
.pres2-kpi:hover .analysis-btn { opacity: 1; }
.analysis-btn:hover { background: rgba(79,158,255,0.25); transform: scale(1.1); }
.analysis-btn-chart {
  position: absolute; top: 10px; right: 10px;
  opacity: 0;
}

/* ── Panel flotante de análisis ──────────────────────── */
.analysis-panel {
  position: absolute; z-index: 2000;
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  animation: apIn 0.18s ease; overflow: hidden;
}
@keyframes apIn {
  from { opacity: 0; transform: translateY(-6px) scale(0.97); }
  to   { opacity: 1; transform: none; }
}
.analysis-panel-good { border-top: 3px solid var(--success); }
.analysis-panel-ok   { border-top: 3px solid var(--accent); }
.analysis-panel-warn { border-top: 3px solid var(--warning); }
.analysis-panel-bad  { border-top: 3px solid var(--danger); }
.analysis-panel-info { border-top: 3px solid var(--text-muted); }

.ap-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px 8px; border-bottom: 1px solid var(--border);
}
.ap-icon { font-size: 18px; flex-shrink: 0; }
.ap-title { font-size: 0.9rem; font-weight: 700; color: var(--text); flex: 1; }
.ap-close {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 14px; padding: 2px 6px;
  border-radius: 4px; line-height: 1;
}
.ap-close:hover { background: var(--bg-panel); color: var(--text); }
.ap-body {
  padding: 12px 14px 14px;
  font-size: 0.84rem; color: var(--text-muted);
  line-height: 1.65;
}
.ap-body strong { color: var(--text); }


/* Dashboard layout */
.dash-section-hdr {
  font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-muted);
  padding: 20px 0 10px; border-bottom: 1px solid var(--border);
  margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
}
.dash-esc-tag {
  background: rgba(79,158,255,0.15); color: var(--accent);
  padding: 2px 10px; border-radius: 999px;
  font-size: 0.7rem; font-weight: 700;
  text-transform: none; letter-spacing: 0;
}
.stats-grid-tight { gap: 10px; }
.dash-chart-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 16px; margin-bottom: 16px;
}
.dash-chart-main { grid-column: span 1; }
.dash-chart-side  { grid-column: span 1; }
.dash-chart-cell .chart-panel { height: 100%; min-height: 0; }
@media (max-width: 1100px) {
  .dash-chart-row { grid-template-columns: 1fr; }
}
