  // MOTOR DE ANÁLISIS DINÁMICO — tooltip inteligente por KPI/gráfico
  // ================================================================

  const Analysis = {

    // Genera el análisis textual para cada KPI
    kpi(key, value, snapshot, project) {
      const cur = project.meta.moneda;
      const p = project.parametros;
      const td = DataModel.annualToMonthly(p.tasaDescuentoAnual || 0.10);
      const H = project.meta.horizonteMeses;
      const inv = p.inversionInicial || 0;

      const fmt = (v) => Fmt.money(v, cur);
      const fmtP = (v, d) => Fmt.pct(v, d || 1);
      const na = value == null || !isFinite(value);

      const analyses = {
        van: () => {
          if (na) return { icon: '⚠', level: 'warn', title: 'VAN', body: 'No se puede calcular el VAN con los datos actuales.' };
          if (value > inv) return { icon: '🟢', level: 'good', title: 'VAN — Excelente', body: `El proyecto genera ${fmt(value)} de valor presente neto, superando la inversión inicial (${fmt(inv)}). El retorno es sustancialmente superior al costo del capital del ${fmtP(p.tasaDescuentoAnual)}.` };
          if (value > 0) return { icon: '🟡', level: 'ok', title: 'VAN — Positivo', body: `El proyecto genera ${fmt(value)} por encima del costo de capital (${fmtP(p.tasaDescuentoAnual)} anual). Es viable, aunque el margen sobre la inversión de ${fmt(inv)} es moderado.` };
          return { icon: '🔴', level: 'bad', title: 'VAN — Negativo', body: `Con un VAN de ${fmt(value)}, el proyecto destruye valor al costo de capital actual. Evalúa reducir costos, aumentar precio o revisar la tasa de descuento de ${fmtP(p.tasaDescuentoAnual)}.` };
        },
        tirMensual: () => {
          if (na) return { icon: '⚠', level: 'warn', title: 'TIR mensual', body: 'La TIR no converge con el flujo actual. Verifica que exista al menos un período con flujo negativo seguido de períodos positivos.' };
          const tComp = td;
          if (value > tComp * 2) return { icon: '🟢', level: 'good', title: 'TIR — Alta rentabilidad', body: `La TIR mensual del ${fmtP(value, 2)} supera más del doble la tasa de descuento mensual (${fmtP(tComp, 3)}). El proyecto es altamente atractivo. La TIR anual equivalente es ${fmtP(snapshot.tirAnual, 1)}.` };
          if (value > tComp) return { icon: '🟡', level: 'ok', title: 'TIR — Viable', body: `La TIR mensual del ${fmtP(value, 2)} supera la tasa de descuento mensual (${fmtP(tComp, 3)}). El proyecto es viable. TIR anual equivalente: ${fmtP(snapshot.tirAnual, 1)}.` };
          return { icon: '🔴', level: 'bad', title: 'TIR — Insuficiente', body: `La TIR mensual del ${fmtP(value, 2)} no supera la tasa de descuento (${fmtP(tComp, 3)}). El proyecto no compensa el costo del capital. Revisa la estructura de ingresos o costos.` };
        },
        ir: () => {
          if (na) return { icon: '⚠', level: 'warn', title: 'ROI', body: 'No se puede calcular el ROI. Verifica que la inversión inicial esté definida en Parámetros.' };
          if (value > 3) return { icon: '🟢', level: 'good', title: 'ROI — Excelente', body: `El ROI de ${Fmt.num(value, 2)}× significa que por cada peso invertido se generan ${Fmt.num(value, 2)} pesos de VAN. Un ROI superior a 3× es excepcional para proyectos de servicio.` };
          if (value > 1) return { icon: '🟡', level: 'ok', title: 'ROI — Bueno', body: `El ROI de ${Fmt.num(value, 2)}× indica que el VAN supera la inversión inicial. El proyecto genera valor real sobre el capital comprometido de ${fmt(inv)}.` };
          if (value > 0) return { icon: '🟡', level: 'warn', title: 'ROI — Bajo', body: `ROI de ${Fmt.num(value, 2)}× — el proyecto es rentable pero el VAN es menor que la inversión. Evalúa si el retorno justifica el riesgo.` };
          return { icon: '🔴', level: 'bad', title: 'ROI — Negativo', body: `ROI negativo: el proyecto destruye más valor del que genera. Revisa los supuestos de demanda o la estructura de costos.` };
        },
        paybackMeses: () => {
          if (na || value == null) return { icon: '⚠', level: 'warn', title: 'Payback', body: 'El proyecto no recupera la inversión dentro del horizonte de ' + Fmt.horizonte(H) + '. Considera extender el horizonte o revisar los flujos.' };
          const ratio = value / H;
          if (ratio < 0.4) return { icon: '🟢', level: 'good', title: 'Payback — Rápido', body: `La inversión se recupera en el mes ${Math.ceil(value)} (${fmtP(ratio)} del horizonte total de ${H} meses). Un payback en el primer tercio del proyecto es muy favorable.` };
          if (ratio < 0.65) return { icon: '🟡', level: 'ok', title: 'Payback — Aceptable', body: `Recuperación en el mes ${Math.ceil(value)} de ${H}. Está dentro del rango aceptable para proyectos de servicios (menos del 65% del horizonte).` };
          return { icon: '🟠', level: 'warn', title: 'Payback — Tardío', body: `El mes ${Math.ceil(value)} de recuperación representa el ${fmtP(ratio)} del horizonte. El proyecto tiene poca holgura. Si ocurre algún retraso, puede no recuperar la inversión.` };
        },
        margenBrutoPct: () => {
          if (na) return { icon: '⚠', level: 'warn', title: 'Margen bruto', body: 'Sin datos suficientes para calcular.' };
          if (value > 0.55) return { icon: '🟢', level: 'good', title: 'Margen bruto — Sólido', body: `El ${fmtP(value)} de margen bruto indica que los costos directos son solo el ${fmtP(1-value)} de los ingresos. Hay espacio para absorber gastos y aun así ser rentable.` };
          if (value > 0.30) return { icon: '🟡', level: 'ok', title: 'Margen bruto — Moderado', body: `El ${fmtP(value)} es aceptable para proyectos de servicio. Los gastos operativos consumen el margen restante, por lo que el control de costos es clave.` };
          if (value > 0) return { icon: '🟠', level: 'warn', title: 'Margen bruto — Ajustado', body: `Con solo el ${fmtP(value)} de margen bruto, cualquier sobrecosto en la entrega puede eliminar la rentabilidad. Revisa la estructura de costos directos.` };
          return { icon: '🔴', level: 'bad', title: 'Margen bruto — Negativo', body: `Los costos directos superan los ingresos (margen bruto ${fmtP(value)}). El proyecto no es viable en estas condiciones.` };
        },
        margenNetoPct: () => {
          if (na) return { icon: '⚠', level: 'warn', title: 'Margen neto', body: 'Sin datos suficientes.' };
          if (value > 0.20) return { icon: '🟢', level: 'good', title: 'Margen neto — Sólido', body: `El ${fmtP(value)} de margen neto después de impuestos es un resultado destacado. El proyecto retiene ${fmtP(value)} de cada peso de ingreso como utilidad final.` };
          if (value > 0.08) return { icon: '🟡', level: 'ok', title: 'Margen neto — Aceptable', body: `El ${fmtP(value)} de margen neto es positivo y aceptable. Equivale a una utilidad neta de ${fmt(snapshot.utilidadNeta)}.` };
          if (value > 0) return { icon: '🟠', level: 'warn', title: 'Margen neto — Bajo', body: `Con el ${fmtP(value)} de margen neto, el proyecto es técnicamente rentable pero muy sensible a variaciones. Una caída del 10% en ingresos podría volverlo negativo.` };
          return { icon: '🔴', level: 'bad', title: 'Margen neto — Negativo', body: `Margen neto negativo (${fmtP(value)}): el proyecto pierde dinero. Revisa gastos, precio de venta o estructura impositiva.` };
        },
        ebitda: () => {
          if (na) return { icon: '⚠', level: 'warn', title: 'EBITDA', body: 'Sin datos.' };
          const pct = snapshot.ebitdaPct;
          if (pct > 0.30) return { icon: '🟢', level: 'good', title: 'EBITDA — Fuerte', body: `El EBITDA de ${fmt(value)} representa el ${fmtP(pct)} de los ingresos. Indica una operación eficiente con buena generación de caja antes de obligaciones financieras.` };
          if (pct > 0.10) return { icon: '🟡', level: 'ok', title: 'EBITDA — Positivo', body: `EBITDA de ${fmt(value)} (${fmtP(pct)} de los ingresos). La operación genera caja suficiente para cubrir inversiones y financiamiento.` };
          if (value > 0) return { icon: '🟠', level: 'warn', title: 'EBITDA — Ajustado', body: `EBITDA positivo pero bajo (${fmtP(pct)}). Pequeñas variaciones operativas pueden comprometer la generación de caja.` };
          return { icon: '🔴', level: 'bad', title: 'EBITDA — Negativo', body: `EBITDA negativo: la operación no genera caja suficiente ni para cubrir sus costos operativos. Situación crítica.` };
        },
        totalIngresos: () => {
          const crecAnual = snapshot.ingresosMensuales;
          const y1 = crecAnual.slice(1,13).reduce((a,b)=>a+b,0);
          const y2 = crecAnual.slice(13,25).reduce((a,b)=>a+b,0);
          const crecPct = y1 > 0 ? (y2-y1)/y1 : 0;
          return { icon: '📊', level: 'info', title: 'Total de ingresos', body: `Los ingresos proyectados de ${fmt(value)} se distribuyen en ${Fmt.horizonte(H)}. El crecimiento del año 1 al año 2 es del ${fmtP(crecPct, 1)}. ${crecPct > 0.15 ? 'El ritmo de crecimiento es sólido.' : crecPct > 0 ? 'El crecimiento es moderado.' : 'Los ingresos decrecen en el segundo año — revisa la curva de servicios.'}` };
        },
        inversionInicial: () => ({
          icon: '💰', level: 'info', title: 'Inversión inicial',
          body: `La inversión de ${fmt(value)} se recupera ${snapshot.paybackMeses != null ? 'en el mes ' + Math.ceil(snapshot.paybackMeses) : 'fuera del horizonte del proyecto'}. El VAN generado es de ${fmt(snapshot.van)}, lo que implica un ROI de ${snapshot.ir != null ? Fmt.num(snapshot.ir, 2) + '×' : 'indeterminado'}.`
        }),
        costoOportunidad: () => ({
          icon: '💡', level: 'info', title: 'Costo de oportunidad',
          body: `El costo de oportunidad de ${fmt(value)} representa lo que se dejaría de ganar si el capital de ${fmt(p.montoFinanciar || inv)} se invirtiera a la tasa alternativa del ${fmtP(p.costoOportunidadAnual)}. Es el costo "implícito" de elegir este proyecto sobre otras inversiones.`
        }),
        costoCredito: () => ({
          icon: '🏦', level: 'info', title: 'Costo del crédito',
          body: `El costo financiero del crédito es ${fmt(value)}: es la diferencia entre el total de cuotas pagadas (${fmt((snapshot.cuotaMensual || 0) * H)}) y el monto recibido (${fmt(p.montoFinanciar || inv)}). Refleja el costo real del financiamiento a la tasa del ${fmtP(p.tasaFinanciamientoAnual)}.`
        }),
        cuotaMensual: () => ({
          icon: '📅', level: 'info', title: 'Cuota mensual del crédito',
          body: `Cuota de ${fmt(value)} calculada sobre ${fmt(p.montoFinanciar || inv)} a ${fmtP(p.tasaFinanciamientoAnual)} anual en ${H} meses. El total de cuotas asciende a ${fmt(value * H)}, generando un costo financiero de ${fmt(snapshot.costoCredito || 0)}.`
        }),
        uai: () => {
          if (na) return { icon: '⚠', level: 'warn', title: 'EBIT', body: 'Sin datos suficientes para calcular el EBIT.' };
          const pct = snapshot.margenEbitPct;
          if (value > 0 && pct > 0.25) return { icon: '🟢', level: 'good', title: 'EBIT — Sólido', body: `El EBIT de ${fmt(value)} representa el ${fmtP(pct)} de los ingresos. La operación genera suficiente utilidad antes de impuestos.` };
          if (value > 0) return { icon: '🟡', level: 'ok', title: 'EBIT — Positivo', body: `EBIT de ${fmt(value)} (${fmtP(pct)} de ingresos). La operación es viable. El EBITDA incluyendo depreciaciones es ${fmt(snapshot.ebitda)}.` };
          return { icon: '🔴', level: 'bad', title: 'EBIT — Negativo', body: `EBIT negativo (${fmt(value)}): los gastos operativos superan el margen bruto. La operación no es sostenible en estas condiciones.` };
        },
        totalCostos: () => {
          const pct = snapshot.totalIngresos > 0 ? snapshot.totalCostos / snapshot.totalIngresos : 0;
          const lvl = pct > 0.75 ? 'bad' : pct > 0.55 ? 'warn' : 'ok';
          return { icon: pct > 0.75 ? '🔴' : pct > 0.55 ? '🟠' : '🟢', level: lvl,
            title: 'Costos directos',
            body: `Los costos directos representan el ${fmtP(pct)} de los ingresos totales. ${pct > 0.70 ? 'Proporción elevada: evalúa optimizar la estructura de entrega.' : pct > 0.50 ? 'Proporción moderada. Hay margen para cubrir gastos operativos.' : 'Buena eficiencia. El margen bruto disponible es sólido.'}`
          };
        },
        totalGastos: () => {
          const pct = snapshot.totalIngresos > 0 ? snapshot.totalGastos / snapshot.totalIngresos : 0;
          const lvl = pct > 0.35 ? 'bad' : pct > 0.20 ? 'warn' : 'ok';
          return { icon: pct > 0.35 ? '🔴' : pct > 0.20 ? '🟠' : '🟢', level: lvl,
            title: 'Gastos operativos',
            body: `Los gastos representan el ${fmtP(pct)} de los ingresos. ${pct > 0.35 ? 'Nivel alto. Revisa gastos administrativos y comerciales.' : pct > 0.20 ? 'Nivel moderado, dentro de rangos aceptables.' : 'Gastos bien controlados.'}`
          };
        },
        tirAnual: () => {
          if (na) return { icon: '⚠', level: 'warn', title: 'TIR anual equivalente', body: 'No calculable con el flujo actual.' };
          const ref = p.tasaDescuentoAnual || 0.10;
          const excess = value - ref;
          return {
            icon: excess > 0.5 ? '🟢' : excess > 0.1 ? '🟡' : excess > 0 ? '🟠' : '🔴',
            level: excess > 0.5 ? 'good' : excess > 0.1 ? 'ok' : excess > 0 ? 'warn' : 'bad',
            title: 'TIR anual equivalente',
            body: `TIR anual del ${fmtP(value, 1)} (anualización de la TIR mensual ${fmtP(snapshot.tirMensual, 2)}). ${excess > 0 ? 'Supera la tasa de descuento del ' + fmtP(ref) + ' en ' + fmtP(excess, 1) + ' puntos.' : 'No supera la tasa de descuento del ' + fmtP(ref) + '.'}`
          };
        },
        paybackDescMeses: () => {
          if (na || value == null) return { icon: '⚠', level: 'warn', title: 'Payback descontado', body: 'No alcanza el umbral dentro del horizonte del proyecto.' };
          const diff = value - (snapshot.paybackMeses || 0);
          return { icon: '📊', level: 'info', title: 'Payback descontado',
            body: `Payback descontado de ${Fmt.months(value)}: incorpora el valor del dinero en el tiempo (tasa ${fmtP(p.tasaDescuentoAnual)}). Es ${Fmt.months(diff)} más tarde que el payback simple, reflejando el costo del capital durante la recuperación.`
          };
        },
      };

      const fn = analyses[key];
      return fn ? fn() : { icon: 'ℹ', level: 'info', title: key, body: 'Sin análisis disponible para este indicador.' };
    },

    // Análisis para gráficos
    chart(chartId, snapshot, project) {
      const cur = project.meta.moneda;
      const fmt = (v) => Fmt.money(v, cur);
      const H = project.meta.horizonteMeses;
      const inv = project.parametros.inversionInicial || 0;

      const chartAnalyses = {
        // ── Dashboard ──────────────────────────────────────────────
        'dash-chart-flujo': () => {
          const flujo = snapshot.flujoMensual;
          let acc = 0, mBE = -1;
          for (let i = 0; i < flujo.length; i++) { acc += flujo[i]; if (acc >= 0 && mBE < 0) mBE = i; }
          const maxNeg = Math.min(...flujo);
          const maxPos = Math.max(...flujo.slice(1));
          return { icon: '💰', title: 'Flujo de caja mensual',
            body: `El flujo acumulado cruza cero en el ${mBE > 0 ? 'mes ' + mBE : 'horizonte del proyecto (no alcanza el equilibrio)'}. El punto de mayor exposición de caja es ${fmt(maxNeg)} y el mejor mes genera ${fmt(maxPos)}. ${snapshot.van > 0 ? 'El acumulado final es positivo: el proyecto es viable.' : 'El acumulado final no supera cero.'}`
          };
        },
        'dash-chart-servicios': () => {
          const arr = (project.cantidadServicios || {})[currentScenario] || [];
          const total = arr.reduce((a,b)=>a+b,0);
          const max = Math.max(...arr.slice(1));
          const maxMes = arr.indexOf(max);
          return { icon: '📦', title: 'Cantidad de servicios',
            body: `El proyecto proyecta ${Fmt.num(total)} servicios totales en ${Fmt.horizonte(project.meta.horizonteMeses)} para el escenario ${DataModel.ESCENARIOS_NOMBRE[currentScenario]}. El mes de mayor actividad es el mes ${maxMes} con ${max} servicios. Los ingresos dependen directamente de esta curva.`
          };
        },
        'dash-chart-ingcos': () => {
          const ratio = snapshot.totalIngresos > 0 ? (snapshot.totalCostos + snapshot.totalGastos) / snapshot.totalIngresos : 1;
          return { icon: '⚖️', title: 'Ingresos vs Egresos',
            body: `Los egresos totales (costos + gastos) representan el ${fmtP(ratio)} de los ingresos. ${ratio < 0.75 ? 'El proyecto mantiene un margen operativo saludable.' : ratio < 0.90 ? 'El margen es ajustado. Cualquier sobrecosto impacta directamente la rentabilidad.' : 'Los egresos consumen casi la totalidad de los ingresos. La viabilidad es frágil.'} El cruce entre las curvas muestra el mes en que el proyecto se autofinancia.`
          };
        },
        'dash-chart-margenes': () => {
          const mb = snapshot.margenBrutoPct, mn = snapshot.margenNetoPct;
          const spread = mb - mn;
          return { icon: '📉', title: 'Márgenes mensuales',
            body: `El margen bruto promedio es ${fmtP(mb)} y el neto ${fmtP(mn)}. La diferencia de ${fmtP(spread)} corresponde a los gastos operativos e impuestos. ${spread > 0.25 ? 'La carga de gastos es significativa. Evalúa si hay gastos que se puedan optimizar.' : 'La estructura de gastos es eficiente relativa a los ingresos.'} Los meses con margen negativo son períodos donde los costos superan los ingresos del mes.`
          };
        },
        'dash-chart-donut': () => {
          const totalC = snapshot.totalCostos + snapshot.totalGastos;
          return { icon: '🥧', title: 'Composición de costos y gastos',
            body: `Los costos y gastos totales son ${fmt(totalC)}, equivalentes al ${fmtP(totalC/(snapshot.totalIngresos||1))} de los ingresos. Esta distribución muestra las categorías con mayor peso en la estructura de egresos. Las categorías dominantes son las que más impactan el margen y donde enfocar las optimizaciones.`
          };
        },
        'dash-chart-anual': () => {
          const H = project.meta.horizonteMeses;
          const nY = Math.floor(H/12);
          return { icon: '📆', title: 'Ingresos anuales por escenario',
            body: `Comparativo de ingresos año a año en los ${nY} año${nY!==1?'s':''} del proyecto. La diferencia entre el escenario Optimista y Pesimista revela la sensibilidad del modelo. Si la brecha es amplia, los supuestos de demanda tienen alto impacto. Si es estrecha, el modelo es robusto ante variaciones.`
          };
        },
        // ── Comparador ─────────────────────────────────────────────
        'comp-chart-margenes': () => ({
          icon: '📊', title: 'Márgenes por escenario',
          body: `Comparativo de margen bruto, EBITDA y margen neto en los 4 escenarios. Un escenario con alto margen bruto pero bajo margen neto tiene costos de gastos elevados. La diferencia Optimista-Pesimista mide la sensibilidad al volumen.`
        }),
        'comp-chart-tir': () => {
          return { icon: '📈', title: 'TIR mensual por escenario',
            body: `La TIR mensual compara la rentabilidad intrínseca de cada escenario. La barra supera la tasa de descuento mensual (${fmtP(DataModel.annualToMonthly(project.parametros.tasaDescuentoAnual), 3)}) cuando el escenario es viable. ${snapshot.tirMensual > DataModel.annualToMonthly(project.parametros.tasaDescuentoAnual) ? 'El escenario activo supera el umbral.' : 'El escenario activo no supera el umbral de rentabilidad.'}`
          };
        },
        'comp-chart-payback': () => ({
          icon: '⏱️', title: 'Payback por escenario',
          body: `Las barras horizontales muestran en cuántos meses cada escenario recupera la inversión. Barras más cortas son mejores. El escenario activo recupera la inversión en ${Fmt.months(snapshot.paybackMeses)}. Si algún escenario no tiene barra, no alcanza el breakeven dentro del horizonte.`
        }),
        'comp-chart-icm': () => ({
          icon: '💹', title: 'Ingresos, costos y utilidad neta',
          body: `Este gráfico muestra la magnitud absoluta de cada escenario. Escenarios con ingresos altos pero utilidad baja tienen estructura de costos pesada. La brecha entre las barras de ingresos y costos es el margen bruto disponible para gastos y utilidad.`
        }),
        'comp-chart-radar': () => ({
          icon: '🎯', title: 'Perfil comparativo de escenarios',
          body: `El radar normaliza 5 dimensiones (0=peor del grupo, 1=mejor). Una forma grande y uniforme indica el mejor perfil riesgo-retorno. Picos en una sola dimensión señalan escenarios desequilibrados. El escenario con mayor área total es el financieramente más sólido.`
        }),
        'comp-chart-flujoacum': () => ({
          icon: '📈', title: 'Flujo acumulado comparativo',
          body: `Cada curva muestra cuándo el acumulado de ese escenario supera cero (punto de equilibrio). La curva que cruza primero tiene el payback más rápido. La altura final de cada curva al mes ${project.meta.horizonteMeses} representa el valor absoluto generado.`
        }),
        'comp-chart-servicios': () => ({
          icon: '📦', title: 'Cantidad de servicios por escenario',
          body: `La pendiente y la altura de cada curva definen los ingresos del proyecto. La diferencia entre el escenario Optimista y Pesimista es el rango de incertidumbre en la demanda. Un rango amplio sugiere alta sensibilidad a factores externos como mercado o ejecución comercial.`
        }),
        'comp-anual-ing': () => ({
          icon: '📆', title: 'Ingresos anuales',
          body: `Ingresos acumulados por año en cada escenario. Un crecimiento consistente año a año indica un modelo con buena escalabilidad. Si los ingresos disminuyen en el año 3, puede deberse a la curva de servicios o a la estructura de precios del proyecto.`
        }),
        // ── Presentación ───────────────────────────────────────────
        'pres2-chart-flujo': () => {
          let acc = 0, mBE = -1;
          snapshot.flujoMensual.forEach((v,i) => { acc+=v; if(acc>=0&&mBE<0) mBE=i; });
          return { icon: '💰', title: 'Flujo de caja proyectado',
            body: `Flujo neto mensual (barras) y acumulado (línea). El cruce del acumulado con cero ocurre en el ${mBE > 0 ? 'mes ' + mBE : 'horizonte del proyecto'}. La profundidad máxima negativa indica el capital máximo en riesgo durante el período de recuperación.`
          };
        },
        'pres2-chart-servicios': () => ({
          icon: '📦', title: 'Despliegue operativo',
          body: `La curva de servicios es el driver principal de los ingresos. Una rampa pronunciada al inicio indica un plan de despliegue agresivo. Compare las 4 curvas para visualizar la brecha de riesgo entre escenarios.`
        }),
        'pres2-chart-icm': () => ({
          icon: '💹', title: 'Ingresos, costos y utilidad',
          body: `La barra de utilidad neta es la diferencia entre ingresos y la suma de costos y gastos, menos impuestos. Escenarios donde la utilidad es negativa no son viables en esas condiciones de mercado.`
        }),
        'pres2-chart-payback': () => ({
          icon: '⏱️', title: 'Payback de cada escenario',
          body: `Comparación del período de recuperación. El escenario activo recupera la inversión en ${Fmt.months(snapshot.paybackMeses)}. La diferencia entre el escenario más rápido y el más lento define el rango de riesgo temporal del proyecto.`
        }),
        'pres2-chart-radar': () => ({
          icon: '🎯', title: 'Perfil comparativo de viabilidad',
          body: `Cada eje está normalizado respecto al mejor escenario del grupo. El área total de cada polígono representa el perfil global. El Conservador tiene el mayor área porque domina en TIR y márgenes, aunque con menor VAN absoluto que el Optimista.`
        }),
        'pres2-chart-donut': () => ({
          icon: '🥧', title: 'Composición de egresos',
          body: `Las categorías más grandes del donut son las que mayor impacto tienen en el margen. Optimizar las categorías dominantes tiene mayor retorno que reducir las menores. Esta visión ayuda a priorizar esfuerzos de control de costos.`
        }),
        'pres2-chart-margenes': () => ({
          icon: '📊', title: 'Márgenes por escenario',
          body: `Los tres indicadores (margen bruto, EBITDA y margen neto) muestran cómo se erosiona el ingreso a través de costos, gastos e impuestos. Un EBITDA alto pero margen neto bajo sugiere alta carga impositiva o financiera.`
        }),
        'pres2-chart-tir': () => ({
          icon: '📈', title: 'TIR mensual de cada escenario',
          body: `La TIR mensual es la tasa real de retorno del proyecto. Comparar contra la tasa de descuento mensual (${fmtP(DataModel.annualToMonthly(project.parametros.tasaDescuentoAnual), 3)}) determina la viabilidad. Escenarios con TIR mayor a esa tasa generan valor.`
        }),
        // ── Flujo de caja ──────────────────────────────────────────
        'flujo-chart-comp-acum': () => ({
          icon: '📈', title: 'Flujo acumulado — todos los escenarios',
          body: `Las cuatro curvas muestran la evolución del capital acumulado. El cruce con cero es el punto de equilibrio de cada escenario. Las curvas que permanecen en negativo no recuperan la inversión en el horizonte proyectado.`
        }),
        'flujo-chart-comp-mensual': () => ({
          icon: '💸', title: 'Flujo neto mensual — comparativo',
          body: `La diferencia entre las curvas en cada mes revela cuánto impacta el escenario en el flujo operativo. Meses con flujo negativo en todos los escenarios son períodos de alta dependencia de caja, donde el riesgo de liquidez es mayor.`
        }),
        'flujo-chart-comp-ingcos': () => ({
          icon: '⚖️', title: 'Ingresos vs Egresos acumulados',
          body: `El punto donde la curva de ingresos supera la de egresos es el umbral de rentabilidad acumulada. La brecha entre ambas curvas al final del horizonte equivale al margen operativo total del proyecto.`
        }),
        // ── Contexto ───────────────────────────────────────────────
        'ctx-chart-anual': () => ({
          icon: '📆', title: 'Proyección anual de ingresos',
          body: `Las barras muestran los ingresos anuales de cada escenario. El crecimiento año a año refleja la capacidad de escalabilidad del modelo. Una diferencia pequeña entre escenarios indica un negocio con demanda predecible.`
        }),
      };

      const fn = chartAnalyses[chartId];
      return fn ? fn() : null;
    },

    // Nivel → color CSS
    levelColor: { good: 'var(--success)', ok: '#4f9eff', warn: 'var(--warning)', bad: 'var(--danger)', info: 'var(--text-muted)' },
    levelBg:    { good: 'rgba(76,175,80,0.08)', ok: 'rgba(79,158,255,0.08)', warn: 'rgba(255,167,38,0.08)', bad: 'rgba(239,83,80,0.08)', info: 'rgba(122,143,160,0.06)' },
  };

  // ── Panel flotante de análisis ───────────────────────────────────
  let _analysisPanel = null;

  function showAnalysisPanel(anchorEl, analysisResult) {
    hideAnalysisPanel();
    if (!analysisResult) return;
    const { icon, level, title, body } = analysisResult;
    const panel = document.createElement('div');
    panel.id = 'analysis-panel';
    panel.className = 'analysis-panel analysis-panel-' + (level || 'info');
    panel.innerHTML =
      '<div class="ap-header">' +
        '<span class="ap-icon">' + icon + '</span>' +
        '<span class="ap-title">' + esc(title) + '</span>' +
        '<button class="ap-close" onclick="hideAnalysisPanel()">✕</button>' +
      '</div>' +
      '<div class="ap-body">' + body + '</div>';
    document.body.appendChild(panel);
    _analysisPanel = panel;

    // Posicionar cerca del elemento
    const rect = anchorEl.getBoundingClientRect();
    const scrollY = window.scrollY || 0;
    const panelW = 340;
    let left = rect.left + rect.width / 2 - panelW / 2;
    left = Math.max(10, Math.min(left, window.innerWidth - panelW - 10));
    let top = rect.bottom + scrollY + 8;
    if (top + 200 > scrollY + window.innerHeight) top = rect.top + scrollY - 220;
    panel.style.left = left + 'px';
    panel.style.top  = top + 'px';
    panel.style.width = panelW + 'px';

    // Cerrar al hacer clic fuera
    setTimeout(() => {
      document.addEventListener('click', _closeOnOutside);
    }, 100);
  }

  function _closeOnOutside(e) {
    if (_analysisPanel && !_analysisPanel.contains(e.target)) {
      hideAnalysisPanel();
    }
  }

  function hideAnalysisPanel() {
    if (_analysisPanel) { _analysisPanel.remove(); _analysisPanel = null; }
    document.removeEventListener('click', _closeOnOutside);
  }

  // Botón de análisis que se inyecta en KPI cards y chart panels
  function makeAnalysisBtn(key, snapshot, project, isChart) {
    const btn = document.createElement('button');
    btn.className = 'analysis-btn' + (isChart ? ' analysis-btn-chart' : '');
    btn.title = 'Ver análisis de este indicador';
    btn.innerHTML = '💡';
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const result = isChart
        ? Analysis.chart(key, snapshot, project)
        : Analysis.kpi(key, snapshot[key], snapshot, project);
      showAnalysisPanel(btn, result);
    });
    return btn;
  }

  // Inyecta botones de análisis en los stat-cards y kpi-cards del dashboard
  function injectAnalysisBtns(snapshot, project) {
    if (!snapshot || !project) return;

    // KPI keys presentes en los stat cards / kpi cards
    const kpiKeys = ['van','tirMensual','ir','paybackMeses','margenBrutoPct',
                     'margenNetoPct','ebitda','totalIngresos','inversionInicial',
                     'costoOportunidad','costoCredito'];

    kpiKeys.forEach(key => {
      document.querySelectorAll('[data-analysis-key="' + key + '"]').forEach(card => {
        if (card.querySelector('.analysis-btn')) return; // ya inyectado
        const btn = makeAnalysisBtn(key, snapshot, project, false);
        card.style.position = 'relative';
        card.appendChild(btn);
      });
    });

    // Chart panels
    const chartIds = ['flujo-chart','pres2-chart-flujo','comp-chart-margenes',
                      'comp-chart-flujoacum','pres2-chart-radar','comp-chart-radar'];
    chartIds.forEach(id => {
      const el = document.getElementById(id);
      if (!el || el.querySelector('.analysis-btn-chart')) return;
      const btn = makeAnalysisBtn(id, snapshot, project, true);
      el.style.position = 'relative';
      el.appendChild(btn);
    });
  }


    if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

</script>
</body>
</html>
