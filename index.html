    num(v, dec) {
      if (v == null || !isFinite(v)) return '—';
      return new Intl.NumberFormat('es-CO',
        { minimumFractionDigits: dec || 0, maximumFractionDigits: dec || 0 }).format(v);
    },
    months(v) {
      if (v == null || !isFinite(v)) return '—';
      return v.toFixed(2) + ' meses';
    },
    horizonte(m) {
      if (!m) return '—';
      return (m % 12 === 0) ? ((m/12 === 1) ? '1 año' : (m/12) + ' años') : (m + ' meses');
    }
  };

  // ------------------------------------------------------------------------
  // SVG Chart module (self-contained, no dependencies)
  // ------------------------------------------------------------------------
  const SvgChart = (function () {
    const NS = 'http://www.w3.org/2000/svg';
    const COLORS = {
      axis: '#8892a0', grid: '#232b36', text: '#e4e7eb', textMuted: '#8892a0',
      ingreso: '#4caf50', costo: '#ef5350', gasto: '#ffa726',
      flujo: '#4f9eff', acumulado: '#a78bfa', real: '#ff9800',
      o: '#4caf50', r: '#4f9eff', c: '#ffa726', p: '#ef5350'
    };
    const FONT = "system-ui, -apple-system, sans-serif";

    function fmtShortNumber(v) {
      if (v == null || !isFinite(v)) return '';
      const abs = Math.abs(v);
      if (abs >= 1e9) return (v / 1e9).toFixed(abs >= 1e10 ? 0 : 1).replace(/\.0$/, '') + 'B';
      if (abs >= 1e6) return (v / 1e6).toFixed(abs >= 1e7 ? 0 : 1).replace(/\.0$/, '') + 'M';
      if (abs >= 1e3) return (v / 1e3).toFixed(abs >= 1e4 ? 0 : 1).replace(/\.0$/, '') + 'K';
      if (abs === 0) return '0';
      if (abs < 1) return v.toFixed(2);
      return v.toFixed(0);
    }

    function el(tag, attrs, textContent) {
      const n = document.createElementNS(NS, tag);
      if (attrs) for (const k in attrs) n.setAttribute(k, attrs[k]);
      if (textContent != null) n.textContent = textContent;
      return n;
    }

    /** Escala "bonita": ticks en 1/2/2.5/5 × 10^n. Devuelve {min,max,ticks[]} */
    function niceScale(rawMin, rawMax, targetTicks, integerOnly) {
      targetTicks = targetTicks || 5;
      if (rawMin === rawMax) { rawMax = rawMin + 1; }
      if (rawMin > 0) rawMin = 0;              // baseline en 0 si todo es positivo
      if (rawMax < 0) rawMax = 0;
      const span = rawMax - rawMin;
      if (span === 0) return { min: 0, max: 1, ticks: [0, 1] };
      const rawStep = span / targetTicks;
      const mag = Math.pow(10, Math.floor(Math.log10(Math.abs(rawStep))));
      const norm = rawStep / mag;
      let niceNorm;
      if (norm <= 1) niceNorm = 1;
      else if (norm <= 2) niceNorm = 2;
      else if (norm <= 2.5) niceNorm = 2.5;
      else if (norm <= 5) niceNorm = 5;
      else niceNorm = 10;
      let step = niceNorm * mag;
      if (integerOnly && step < 1) step = 1;
      const min = Math.floor(rawMin / step) * step;
      const max = Math.ceil(rawMax / step) * step;
      const ticks = [];
      for (let v = min; v <= max + step * 1e-9; v += step) {
        ticks.push(Math.abs(v) < step * 1e-9 ? 0 : v);
      }
      return { min, max, ticks };
    }

    function emptyState(container, msg) {
      container.innerHTML = '<div style="padding:40px 20px;text-align:center;color:' +
        COLORS.textMuted + ';font-family:' + FONT + ';font-size:13px">' +
        (msg || 'Sin datos para graficar') + '</div>';
    }

    /** Tooltip compartido */
    function makeTooltip(container) {
      const tip = document.createElement('div');
      tip.style.cssText = 'position:absolute;pointer-events:none;opacity:0;transition:opacity .12s;' +
        'background:#1a212b;border:1px solid #354656;border-radius:8px;padding:8px 11px;' +
        'font-family:' + FONT + ';font-size:12px;color:#e4e7eb;white-space:nowrap;z-index:50;' +
        'box-shadow:0 4px 16px rgba(0,0,0,.5)';
      container.style.position = 'relative';
      container.appendChild(tip);
      return tip;
    }

    // ==================== LINE / BAR ====================
    function line(container, opts) {
      if (!container) return;
      container.innerHTML = '';
      const series = (opts.series || []).filter(s => s && s.values && s.values.length);
      if (!series.length) return emptyState(container);
      // ¿todo cero?
      const allZero = series.every(s => s.values.every(v => !v || v === 0));
      if (allZero) return emptyState(container, (opts.title ? opts.title + ' — ' : '') + 'todos los valores son cero');

      const W = opts.width || container.clientWidth || 760;
      const nLegend = series.filter(s => s.name).length;
      const H = opts.height || 320;
      const padL = 64, padR = 18, padT = opts.title ? 36 : 14, padB = nLegend > 1 ? 52 : 34;
      const innerW = W - padL - padR, innerH = H - padT - padB;

      let rawMin = Infinity, rawMax = -Infinity;
      series.forEach(s => s.values.forEach(v => {
        if (v == null || !isFinite(v)) return;
        if (v < rawMin) rawMin = v;
        if (v > rawMax) rawMax = v;
      }));
      if (rawMin === Infinity) return emptyState(container);
      const sc = niceScale(rawMin, rawMax, 5, opts.integerY);
      const N = opts.xLabels ? opts.xLabels.length : series[0].values.length;
      const xScale = (i) => padL + (i / Math.max(1, N - 1)) * innerW;
      const yScale = (v) => padT + innerH - ((v - sc.min) / (sc.max - sc.min)) * innerH;
      const yFmt = opts.yFormat || fmtShortNumber;

      const svg = el('svg', { width: W, height: H, viewBox: '0 0 ' + W + ' ' + H, style: 'display:block' });

      // Grid + eje Y con ticks bonitos
      sc.ticks.forEach(t => {
        const y = yScale(t);
        const isZero = t === 0 && sc.min < 0;
        svg.appendChild(el('line', {
          x1: padL, x2: W - padR, y1: y, y2: y,
          stroke: isZero ? COLORS.axis : COLORS.grid,
          'stroke-width': isZero ? 1.5 : 1,
          'stroke-dasharray': isZero ? '4 3' : '0',
          opacity: isZero ? 0.7 : 1
        }));
        svg.appendChild(el('text', {
          x: padL - 8, y: y + 4, 'text-anchor': 'end',
          fill: COLORS.textMuted, 'font-size': 10, 'font-family': FONT
        }, yFmt(t)));
      });
      svg.appendChild(el('line', { x1: padL, x2: padL, y1: padT, y2: padT + innerH, stroke: COLORS.axis }));
      svg.appendChild(el('line', { x1: padL, x2: W - padR, y1: padT + innerH, y2: padT + innerH, stroke: COLORS.axis }));

      // Etiquetas X (densidad adaptativa)
      if (opts.xLabels) {
        const maxLabels = Math.max(4, Math.floor(innerW / 42));
        const step = Math.max(1, Math.ceil(N / maxLabels));
        for (let i = 0; i < N; i += step) {
          svg.appendChild(el('text', {
            x: xScale(i), y: padT + innerH + 15, 'text-anchor': 'middle',
            fill: COLORS.textMuted, 'font-size': 10, 'font-family': FONT
          }, opts.xLabels[i]));
        }
      }

      // Series
      const barSeries = series.filter(s => s.type === 'bar');
      const nBars = barSeries.length || 1;
      let barIdx = 0;
      series.forEach((s) => {
        const color = s.color || COLORS.flujo;
        const kind = s.type || 'line';
        if (kind === 'bar') {
          const slot = (innerW / Math.max(1, N)) * 0.8;
          const barW = Math.max(1.5, slot / nBars);
          const off = (barIdx - (nBars - 1) / 2) * barW;
          barIdx++;
          s.values.forEach((v, i) => {
            if (v == null || !isFinite(v)) return;
            const y0 = yScale(0), y = yScale(v);
            svg.appendChild(el('rect', {
              x: xScale(i) - barW / 2 + off, y: Math.min(y, y0),
              width: barW, height: Math.max(0.5, Math.abs(y0 - y)),
              fill: color, opacity: 0.8, rx: Math.min(2, barW / 3)
            }));
          });
        } else {
          if (kind === 'area') {
            let d = 'M ' + xScale(0) + ' ' + yScale(Math.max(0, sc.min)) + ' ';
            s.values.forEach((v, i) => { d += 'L ' + xScale(i) + ' ' + yScale(v || 0) + ' '; });
            d += 'L ' + xScale(s.values.length - 1) + ' ' + yScale(Math.max(0, sc.min)) + ' Z';
            svg.appendChild(el('path', { d, fill: color, opacity: 0.13 }));
          }
          // Path con soporte para gaps (null)
          let d = '', pen = false;
          s.values.forEach((v, i) => {
            if (v == null || !isFinite(v)) { pen = false; return; }
            d += (pen ? 'L ' : 'M ') + xScale(i) + ' ' + yScale(v) + ' ';
            pen = true;
          });
          svg.appendChild(el('path', {
            d, fill: 'none', stroke: color,
            'stroke-width': s.width || 2.4,
            'stroke-linejoin': 'round', 'stroke-linecap': 'round',
            'stroke-dasharray': s.dashed ? '7 4' : '0'
          }));
          // Marcadores: solo si hay pocos puntos, para no saturar
          if (N <= 20) {
            s.values.forEach((v, i) => {
              if (v == null || !isFinite(v)) return;
              svg.appendChild(el('circle', {
                cx: xScale(i), cy: yScale(v), r: 3,
                fill: '#131920', stroke: color, 'stroke-width': 2
              }));
            });
          }
        }
      });

      // Título
      if (opts.title) {
        svg.appendChild(el('text', {
          x: 2, y: 18, fill: COLORS.text,
          'font-size': 13, 'font-weight': 600, 'font-family': FONT
        }, opts.title));
      }

      // Leyenda
      if (nLegend > 1) {
        let lx = padL, ly = H - 10;
        series.filter(s => s.name).forEach(s => {
          const isLine = (s.type || 'line') !== 'bar';
          if (isLine) {
            svg.appendChild(el('line', {
              x1: lx, x2: lx + 14, y1: ly - 4, y2: ly - 4,
              stroke: s.color || COLORS.flujo, 'stroke-width': 2.5,
              'stroke-dasharray': s.dashed ? '4 3' : '0'
            }));
            svg.appendChild(el('circle', { cx: lx + 7, cy: ly - 4, r: 2.5, fill: s.color || COLORS.flujo }));
          } else {
            svg.appendChild(el('rect', { x: lx, y: ly - 9, width: 12, height: 10, fill: s.color || COLORS.flujo, rx: 2 }));
          }
          svg.appendChild(el('text', {
            x: lx + 19, y: ly, fill: COLORS.textMuted,
            'font-size': 11, 'font-family': FONT
          }, s.name));
          lx += 19 + (s.name.length * 6.2) + 16;
        });
      }

      // ---- Interacción: crosshair + tooltip ----
      const tip = makeTooltip(container);
      const hoverLine = el('line', {
        x1: 0, x2: 0, y1: padT, y2: padT + innerH,
        stroke: COLORS.accent || '#4f9eff', 'stroke-width': 1,
        'stroke-dasharray': '3 3', opacity: 0
      });
      svg.appendChild(hoverLine);
      const dots = series.map(s => {
        const c = el('circle', { r: 4.5, fill: s.color || COLORS.flujo, stroke: '#0f1419', 'stroke-width': 2, opacity: 0 });
        svg.appendChild(c);
        return c;
      });
      const overlay = el('rect', { x: padL, y: padT, width: innerW, height: innerH, fill: 'transparent', style: 'cursor:crosshair' });
      svg.appendChild(overlay);

      overlay.addEventListener('mousemove', (ev) => {
        const rect = svg.getBoundingClientRect();
        const scaleX = W / rect.width;
        const mx = (ev.clientX - rect.left) * scaleX;
        let i = Math.round(((mx - padL) / innerW) * (N - 1));
        i = Math.max(0, Math.min(N - 1, i));
        const x = xScale(i);
        hoverLine.setAttribute('x1', x); hoverLine.setAttribute('x2', x);
        hoverLine.setAttribute('opacity', 0.6);
        let rows = '';
        series.forEach((s, si) => {
          const v = s.values[i];
          if (v == null || !isFinite(v)) { dots[si].setAttribute('opacity', 0); return; }
          dots[si].setAttribute('cx', x);
          dots[si].setAttribute('cy', yScale(v));
          dots[si].setAttribute('opacity', 1);
          rows += '<div style="display:flex;gap:8px;align-items:center;margin-top:3px">' +
            '<span style="width:8px;height:8px;border-radius:2px;background:' + (s.color || COLORS.flujo) + '"></span>' +
            '<span style="color:#8892a0">' + (s.name || '') + '</span>' +
            '<strong style="margin-left:auto">' + (opts.tipFormat ? opts.tipFormat(v) : yFmt(v)) + '</strong></div>';
        });
        const label = opts.xLabels ? opts.xLabels[i] : ('#' + i);
        tip.innerHTML = '<div style="font-weight:700;margin-bottom:2px">' + label + '</div>' + rows;
        tip.style.opacity = 1;
        const px = (x / scaleX);
        const tw = tip.offsetWidth || 150;
        tip.style.left = Math.min(rect.width - tw - 6, Math.max(4, px - tw / 2)) + 'px';
        tip.style.top = '6px';
      });
      overlay.addEventListener('mouseleave', () => {
        tip.style.opacity = 0;
        hoverLine.setAttribute('opacity', 0);
        dots.forEach(d => d.setAttribute('opacity', 0));
      });

      container.appendChild(svg);
    }

    // ==================== GROUPED BAR ====================
    function groupedBar(container, opts) {
      if (!container) return;
      container.innerHTML = '';
      const series = (opts.series || []).filter(s => s && s.values);
      const groups = opts.groups || [];
      if (!series.length || !groups.length) return emptyState(container);
      const allZero = series.every(s => s.values.every(v => !v || v === 0));
      if (allZero) return emptyState(container, (opts.title ? opts.title + ' — ' : '') + 'todos los valores son cero');

      const W = opts.width || container.clientWidth || 760;
      const H = opts.height || 340;
      const padL = 70, padR = 18, padT = opts.title ? 36 : 14, padB = 56;
      const innerW = W - padL - padR, innerH = H - padT - padB;
      const nG = groups.length, nS = series.length;

      let rawMin = Infinity, rawMax = -Infinity;
      series.forEach(s => s.values.forEach(v => {
        if (v == null || !isFinite(v)) return;
        if (v < rawMin) rawMin = v;
        if (v > rawMax) rawMax = v;
      }));
      if (rawMin === Infinity) return emptyState(container);
      const sc = niceScale(rawMin, rawMax, 5, opts.integerY);
      const yFmt = opts.yFormat || fmtShortNumber;
      const groupW = innerW / nG;
      const barW = (groupW * 0.78) / nS;
      const yScale = (v) => padT + innerH - ((v - sc.min) / (sc.max - sc.min)) * innerH;

      const svg = el('svg', { width: W, height: H, viewBox: '0 0 ' + W + ' ' + H, style: 'display:block' });

      sc.ticks.forEach(t => {
        const y = yScale(t);
        const isZero = t === 0 && sc.min < 0;
        svg.appendChild(el('line', {
          x1: padL, x2: W - padR, y1: y, y2: y,
          stroke: isZero ? COLORS.axis : COLORS.grid,
          'stroke-width': isZero ? 1.5 : 1,
          'stroke-dasharray': isZero ? '4 3' : '0'
        }));
        svg.appendChild(el('text', {
          x: padL - 8, y: y + 4, 'text-anchor': 'end',
          fill: COLORS.textMuted, 'font-size': 10, 'font-family': FONT
        }, yFmt(t)));
      });
      svg.appendChild(el('line', { x1: padL, x2: padL, y1: padT, y2: padT + innerH, stroke: COLORS.axis }));

      const showVals = (nG * nS) <= 16;
      groups.forEach((g, gi) => {
        const gx = padL + gi * groupW + groupW * 0.11;
        series.forEach((s, si) => {
          const v = s.values[gi];
          if (v == null || !isFinite(v)) return;
          const x = gx + si * barW;
          const y0 = yScale(0), y = yScale(v);
          const h = Math.max(0.5, Math.abs(y - y0));
          svg.appendChild(el('rect', {
            x: x + barW * 0.08, y: Math.min(y, y0),
            width: barW * 0.84, height: h,
            fill: s.color || COLORS.flujo, opacity: 0.88, rx: 3
          }));
          if (showVals) {
            svg.appendChild(el('text', {
              x: x + barW / 2, y: (v >= 0 ? y - 5 : y0 + Math.abs(y - y0) + 12),
              'text-anchor': 'middle', fill: COLORS.text,
              'font-size': 9.5, 'font-weight': 700, 'font-family': FONT
            }, opts.valueFormat ? opts.valueFormat(v) : fmtShortNumber(v)));
          }
        });
        // Etiqueta del grupo (con wrap si es largo)
        const gname = String(g);
        const gLines = gname.length > 14 ? gname.split(' ') : [gname];
        gLines.slice(0, 2).forEach((ln, li) => {
          svg.appendChild(el('text', {
            x: gx + (groupW * 0.78) / 2, y: padT + innerH + 16 + li * 11,
            'text-anchor': 'middle', fill: COLORS.textMuted,
            'font-size': 10.5, 'font-family': FONT
          }, ln));
        });
      });

      if (opts.title) {
        svg.appendChild(el('text', {
          x: 2, y: 18, fill: COLORS.text,
          'font-size': 13, 'font-weight': 600, 'font-family': FONT
        }, opts.title));
      }
      let lx = padL, ly = H - 8;
      series.forEach(s => {
        if (!s.name) return;
        svg.appendChild(el('rect', { x: lx, y: ly - 9, width: 12, height: 10, fill: s.color || COLORS.flujo, rx: 2 }));
        svg.appendChild(el('text', { x: lx + 17, y: ly, fill: COLORS.textMuted, 'font-size': 11, 'font-family': FONT }, s.name));
        lx += 17 + (s.name.length * 6.2) + 16;
      });
      container.appendChild(svg);
    }

    // ==================== HORIZONTAL BAR ====================
    function horizontalBar(container, opts) {
      if (!container) return;
      container.innerHTML = '';
      const items = (opts.items || []).filter(i => i && isFinite(i.value));
      if (!items.length) return emptyState(container);
      const W = opts.width || container.clientWidth || 700;
      const H = opts.height || 260;
      const padL = 116, padR = 62, padT = opts.title ? 38 : 14, padB = 26;
      const innerW = W - padL - padR, innerH = H - padT - padB;
      const barH = Math.max(12, (innerH / items.length) * 0.6);
      const gapY = innerH / items.length;
      let maxX = Math.max(...items.map(i => i.value));
      if (!isFinite(maxX) || maxX <= 0) maxX = 1;
      const sc = niceScale(0, maxX, 4, opts.integerX);
      const xScale = (v) => padL + (v / sc.max) * innerW;
      const svg = el('svg', { width: W, height: H, viewBox: '0 0 ' + W + ' ' + H, style: 'display:block' });

      sc.ticks.forEach(t => {
        const x = xScale(t);
        svg.appendChild(el('line', { x1: x, x2: x, y1: padT, y2: padT + innerH, stroke: COLORS.grid }));
        svg.appendChild(el('text', {
          x, y: padT + innerH + 16, 'text-anchor': 'middle',
          fill: COLORS.textMuted, 'font-size': 10, 'font-family': FONT
        }, opts.xFormat ? opts.xFormat(t) : fmtShortNumber(t)));
      });
      svg.appendChild(el('line', { x1: padL, x2: padL, y1: padT, y2: padT + innerH, stroke: COLORS.axis }));

      items.forEach((it, i) => {
        const y = padT + gapY * i + (gapY - barH) / 2;
        const w = Math.max(1, xScale(it.value) - padL);
        svg.appendChild(el('text', {
          x: padL - 10, y: y + barH / 2 + 4, 'text-anchor': 'end',
          fill: COLORS.text, 'font-size': 12, 'font-weight': 600, 'font-family': FONT
        }, it.label));
        svg.appendChild(el('rect', { x: padL, y, width: w, height: barH, fill: it.color || COLORS.flujo, rx: 4, opacity: 0.9 }));
        svg.appendChild(el('text', {
          x: padL + w + 8, y: y + barH / 2 + 4, 'text-anchor': 'start',
          fill: COLORS.text, 'font-size': 12, 'font-weight': 700, 'font-family': FONT
        }, opts.valueFormat ? opts.valueFormat(it.value) : fmtShortNumber(it.value)));
      });
      if (opts.title) {
        svg.appendChild(el('text', { x: 2, y: 18, fill: COLORS.text, 'font-size': 13, 'font-weight': 600, 'font-family': FONT }, opts.title));
      }
      container.appendChild(svg);
    }

    // ==================== RADAR ====================
    function radar(container, opts) {
      if (!container) return;
      container.innerHTML = '';
      const dims = opts.dimensions || [];
      const series = (opts.series || []).filter(s => s && s.values && s.values.length === dims.length);
      if (dims.length < 3 || !series.length) return emptyState(container);
      const W = opts.width || container.clientWidth || 500;
      const H = opts.height || 400;
      const cx = W / 2, cy = H / 2 + 6;
      const R = Math.min(W - 130, H - 100) / 2;
      if (R <= 20) return emptyState(container);
      const nDim = dims.length;
      const svg = el('svg', { width: W, height: H, viewBox: '0 0 ' + W + ' ' + H, style: 'display:block' });
      const ang = (i) => (i / nDim) * 2 * Math.PI - Math.PI / 2;

      for (let g = 1; g <= 4; g++) {
        const r = (g / 4) * R;
        const pts = [];
        for (let i = 0; i < nDim; i++) pts.push((cx + r * Math.cos(ang(i))) + ',' + (cy + r * Math.sin(ang(i))));
        svg.appendChild(el('polygon', { points: pts.join(' '), fill: 'none', stroke: COLORS.grid, 'stroke-width': 1 }));
      }
      dims.forEach((d, i) => {
        const a = ang(i);
        svg.appendChild(el('line', { x1: cx, y1: cy, x2: cx + R * Math.cos(a), y2: cy + R * Math.sin(a), stroke: COLORS.grid }));
        const lx = cx + (R + 22) * Math.cos(a), ly = cy + (R + 22) * Math.sin(a);
        const anchor = Math.abs(Math.cos(a)) < 0.3 ? 'middle' : (Math.cos(a) > 0 ? 'start' : 'end');
        svg.appendChild(el('text', {
          x: lx, y: ly + 4, 'text-anchor': anchor,
          fill: COLORS.textMuted, 'font-size': 10.5, 'font-weight': 600, 'font-family': FONT
        }, d));
      });
      series.forEach(s => {
        const pts = s.values.map((v, i) => {
          const r = Math.max(0.02, Math.min(1, v || 0)) * R;
          return (cx + r * Math.cos(ang(i))) + ',' + (cy + r * Math.sin(ang(i)));
        });
        svg.appendChild(el('polygon', {
          points: pts.join(' '), fill: s.color || COLORS.flujo, 'fill-opacity': 0.12,
          stroke: s.color || COLORS.flujo, 'stroke-width': 2, 'stroke-linejoin': 'round'
        }));
        s.values.forEach((v, i) => {
          const r = Math.max(0.02, Math.min(1, v || 0)) * R;
          svg.appendChild(el('circle', { cx: cx + r * Math.cos(ang(i)), cy: cy + r * Math.sin(ang(i)), r: 3, fill: s.color || COLORS.flujo }));
        });
      });
      if (opts.title) {
        svg.appendChild(el('text', { x: cx, y: 16, 'text-anchor': 'middle', fill: COLORS.text, 'font-size': 13, 'font-weight': 600, 'font-family': FONT }, opts.title));
      }
      let lx = 14, ly = H - 6;
      series.forEach(s => {
        svg.appendChild(el('rect', { x: lx, y: ly - 9, width: 11, height: 10, fill: s.color || COLORS.flujo, rx: 2 }));
        svg.appendChild(el('text', { x: lx + 16, y: ly, fill: COLORS.textMuted, 'font-size': 10.5, 'font-family': FONT }, s.name));
        lx += 16 + (s.name.length * 5.9) + 12;
      });
      container.appendChild(svg);
    }

    // ==================== DONUT ====================
    function donut(container, opts) {
      if (!container) return;
      container.innerHTML = '';
      const data = (opts.data || []).filter(d => d && d.value > 0);
      if (!data.length) return emptyState(container);
      const W = opts.width || container.clientWidth || 460;
      const legendH = data.length * 17 + 10;
      const H = opts.height || (300 + legendH * 0.3);
      const cx = W / 2, cy = (H - legendH) / 2 + 18;
      const R = Math.max(40, Math.min(W / 2 - 20, (H - legendH) / 2 - 14));
      const r = R * 0.56;
      const total = data.reduce((s, d) => s + d.value, 0);
      const svg = el('svg', { width: W, height: H, viewBox: '0 0 ' + W + ' ' + H, style: 'display:block' });
      const tip = makeTooltip(container);

      let a0 = -Math.PI / 2;
      data.forEach(d => {
        const slice = (d.value / total) * 2 * Math.PI;
        const a1 = a0 + slice;
        const x1 = cx + R * Math.cos(a0), y1 = cy + R * Math.sin(a0);
        const x2 = cx + R * Math.cos(a1), y2 = cy + R * Math.sin(a1);
        const xr1 = cx + r * Math.cos(a0), yr1 = cy + r * Math.sin(a0);
        const xr2 = cx + r * Math.cos(a1), yr2 = cy + r * Math.sin(a1);
        const large = slice > Math.PI ? 1 : 0;
        const path = el('path', {
          d: 'M ' + x1 + ' ' + y1 + ' A ' + R + ' ' + R + ' 0 ' + large + ' 1 ' + x2 + ' ' + y2 +
             ' L ' + xr2 + ' ' + yr2 + ' A ' + r + ' ' + r + ' 0 ' + large + ' 0 ' + xr1 + ' ' + yr1 + ' Z',
          fill: d.color, opacity: 0.9, style: 'cursor:pointer;transition:opacity .12s'
        });
        path.addEventListener('mouseenter', () => {
          path.setAttribute('opacity', 1);
          tip.innerHTML = '<strong>' + d.label + '</strong><br><span style="color:#8892a0">' +
            fmtShortNumber(d.value) + ' · ' + ((d.value / total) * 100).toFixed(1) + '%</span>';
          tip.style.opacity = 1;
          tip.style.left = Math.max(4, cx - 60) + 'px';
          tip.style.top = '6px';
        });
        path.addEventListener('mouseleave', () => { path.setAttribute('opacity', 0.9); tip.style.opacity = 0; });
        svg.appendChild(path);
        a0 = a1;
      });
      // Total al centro
      svg.appendChild(el('text', {
        x: cx, y: cy - 2, 'text-anchor': 'middle', fill: COLORS.text,
        'font-size': 16, 'font-weight': 700, 'font-family': FONT
      }, fmtShortNumber(total)));
      svg.appendChild(el('text', {
        x: cx, y: cy + 14, 'text-anchor': 'middle', fill: COLORS.textMuted,
        'font-size': 10, 'font-family': FONT
      }, 'Total'));

      if (opts.title) {
        svg.appendChild(el('text', { x: cx, y: 15, 'text-anchor': 'middle', fill: COLORS.text, 'font-size': 13, 'font-weight': 600, 'font-family': FONT }, opts.title));
      }
      let ly = H - legendH + 12;
      data.forEach(d => {
        svg.appendChild(el('rect', { x: 16, y: ly - 8, width: 10, height: 10, fill: d.color, rx: 2 }));
        const pct = ((d.value / total) * 100).toFixed(1) + '%';
        const lbl = d.label.length > 30 ? d.label.slice(0, 29) + '…' : d.label;
        svg.appendChild(el('text', { x: 32, y: ly, fill: COLORS.textMuted, 'font-size': 11, 'font-family': FONT }, lbl));
        svg.appendChild(el('text', {
          x: W - 14, y: ly, 'text-anchor': 'end', fill: COLORS.text,
          'font-size': 11, 'font-weight': 700, 'font-family': FONT
        }, pct));
        ly += 17;
      });
      container.appendChild(svg);
    }

    return { line, groupedBar, donut, horizontalBar, radar, COLORS, fmtShortNumber, niceScale };
  })();

  // ------------------------------------------------------------------------
  // Engine — motor financiero + motor de recálculo de grillas
  // ------------------------------------------------------------------------
  function computeFinanciamiento(project) {
    const p = project && project.parametros;
    if (!p || !p.financiado) return null;
    const monto = p.montoFinanciar || p.inversionInicial || 0;
    if (!monto || monto <= 0) return null;
    const H = project.meta.horizonteMeses;
    const im = DataModel.annualToMonthly(p.tasaFinanciamientoAnual || 0);
    const io = DataModel.annualToMonthly(p.costoOportunidadAnual  || 0);
    let cuota = im > 0
      ? monto * (im * Math.pow(1+im, H)) / (Math.pow(1+im, H) - 1)
      : monto / H;
    const flujoFin = new Array(H + 1).fill(0);
    for (let i = 1; i <= H; i++) flujoFin[i] = -cuota;
    const costoOportunidad = io > 0 ? monto * (Math.pow(1+io, H) - 1) : 0;
    const costoCredito = (cuota * H) - monto;
    return { cuota, flujoFin, costoOportunidad, costoCredito, monto };
  }

  const Engine = {
    // Devuelve meses de periodicidad
    _periodMonths(periodicidad, horizonte) {
      const p = DataModel.PERIODICIDADES[periodicidad];
      if (p == null) return horizonte + 1;  // 'Unico' = una sola vez
      return p;
    },

    /**
     * Construye la grilla mensual de una línea.
     * Retorna array de longitud horizonte+1 (índice 0 = mes 0).
     * Dispatch según linea.tipoCalculo.
     */
    buildLineGrid(linea, escenario, project, ingresosAcum) {
      const H = project.meta.horizonteMeses;
      const N = H + 1;
      const grid = new Array(N).fill(0);
      const tipo = linea.tipoCalculo || 'periodico';

      if (tipo === 'cantidadServicios') {
        // Es la fila que almacena la cantidad de servicios (row driver)
        const qty = (project.cantidadServicios && project.cantidadServicios[escenario]) || [];
        for (let i = 0; i < N; i++) grid[i] = qty[i] || 0;
        return grid;
      }

      if (tipo === 'porServicio') {
        // valor mensual = cantidad servicios[mes] × multiplicador
        const qty = (project.cantidadServicios && project.cantidadServicios[escenario]) || [];
        let mult = linea.valorBase || 0;
        // Casos especiales del seed
        const cfg = linea.configPorServicio;
        if (cfg && cfg.valor) mult = cfg.valor;
        for (let i = 0; i < N; i++) grid[i] = (qty[i] || 0) * mult;
        return grid;
      }

      if (tipo === 'fijoMensual') {
        // valorBase × %esc constante desde mesInicio hasta mesFin
        const pct = (linea.escenariosPct && linea.escenariosPct[escenario]) != null
          ? linea.escenariosPct[escenario] : 1;
        let mi = (linea.configFijo && linea.configFijo.mesInicio != null)
          ? linea.configFijo.mesInicio : (linea.mesInicio != null ? linea.mesInicio : 1);
        let mf = (linea.configFijo && linea.configFijo.mesFin != null)
          ? linea.configFijo.mesFin : (linea.mesFin != null ? linea.mesFin : H);
        mi = Math.max(0, mi); mf = Math.min(H, mf);
        const val = (linea.valorBase || 0) * pct;
        for (let i = mi; i <= mf; i++) grid[i] = val;
        return grid;
      }

      if (tipo === 'porcentajeIngreso') {
        // % sobre los ingresos del mes. El % vive en linea.pctIngreso
        // (en el Excel es la columna G — el VLOOKUP siempre lee esa columna,
        // sin importar el escenario). Fallback a escenariosPct por compatibilidad.
        let pct = linea.pctIngreso;
        if (pct == null) {
          pct = (linea.escenariosPct && linea.escenariosPct[escenario] != null)
            ? linea.escenariosPct[escenario] : 0;
        }
        const mi = linea.mesInicio != null ? linea.mesInicio : 1;
        const mf = Math.min(H, linea.mesFin != null ? linea.mesFin : H);
        const ing = ingresosAcum || new Array(N).fill(0);
        for (let i = Math.max(0, mi); i <= mf; i++) grid[i] = (ing[i] || 0) * pct;
        return grid;
      }

      // Default: periódico (patrón P5 del Excel — el dominante)
      const pct = (linea.escenariosPct && linea.escenariosPct[escenario]) != null
        ? linea.escenariosPct[escenario] : 1;
      const factor = (linea.valorBase || 0) * pct;
      if (factor === 0) return grid;
      const period = this._periodMonths(linea.periodicidad, H);
      const mi = linea.mesInicio != null ? linea.mesInicio : 1;
      const mf = Math.min(H, linea.mesFin != null ? linea.mesFin : H);
      const porcAplicable = linea.porcAplicable != null ? linea.porcAplicable : 0;
      const ipcAnual = (project.parametros && project.parametros.ipcAnual) || 0;
      // Arranca en 0: hay líneas (p.ej. Capex) con mesInicio = mesFin = 0
      for (let n = 0; n <= H; n++) {
        if (n < mi || n > mf) continue;
        if ((n - mi) % period !== 0) continue;
        const periodsSince = Math.floor((n - mi) / period);
        const base = factor + porcAplicable * periodsSince;
        // IPC compone anualmente: exponente = INT((n-1)/12), nunca negativo
        const anosPasados = Math.max(0, Math.floor((n - 1) / 12));
        grid[n] = base * Math.pow(1 + ipcAnual, anosPasados);
      }
      return grid;
    },

    /**
     * Recomputa las grillas de todas las líneas de todos los escenarios.
     * Guarda el resultado en project.grillas.
     * Se llama automáticamente cuando el usuario edita cualquier input.
     */
    recomputeGrillas(project) {
      if (!project.grillas) project.grillas = { O: {}, R: {}, C: {}, P: {} };
      DataModel.ESCENARIOS.forEach(esc => {
        if (!project.grillas[esc]) project.grillas[esc] = {};
        // Fase 1: computar todas las líneas SIN porcentajeIngreso
        const H = project.meta.horizonteMeses;
        const ingresosVec = new Array(H + 1).fill(0);
        for (const l of project.lineas) {
          if (l.tipoCalculo === 'porcentajeIngreso') continue;
          const g = this.buildLineGrid(l, esc, project);
          project.grillas[esc][l.id] = g;
          if ((l.naturaleza || '').toLowerCase() === 'ingreso') {
            for (let i = 0; i <= H; i++) ingresosVec[i] += g[i];
          }
        }
        // Fase 2: computar líneas de tipo porcentajeIngreso con el vector de ingresos
        for (const l of project.lineas) {
          if (l.tipoCalculo !== 'porcentajeIngreso') continue;
          project.grillas[esc][l.id] = this.buildLineGrid(l, esc, project, ingresosVec);
        }
      });
      project.meta.usaGrillasOriginales = false;
      return project;
    },

    /**
     * Restaura las grillas al snapshot original del Excel (si existe).
     */
    restoreOriginalGrids(project) {
      if (project.grillasOriginal) {
        project.grillas = JSON.parse(JSON.stringify(project.grillasOriginal));
        project.meta.usaGrillasOriginales = true;
      }
      return project;
    },

    aggregateByNaturaleza(project, escenario) {
      const H = project.meta.horizonteMeses;
      const N = H + 1;
      const ingresos = new Array(N).fill(0), costos = new Array(N).fill(0), gastos = new Array(N).fill(0);
      const grid = (project.grillas && project.grillas[escenario]) || {};
      for (const linea of project.lineas) {
        const v = grid[linea.id] || [];
        const nat = (linea.naturaleza || '').trim().toLowerCase();
        for (let i = 0; i < N; i++) {
          const x = v[i] || 0;
          if (nat === 'ingreso') ingresos[i] += x;
          else if (nat === 'costo' || nat === 'inversion') costos[i] += x;
          else if (nat === 'gastos') gastos[i] += x;
        }
      }
      return { ingresos, costos, gastos };
    },
    cashFlow(project, escenario) {
      const a = this.aggregateByNaturaleza(project, escenario);
      const base = a.ingresos.map((_, i) => a.ingresos[i] - a.costos[i] - a.gastos[i]);
      // Si está financiado, agregar cuotas al flujo (sin cambiar los totales del P&L)
      if (project && project.parametros && project.parametros.financiado) {
        const fin = computeFinanciamiento(project);
        if (fin) {
          // Mes 0: la inversión ya está en el flujo; si está financiada, se neutraliza
          // y se reemplaza por las cuotas
          base[0] = 0;
          for (let i = 1; i < base.length; i++) base[i] += fin.flujoFin[i];
        }
      }
      return base;
    },
    npv(flujos, monthlyRate) {
      let total = flujos[0];
      for (let i = 1; i < flujos.length; i++) total += flujos[i] / Math.pow(1 + monthlyRate, i);
      return total;
    },
    irr(flujos, guess) {
      guess = guess == null ? 0.01 : guess;
      let r = guess;
      for (let it = 0; it < 500; it++) {
        let f = 0, fp = 0;
        for (let i = 0; i < flujos.length; i++) {
          const denom = Math.pow(1 + r, i);
          f += flujos[i] / denom;
          fp += -i * flujos[i] / (denom * (1 + r));
        }
        if (Math.abs(fp) < 1e-15) break;
        const rn = r - f / fp;
        if (!isFinite(rn)) break;
        if (Math.abs(rn - r) < 1e-10) return { mensual: rn, anual: Math.pow(1 + rn, 12) - 1 };
        r = rn;
      }
      return { mensual: null, anual: null };
    },
    payback(flujos) {
      let acc = 0;
      for (let i = 0; i < flujos.length; i++) {
        acc += flujos[i];
        if (acc >= 0 && i > 0) {
          const prev = acc - flujos[i];
          if (flujos[i] === 0) return i;
          return (i - 1) + Math.abs(prev) / flujos[i];
        }
      }
      return null;
    },
    discountedPayback(flujos, monthlyRate) {
      const disc = flujos.map((f, i) => f / Math.pow(1 + monthlyRate, i));
      return this.payback(disc);
    },
    computeScenarioSnapshot(project, escenario) {
      const agg = this.aggregateByNaturaleza(project, escenario);
      const flujo = this.cashFlow(project, escenario);
      const H = project.meta.horizonteMeses;
      const p = project.parametros;
      const tasaMensual = DataModel.annualToMonthly(p.tasaDescuentoAnual);
      const sumFrom1 = (v) => v.slice(1, H + 1).reduce((s, x) => s + x, 0);
      const totalIngresos = sumFrom1(agg.ingresos);
      const totalCostos = sumFrom1(agg.costos);
      const totalGastos = sumFrom1(agg.gastos);
      const margenBruto = totalIngresos - totalCostos;
      const margenBrutoPct = totalIngresos ? margenBruto / totalIngresos : null;
      const uai = margenBruto - totalGastos;
      const margenEbitPct = totalIngresos ? uai / totalIngresos : null;
      const impuesto = Math.max(0, uai * p.tasaImpositiva);
      const utilidadNeta = uai - impuesto;
      const margenNetoPct = totalIngresos ? utilidadNeta / totalIngresos : null;
      const van = this.npv(flujo, tasaMensual);
      const tir = this.irr(flujo);
      // Inversión = param explícito del proyecto; si 0, suma meses negativos al inicio
      let inversion = (project && project.parametros && project.parametros.inversionInicial) || 0;
      if (!inversion) {
        for (let _i = 0; _i < flujo.length && flujo[_i] < 0; _i++) inversion += Math.abs(flujo[_i]);
      }
      const ir = inversion ? van / inversion : null;
      const paybackMeses = this.payback(flujo);
      const paybackDescMeses = this.discountedPayback(flujo, tasaMensual);
      let depreciacion = 0, amortizacion = 0;
      const grid = (project.grillas && project.grillas[escenario]) || {};
      for (const linea of project.lineas) {
        const v = grid[linea.id] || [];
        const suma = sumFrom1(v);
        if (linea.esDepreciacion) depreciacion += suma;
        if (linea.esAmortizacion) amortizacion += suma;
      }
      const ebitda = uai + depreciacion + amortizacion;
      const ebitdaPct = totalIngresos ? ebitda / totalIngresos : null;
      const _fin = computeFinanciamiento(project);
      return {
        totalIngresos, totalCostos, margenBruto, margenBrutoPct,
        totalGastos, uai, margenEbitPct, impuesto, utilidadNeta, margenNetoPct,
        van, tirMensual: tir.mensual, tirAnual: tir.anual,
        ir, paybackMeses, paybackDescMeses,
        ebitda, ebitdaPct, depreciacion, amortizacion,
        inversionInicial: inversion,
        inversionTotal: (project && project.parametros && project.parametros.inversionInicial) || inversion,
        costoOportunidad: _fin ? _fin.costoOportunidad : null,
        costoCredito:     _fin ? _fin.costoCredito     : null,
        cuotaMensual:     _fin ? _fin.cuota            : null,
        flujoMensual: flujo,
        ingresosMensuales: agg.ingresos, costosMensuales: agg.costos, gastosMensuales: agg.gastos
      };
    }
  };

  // ------------------------------------------------------------------------
  // App state + rendering
  // ------------------------------------------------------------------------
  let currentProject = null;
  let currentScenario = 'R';
  let dirty = false;  // hay cambios sin guardar

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function ensureSeedProject() {
    const list = Storage.listProjects();
    if (list.some(p => p.id === DEFAULT_PROJECT_ID)) return;
    Storage.saveProject(JSON.parse(JSON.stringify(SEED_TURISMO_AVENTURA)));
    log('[PPM] Seed cargado');
  }

  function saveCurrentProject() {
    if (!currentProject) return;
    Storage.saveProject(currentProject);
    dirty = false;
    updateSaveBadge();
  }
  function markDirty() {
    dirty = true;
    updateSaveBadge();
  }
  function updateSaveBadge() {
    const b = document.getElementById('save-badge');
    if (!b) return;
    b.textContent = dirty ? '● Sin guardar' : '✓ Guardado local';
    b.className = 'save-badge ' + (dirty ? 'dirty' : 'clean');
    // Resaltar botón guardar local cuando hay cambios sin guardar
    const bl = document.getElementById('btn-save-local');
    if (bl) bl.classList.toggle('btn-save-local-dirty', dirty);
  }

  function renderProjectHeader(p) {
    const el = document.getElementById('project-header');
    if (!el || !p) return;
    const gridSource = p.meta.usaGrillasOriginales ? '<span class="badge badge-info">Grillas del Excel</span>' : '<span class="badge badge-warning">Grillas recalculadas</span>';
    el.innerHTML =
      '<h1>' + esc(p.meta.nombre) + '</h1>' +
      '<div class="project-meta">' +
        '<span class="badge badge-' + p.meta.estado + '">' + DataModel.ESTADOS_NOMBRE[p.meta.estado] + '</span>' +
        '<span class="badge badge-' + currentScenario + '">' + DataModel.ESCENARIOS_NOMBRE[currentScenario] + '</span>' +
        gridSource +
        '<span>' + esc(p.meta.cliente || 'Sin cliente') + '</span>' +
        '<span>·</span>' +
        '<span>Horizonte: ' + Fmt.horizonte(p.meta.horizonteMeses) + '</span>' +
        '<span>·</span>' +
        '<span>' + p.meta.moneda + '</span>' +
      '</div>';
  }

  function statCard(label, value, sub, cls, akey) {
    const dAttr = akey ? ' data-analysis-key="' + akey + '"' : '';
    return '<div class="stat-card' + (cls ? ' ' + cls : '') + '"' + dAttr + '>' +
      '<div class="stat-label">' + esc(label) + '</div>' +
      '<div class="stat-value">' + value + '</div>' +
      (sub ? '<div class="stat-sub">' + sub + '</div>' : '') +
      '</div>';
  }

  // -------------------- Dashboard --------------------
  function renderDashboard(p) {

    const cur = p.meta.moneda;
    el.innerHTML =
      // ── KPIs ────────────────────────────────────────────────
      '<div class="dash-section-hdr">KPIs financieros <span class="dash-esc-tag">' + DataModel.ESCENARIOS_NOMBRE[currentScenario] + '</span></div>' +
      '<div class="stats-grid stats-grid-tight">' +
        statCard('VAN', Fmt.money(s.van, cur), s.van >= 0 ? '✓ Genera valor' : '✗ Destruye valor', s.van >= 0 ? 'stat-card--success' : 'stat-card--danger', 'van') +
        statCard('TIR mensual', Fmt.pct(s.tirMensual, 2), 'Anual equiv.: ' + Fmt.pct(s.tirAnual, 1), 'stat-card--primary', 'tirMensual') +
        statCard('ROI', Fmt.num(s.ir, 2) + '×', 'VAN / inversión total', 'stat-card--primary', 'ir') +
        statCard('Payback', Fmt.months(s.paybackMeses), s.paybackDescMeses != null ? 'Desc.: ' + Fmt.months(s.paybackDescMeses) : null, '', 'paybackMeses') +
        statCard('EBITDA', Fmt.money(s.ebitda, cur), Fmt.pct(s.ebitdaPct, 1) + ' sobre ingresos', '', 'ebitda') +
        statCard('Margen bruto', Fmt.pct(s.margenBrutoPct, 1), Fmt.money(s.margenBruto, cur), 'stat-card--primary', 'margenBrutoPct') +
        statCard('Utilidad neta', Fmt.money(s.utilidadNeta, cur), Fmt.pct(s.margenNetoPct, 1) + ' margen neto', s.utilidadNeta >= 0 ? 'stat-card--success' : 'stat-card--danger', 'margenNetoPct') +
        statCard('EBIT', Fmt.money(s.uai, cur), Fmt.pct(s.margenEbitPct, 1), '', 'uai') +
        statCard('Ingresos', Fmt.money(s.totalIngresos, cur), 'Total ' + Fmt.horizonte(p.meta.horizonteMeses), 'stat-card--success', 'totalIngresos') +
        statCard('Costos directos', Fmt.money(s.totalCostos, cur), Fmt.pct(s.totalCostos / (s.totalIngresos||1), 1) + ' de ingresos', '', 'totalCostos') +
        statCard('Gastos', Fmt.money(s.totalGastos, cur), Fmt.pct(s.totalGastos / (s.totalIngresos||1), 1) + ' de ingresos', '', 'totalGastos') +

  function renderCashFlowChart(container, snapshot, currency, title) {
    if (!container) return;
    const labels = snapshot.flujoMensual.map((_, i) => 'M' + i);
    const acc = []; let a = 0;
    for (const v of snapshot.flujoMensual) { a += v; acc.push(a); }
    SvgChart.line(container, {
      title: title || 'Flujo de Caja Mensual', height: 360, xLabels: labels,
      tipFormat: (v) => Fmt.money(v, currency),
      series: [
        { name: 'Flujo neto (mes)', color: SvgChart.COLORS.flujo, type: 'bar', values: snapshot.flujoMensual },
        { name: 'Flujo acumulado', color: SvgChart.COLORS.acumulado, type: 'line', values: acc }
      ]
    });
  }
  function renderRevenueVsCostsChart(container, snapshot, currency) {
    if (!container) return;
    const labels = snapshot.flujoMensual.map((_, i) => 'M' + i);
    const egresos = snapshot.costosMensuales.map((v, i) => v + (snapshot.gastosMensuales[i] || 0));
    SvgChart.line(container, {
      title: 'Ingresos vs Egresos totales (costos + gastos)', height: 320, xLabels: labels,
      tipFormat: (v) => Fmt.money(v, currency),
      series: [
        { name: 'Ingresos', color: SvgChart.COLORS.ingreso, type: 'area', values: snapshot.ingresosMensuales },
        { name: 'Egresos', color: SvgChart.COLORS.costo, type: 'area', values: egresos },
        { name: 'Costos', color: SvgChart.COLORS.gasto, type: 'line', width: 1.6, dashed: true, values: snapshot.costosMensuales }
      ]
    });
  }
  function renderCostBreakdownDonut(container, project, escenario) {
    if (!container) return;
    const grid = (project.grillas && project.grillas[escenario]) || {};
    const H = project.meta.horizonteMeses;
    const buckets = {};
    for (const linea of project.lineas) {
      const nat = (linea.naturaleza || '').trim().toLowerCase();
      if (nat !== 'costo' && nat !== 'gastos') continue;
      const key = linea.concepto || linea.detalle || 'Otro';
      const v = grid[linea.id] || [];
      let s = 0;
      for (let i = 1; i <= H; i++) s += (v[i] || 0);
      if (s <= 0) continue;
      buckets[key] = (buckets[key] || 0) + s;
    }
    const entries = Object.entries(buckets).sort((a, b) => b[1] - a[1]);
    const top = entries.slice(0, 6);
    const otros = entries.slice(6).reduce((s, [, v]) => s + v, 0);
    if (otros > 0) top.push(['Otros', otros]);
    const palette = ['#4f9eff', '#ef5350', '#ffa726', '#4caf50', '#a78bfa', '#ec4899', '#8892a0'];
    const data = top.map(([label, value], i) => ({ label, value, color: palette[i % palette.length] }));
    SvgChart.donut(container, { title: 'Composición de Costos + Gastos (top 7)', width: 480, height: 340, data });
  }

  // -------------------- Comparador --------------------
  function renderComparador(p) {
    const el = document.getElementById('comparador-content');
    if (!el || !p) return;
    const cur = p.meta.moneda;
    const snaps = {};
    DataModel.ESCENARIOS.forEach(e => snaps[e] = Engine.computeScenarioSnapshot(p, e));

    // Ganador por KPI
    const bestBy = (fn, higherBetter) => {
      let best = null, bestV = null;
      DataModel.ESCENARIOS.forEach(e => {
        const v = fn(snaps[e]);
        if (v == null || !isFinite(v)) return;
        if (bestV == null || (higherBetter ? v > bestV : v < bestV)) { bestV = v; best = e; }
      });
      return best;
    };
    const winVAN = bestBy(s => s.van, true);
    const winTIR = bestBy(s => s.tirAnual, true);
    const winPB  = bestBy(s => s.paybackMeses, false);
    const winUN  = bestBy(s => s.utilidadNeta, true);

    // Tarjetas resumen por escenario
    const cards = DataModel.ESCENARIOS.map(e => {
      const ss = snaps[e];
      const active = e === currentScenario;
      const totalServ = ((p.cantidadServicios && p.cantidadServicios[e]) || []).reduce((a, b) => a + (b || 0), 0);
      const wins = [];
      if (winVAN === e) wins.push('VAN');
      if (winTIR === e) wins.push('TIR');
      if (winPB === e) wins.push('Payback');
      if (winUN === e) wins.push('Utilidad');
      return '<div class="comp-card comp-' + e + (active ? ' comp-active' : '') + '">' +
        '<div class="comp-card-head">' +
          '<div class="comp-card-name">' + DataModel.ESCENARIOS_NOMBRE[e] + '</div>' +

        '</div>' +
        (wins.length ? '<div class="comp-wins">🏆 Mejor en: ' + wins.join(' · ') + '</div>' : '<div class="comp-wins comp-wins-empty">—</div>') +
        '<div class="comp-card-kpis">' +
          '<div><span>Servicios</span><strong>' + Fmt.num(totalServ) + '</strong></div>' +
          '<div><span>Inversión</span><strong>' + Fmt.money(p.parametros.inversionInicial, cur) + '</strong></div>' +
        '<div><span>Ingresos</span><strong>' + Fmt.money(ss.totalIngresos, cur) + '</strong></div>' +
          '<div><span>Costos</span><strong>' + Fmt.money(ss.totalCostos, cur) + '</strong></div>' +

          '<div><span>TIR mensual</span><strong>' + Fmt.pct(ss.tirMensual, 2) + '</strong></div>' +

    // Tabla completa con highlight del mejor

      ['Cuota mensual', 'cuotaMensual', 'money', false],

      ['Impuesto', 'impuesto', 'money', false],
      ['Utilidad Neta', 'utilidadNeta', 'money', true],

  function ensureCantidadServiciosConfig(p) {
    if (!p.cantidadServiciosConfig) p.cantidadServiciosConfig = {};
    DataModel.ESCENARIOS.forEach(e => {
      if (!p.cantidadServiciosConfig[e]) p.cantidadServiciosConfig[e] = {
        mesInicio: 3, cantidadInicial: 0, cantidadObjetivo: 5,
        mesesRampUp: 6, crecimientoAnualPct: 0.0
      };
    });
    // Default distinct per escenario (solo si no había config previa)
    if (p.meta.id === DEFAULT_PROJECT_ID && !p.cantidadServiciosConfig._customized) {
      p.cantidadServiciosConfig.O = { mesInicio: 3, cantidadInicial: 2, cantidadObjetivo: 7, mesesRampUp: 6, crecimientoAnualPct: 0.10 };
      p.cantidadServiciosConfig.R = { mesInicio: 3, cantidadInicial: 1, cantidadObjetivo: 5, mesesRampUp: 6, crecimientoAnualPct: 0.05 };
      p.cantidadServiciosConfig.C = { mesInicio: 4, cantidadInicial: 1, cantidadObjetivo: 4, mesesRampUp: 8, crecimientoAnualPct: 0.00 };
      p.cantidadServiciosConfig.P = { mesInicio: 4, cantidadInicial: 0, cantidadObjetivo: 3, mesesRampUp: 10, crecimientoAnualPct: 0.00 };
      p.cantidadServiciosConfig._customized = true;
    }
  }

  /**
   * Genera vector de cantidades para un escenario según su config.
   * Modelo: cero antes de mesInicio, ramp lineal de cantidadInicial a cantidadObjetivo
   * durante mesesRampUp meses, luego crecimiento anual compuesto.
   */
  function generateCantidadServicios(cfg, H) {
    const arr = new Array(H + 1).fill(0);
    const mi = Math.max(0, Math.round(cfg.mesInicio || 1));
    const ci = Math.max(0, cfg.cantidadInicial || 0);
    const co = Math.max(0, cfg.cantidadObjetivo || 0);
    const rp = Math.max(0, Math.round(cfg.mesesRampUp || 0));
    const g = cfg.crecimientoAnualPct || 0;

    for (let mes = 0; mes <= H; mes++) {
      if (mes < mi) { arr[mes] = 0; continue; }
      const msSinceStart = mes - mi;
      let qty;
      if (rp === 0) {
        qty = co;
      } else if (msSinceStart < rp) {
        const t = msSinceStart / rp;
        qty = ci + (co - ci) * t;
      } else {
        const monthsAfterRamp = msSinceStart - rp;
        const yearsAfterRamp = monthsAfterRamp / 12;
        qty = co * Math.pow(1 + g, yearsAfterRamp);
      }
      arr[mes] = Math.round(qty);
    }
    return arr;
  }

  function applyGeneratorToScenario(p, esc) {
    ensureCantidadServiciosConfig(p);
    const H = p.meta.horizonteMeses;
    if (!p.cantidadServicios) p.cantidadServicios = {};
    p.cantidadServicios[esc] = generateCantidadServicios(p.cantidadServiciosConfig[esc], H);
    p.cantidadServiciosConfig._customized = true;
  }

  function applyGeneratorAll(p) {
    DataModel.ESCENARIOS.forEach(e => applyGeneratorToScenario(p, e));
  }

        '<td><input class="lin-input pct" id="lin-c-' + idx + '" type="number" step="0.05" value="' + ((l.escenariosPct && l.escenariosPct.C) != null ? l.escenariosPct.C : 1) + '"/></td>' +
        '<td><input class="lin-input pct" id="lin-p-' + idx + '" type="number" step="0.05" value="' + ((l.escenariosPct && l.escenariosPct.P) != null ? l.escenariosPct.P : 1) + '"/></td>' +

        '<td><input class="lin-input check" id="lin-dep-' + idx + '" type="checkbox"' + (l.esDepreciacion ? ' checked' : '') + '/></td>' +
        '<td><input class="lin-input check" id="lin-amo-' + idx + '" type="checkbox"' + (l.esAmortizacion ? ' checked' : '') + '/></td>' +
        '<td><button class="btn-danger-sm" data-del-idx="' + idx + '" title="Eliminar línea">✕</button></td>' +
      '</tr>';
    });

    el.innerHTML =
      '<h3 class="form-section-title">Plan de Cuentas <small>' + p.lineas.length + ' líneas · edición inline</small></h3>' +
      '<div class="form-actions" style="margin: 0 0 12px;">' +
        '<button class="btn btn-primary" id="btn-add-linea">+ Agregar línea</button>' +
      '</div>' +
      '<div class="table-scroll table-scroll-big">' +
        '<table class="edit-grid plan-grid"><thead>' + head + '</thead><tbody>' + body + '</tbody></table>' +
      '</div>' +
      '<p class="form-hint">' +
        '<strong>Consejo:</strong> Cambia el <em>valorBase</em>, un porcentaje o la periodicidad y los KPIs del dashboard se actualizan al instante. ' +
        'Para líneas tipo <em>por servicio</em>, el valor multiplica la <em>cantidad de servicios</em> del mes en cada escenario.' +
      '</p>';

    // Wire edits
    p.lineas.forEach((l, idx) => {
      const bindStr = (id, key) => {
        const inp = document.getElementById(id);
        if (!inp) return;
        inp.addEventListener('change', () => {
          l[key] = inp.value;
          markDirty(); _recomputeAndRerender();
        });
      };
      const bindNum = (id, key) => {
        const inp = document.getElementById(id);
        if (!inp) return;
        inp.addEventListener('change', () => {
          const v = parseFloat(inp.value);
          l[key] = isFinite(v) ? v : 0;
          markDirty(); _recomputeAndRerender();
        });
      };
      const bindPct = (id, escKey) => {
        const inp = document.getElementById(id);
        if (!inp) return;
        inp.addEventListener('change', () => {
          if (!l.escenariosPct) l.escenariosPct = { O: 1, R: 1, C: 1, P: 1 };
          const v = parseFloat(inp.value);
          l.escenariosPct[escKey] = isFinite(v) ? v : 0;
          markDirty(); _recomputeAndRerender();
        });
      };
      const bindCheck = (id, key) => {
        const inp = document.getElementById(id);
        if (!inp) return;
        inp.addEventListener('change', () => {
          l[key] = inp.checked;
          markDirty(); _recomputeAndRerender();
        });
      };
      bindStr('lin-nat-' + idx, 'naturaleza');
      bindStr('lin-concepto-' + idx, 'concepto');
      bindStr('lin-detalle-' + idx, 'detalle');
      bindNum('lin-vb-' + idx, 'valorBase');
      bindStr('lin-per-' + idx, 'periodicidad');
      bindPct('lin-o-' + idx, 'O');
      bindPct('lin-r-' + idx, 'R');
      bindPct('lin-c-' + idx, 'C');
      bindPct('lin-p-' + idx, 'P');
      bindNum('lin-mi-' + idx, 'mesInicio');
      bindNum('lin-mf-' + idx, 'mesFin');
      bindStr('lin-tipo-' + idx, 'tipoCalculo');
      bindCheck('lin-dep-' + idx, 'esDepreciacion');
      bindCheck('lin-amo-' + idx, 'esAmortizacion');
    });

    // Delete buttons
    el.querySelectorAll('[data-del-idx]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.delIdx);
        const l = p.lineas[idx];
        if (!confirm('¿Eliminar la línea "' + (l.detalle || l.concepto || l.id) + '"?')) return;
        p.lineas.splice(idx, 1);
        // Limpiar las grillas de esa línea
        DataModel.ESCENARIOS.forEach(e => {
          if (p.grillas && p.grillas[e]) delete p.grillas[e][l.id];
        });
        markDirty();
        Engine.recomputeGrillas(p);
        saveCurrentProject();
        renderPlanEditor(p);
        renderDashboard(p);
        renderComparador(p);
        renderFlujo(p);
      });
    });

    // Add line
    document.getElementById('btn-add-linea').addEventListener('click', () => {
      const newL = {
        id: 'lin_' + Date.now() + '_' + Math.random().toString(36).slice(2, 5),
        naturaleza: 'Costo', concepto: '', detalle: 'Nueva línea',
        valorBase: 0, periodicidad: 'Mensual',
        escenariosPct: { O: 1, R: 1, C: 1, P: 1 },
        mesInicio: 1, mesFin: p.meta.horizonteMeses,
        porcAplicable: 0,
        tipoCalculo: 'periodico',
        pctIngreso: 0,
        esDepreciacion: false, esAmortizacion: false,
        tipoCosto: null
      };
      p.lineas.push(newL);
      markDirty();
      Engine.recomputeGrillas(p);
      saveCurrentProject();
      renderPlanEditor(p);
      renderDashboard(p);
    });

  function selectHtml(id, current, options, labelsMap) {
    return '<select class="lin-input" id="' + id + '">' +
      options.map(o => '<option value="' + esc(o) + '"' + (current === o ? ' selected' : '') + '>' + esc(labelsMap ? labelsMap[o] || o : o) + '</option>').join('') +
    '</select>';
  }

  // ========================================================================
  // Seguimiento — a nivel de línea del plan de cuentas
  // ========================================================================

  function ensureExecStructure(p) {
    const H = p.meta.horizonteMeses;
    if (!p.ejecucion) p.ejecucion = {};
    if (!p.ejecucion.porLinea) p.ejecucion.porLinea = {};
    if (!p.ejecucion.avances) p.ejecucion.avances = [];
    // Migración desde el modelo antiguo (mensual con ingresos/costos/gastos)
    if (p.ejecucion.mensual && Array.isArray(p.ejecucion.mensual) && p.ejecucion.mensual.length) {
      // conservar los avances si existían
      p.ejecucion.avances = p.ejecucion.mensual.map((r, i) => ({
        mes: i,
        avanceFisicoPct: r.avanceFisicoPct != null ? r.avanceFisicoPct : null,
        avanceFinancieroPct: r.avanceFinancieroPct != null ? r.avanceFinancieroPct : null
      }));
      delete p.ejecucion.mensual;
    }
    // Asegurar array por línea
    for (const l of p.lineas) {
      if (!p.ejecucion.porLinea[l.id]) p.ejecucion.porLinea[l.id] = new Array(H + 1).fill(null);
      while (p.ejecucion.porLinea[l.id].length < H + 1) p.ejecucion.porLinea[l.id].push(null);
      p.ejecucion.porLinea[l.id].length = H + 1;
    }
    while (p.ejecucion.avances.length < H + 1) {
      p.ejecucion.avances.push({ mes: p.ejecucion.avances.length, avanceFisicoPct: null, avanceFinancieroPct: null });
    }
    p.ejecucion.avances.length = H + 1;
  }

  // Agrega los reales por línea a totales mensuales por naturaleza
  function computeRealAggregates(p) {
    const H = p.meta.horizonteMeses;
    const ing = new Array(H + 1).fill(null);
    const cos = new Array(H + 1).fill(null);
    const gas = new Array(H + 1).fill(null);
    for (const l of p.lineas) {
      const nat = (l.naturaleza || '').trim().toLowerCase();
      const vec = p.ejecucion.porLinea[l.id] || [];
      for (let i = 0; i <= H; i++) {
        const v = vec[i];
        if (v == null) continue;
        if (nat === 'ingreso') ing[i] = (ing[i] || 0) + v;
        else if (nat === 'costo') cos[i] = (cos[i] || 0) + v;
        else if (nat === 'gastos') gas[i] = (gas[i] || 0) + v;
      }
    }
    return { ingresos: ing, costos: cos, gastos: gas };
  }

  function renderSeguimiento(p) {
    const el = document.getElementById('seguimiento-content');
    if (!el || !p) return;
    ensureExecStructure(p);
    const estado = p.meta.estado || 'planning';
    const habilitado = (estado === 'approved' || estado === 'tracking');

    let banner = '';
    if (!habilitado) {
      banner =
        '<div class="diff-banner warn">' +
          '<strong>Seguimiento inactivo.</strong> El proyecto está en estado <em>' + DataModel.ESTADOS_NOMBRE[estado] + '</em>. ' +
          'Para habilitar el ingreso de datos reales, cambia el estado a <em>Aprobado</em> o <em>En Seguimiento</em>. ' +
          '<button class="btn btn-primary" id="btn-approve-project" style="margin-left:10px;">Aprobar proyecto ahora</button>' +
        '</div>';
    } else {
      banner =
        '<div class="diff-banner">' +
          '<strong>Seguimiento activo.</strong> ' +
          (estado === 'approved' ? '<button class="btn btn-secondary" id="btn-mark-tracking" style="margin-left:10px;">Marcar como "En Seguimiento"</button>' : '') +
        '</div>';
    }

    el.innerHTML =
      banner +
      '<div class="req-tabs">' +
        '<button class="req-tab active" data-seg-tab="cierre">Cierre mensual</button>' +
        '<button class="req-tab" data-seg-tab="detalle">Detalle por línea</button>' +
        '<button class="req-tab" data-seg-tab="avances">Avances físico/financiero</button>' +
        '<button class="req-tab" data-seg-tab="analisis">Análisis y alertas</button>' +
      '</div>' +
      '<div id="seg-panel-cierre" class="req-panel active"></div>' +
      '<div id="seg-panel-detalle" class="req-panel"></div>' +
      '<div id="seg-panel-avances" class="req-panel"></div>' +
      '<div id="seg-panel-analisis" class="req-panel"></div>';

    const btnA = document.getElementById('btn-approve-project');
    if (btnA) btnA.addEventListener('click', () => { p.meta.estado = 'approved'; saveCurrentProject(); renderAll(); });
    const btnT = document.getElementById('btn-mark-tracking');
    if (btnT) btnT.addEventListener('click', () => { p.meta.estado = 'tracking'; saveCurrentProject(); renderAll(); });

    el.querySelectorAll('.req-tab').forEach(t => {
      t.addEventListener('click', () => {
        el.querySelectorAll('.req-tab').forEach(x => x.classList.remove('active'));
        el.querySelectorAll('.req-panel').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('seg-panel-' + t.dataset.segTab).classList.add('active');
        if (t.dataset.segTab === 'cierre') renderSegCierreMensual(p);
        if (t.dataset.segTab === 'detalle') renderSegDetallePorLinea(p);
        if (t.dataset.segTab === 'avances') renderSegAvances(p);
        if (t.dataset.segTab === 'analisis') renderSegAnalisis(p);
      });
    });
    renderSegCierreMensual(p);
  }

  // -------------------- Sub-panel: Cierre mensual --------------------
  let _segMesCierre = 1;

  function renderSegCierreMensual(p) {
    const el = document.getElementById('seg-panel-cierre');
    if (!el) return;
    const H = p.meta.horizonteMeses;
    const habilitado = (p.meta.estado === 'approved' || p.meta.estado === 'tracking');
    if (!_segMesCierre || _segMesCierre > H) _segMesCierre = 1;

    // Selector de mes
    let selHtml = '<div class="seg-controls">' +
      '<label>Mes a cerrar:</label>' +
      '<select id="sel-mes-cierre">';
    for (let i = 1; i <= H; i++) selHtml += '<option value="' + i + '"' + (_segMesCierre === i ? ' selected' : '') + '>Mes ' + i + '</option>';
    selHtml += '</select>' +
      '<button class="btn btn-secondary" id="btn-prev-mes">← Anterior</button>' +
      '<button class="btn btn-secondary" id="btn-next-mes">Siguiente →</button>' +
    '</div>';

    const snap = Engine.computeScenarioSnapshot(p, currentScenario);
    const mes = _segMesCierre;
    const grid = (p.grillas && p.grillas[currentScenario]) || {};
    const cur = p.meta.moneda;

    // Agrupamos por naturaleza
    const grupos = { Ingreso: [], Costo: [], Gastos: [] };
    for (const l of p.lineas) {
      if (l.tipoCalculo === 'cantidadServicios') continue;
      const nat = (l.naturaleza || '').trim();
      if (grupos[nat]) grupos[nat].push(l);
    }

    let subTotalesProy = { Ingreso: 0, Costo: 0, Gastos: 0 };
    let subTotalesReal = { Ingreso: 0, Costo: 0, Gastos: 0 };
    let body = '';
    ['Ingreso', 'Costo', 'Gastos'].forEach(nat => {
      if (grupos[nat].length === 0) return;
      body += '<tr class="group-header"><td colspan="6"><strong>' + nat + '</strong></td></tr>';
      grupos[nat].forEach(l => {
        const proy = (grid[l.id] || [])[mes] || 0;
        const real = (p.ejecucion.porLinea[l.id] || [])[mes];
        subTotalesProy[nat] += proy;
        if (real != null) subTotalesReal[nat] += real;
        const diff = real != null ? (real - proy) : null;
        const diffPct = (real != null && proy !== 0) ? diff / Math.abs(proy) : null;
        // Semáforo: para ingreso mayor es mejor, para costo/gasto menor es mejor
        let sem = '';
        if (real != null) {
          const better = (nat === 'Ingreso' && diff >= 0) || (nat !== 'Ingreso' && diff <= 0);
          const neutral = Math.abs(diffPct || 0) < 0.05;
          sem = neutral ? '<span class="chip chip-neutral">◐</span>' :
                better ? '<span class="chip chip-ok">▲</span>' :
                         '<span class="chip chip-bad">▼</span>';
        }
        body += '<tr>' +
          '<td class="linea-label">' + esc(l.detalle || l.concepto || l.id) + '</td>' +
          '<td class="text-muted small">' + esc(l.concepto || '') + '</td>' +
          '<td class="text-right">' + Fmt.money(proy, cur) + '</td>' +
          '<td><input class="seg-line-cell" data-lin="' + l.id + '" data-mes="' + mes + '" type="number" step="1" value="' + (real != null ? real : '') + '"' + (habilitado ? '' : ' disabled') + '/></td>' +
          '<td class="text-right ' + (diff == null ? '' : ((nat === 'Ingreso' ? diff : -diff) >= 0 ? 'pos' : 'neg')) + '">' + (diff != null ? Fmt.money(diff, cur) : '—') + '</td>' +
          '<td class="text-right">' + sem + '</td>' +
        '</tr>';
      });
    });

    // Subtotales
    let totalsHtml = '';
    ['Ingreso', 'Costo', 'Gastos'].forEach(nat => {
      totalsHtml += '<tr class="subtotal-row"><td><strong>Subtotal ' + nat + '</strong></td><td></td>' +
        '<td class="text-right"><strong>' + Fmt.money(subTotalesProy[nat], cur) + '</strong></td>' +
        '<td class="text-right"><strong>' + Fmt.money(subTotalesReal[nat], cur) + '</strong></td>' +
        '<td class="text-right ' + ((nat === 'Ingreso' ? subTotalesReal[nat] - subTotalesProy[nat] : subTotalesProy[nat] - subTotalesReal[nat]) >= 0 ? 'pos' : 'neg') + '"><strong>' + Fmt.money(subTotalesReal[nat] - subTotalesProy[nat], cur) + '</strong></td>' +
        '<td></td></tr>';
    });
    const flujoProy = subTotalesProy.Ingreso - subTotalesProy.Costo - subTotalesProy.Gastos;
    const flujoReal = subTotalesReal.Ingreso - subTotalesReal.Costo - subTotalesReal.Gastos;
    totalsHtml += '<tr class="total-row"><td colspan="2"><strong>Flujo Neto del mes</strong></td>' +
      '<td class="text-right"><strong>' + Fmt.money(flujoProy, cur) + '</strong></td>' +
      '<td class="text-right"><strong>' + Fmt.money(flujoReal, cur) + '</strong></td>' +
      '<td class="text-right ' + (flujoReal - flujoProy >= 0 ? 'pos' : 'neg') + '"><strong>' + Fmt.money(flujoReal - flujoProy, cur) + '</strong></td>' +
      '<td></td></tr>';

    el.innerHTML =
      selHtml +
      '<p class="form-hint">Cierre del <strong>Mes ' + mes + '</strong> · Escenario proyectado: <strong>' + DataModel.ESCENARIOS_NOMBRE[currentScenario] + '</strong>. Ingresa el valor real ejecutado en cada línea; el semáforo compara contra lo proyectado.</p>' +
      '<div class="table-scroll">' +
        '<table class="edit-grid seg-cierre-grid">' +
          '<thead><tr>' +
            '<th>Línea</th><th>Concepto</th>' +
            '<th class="text-right">Proyectado</th>' +
            '<th class="text-right">Real</th>' +
            '<th class="text-right">Variación</th>' +
            '<th></th>' +
          '</tr></thead>' +
          '<tbody>' + body + totalsHtml + '</tbody>' +
        '</table>' +
      '</div>';

    // Wire month selector
    document.getElementById('sel-mes-cierre').addEventListener('change', (e) => {
      _segMesCierre = parseInt(e.target.value);
      renderSegCierreMensual(p);
    });
    document.getElementById('btn-prev-mes').addEventListener('click', () => {
      if (_segMesCierre > 1) { _segMesCierre--; renderSegCierreMensual(p); }
    });
    document.getElementById('btn-next-mes').addEventListener('click', () => {
      if (_segMesCierre < H) { _segMesCierre++; renderSegCierreMensual(p); }
    });

    // Wire real cells
    el.querySelectorAll('.seg-line-cell').forEach(inp => {
      inp.addEventListener('change', () => {
        const lid = inp.dataset.lin, m = parseInt(inp.dataset.mes);
        const v = inp.value === '' ? null : parseFloat(inp.value);
        if (!p.ejecucion.porLinea[lid]) p.ejecucion.porLinea[lid] = new Array(H + 1).fill(null);
        p.ejecucion.porLinea[lid][m] = (v != null && isFinite(v)) ? v : null;
        markDirty();
        saveCurrentProject();
        renderSegCierreMensual(p);
      });
    });
  }

  // -------------------- Sub-panel: Detalle por línea (todas las líneas × todos los meses) --------------------
  function renderSegDetallePorLinea(p) {
    const el = document.getElementById('seg-panel-detalle');
    if (!el) return;
    const H = p.meta.horizonteMeses;
    const grid = (p.grillas && p.grillas[currentScenario]) || {};
    const cur = p.meta.moneda;

    let body = '';
    let totales = { Ingreso: { proy: 0, real: 0 }, Costo: { proy: 0, real: 0 }, Gastos: { proy: 0, real: 0 } };
    const grupos = { Ingreso: [], Costo: [], Gastos: [] };
    for (const l of p.lineas) {
      if (l.tipoCalculo === 'cantidadServicios') continue;
      const nat = (l.naturaleza || '').trim();
      if (grupos[nat]) grupos[nat].push(l);
    }
    ['Ingreso', 'Costo', 'Gastos'].forEach(nat => {
      grupos[nat].forEach(l => {
        const proyVec = grid[l.id] || [];
        const realVec = p.ejecucion.porLinea[l.id] || [];
        const proyTotal = proyVec.slice(1, H + 1).reduce((a, b) => a + (b || 0), 0);
        // Real total: solo meses donde el usuario ingresó valor
        let realTotal = 0, mesesConDato = 0;
        for (let i = 1; i <= H; i++) {
          if (realVec[i] != null) { realTotal += realVec[i]; mesesConDato++; }
        }
        const proyHastaAhora = proyVec.slice(1, mesesConDato + 1).reduce((a, b) => a + (b || 0), 0);
        totales[nat].proy += proyTotal;
        totales[nat].real += realTotal;
        const diff = realTotal - proyHastaAhora;
        const diffPct = proyHastaAhora !== 0 ? diff / Math.abs(proyHastaAhora) : null;
        const better = (nat === 'Ingreso' && diff >= 0) || (nat !== 'Ingreso' && diff <= 0);
        const neutral = mesesConDato === 0 || Math.abs(diffPct || 0) < 0.05;
        const sem = mesesConDato === 0 ? '<span class="chip chip-neutral">Sin datos</span>' :
                    neutral ? '<span class="chip chip-neutral">En rango</span>' :
                    better ? '<span class="chip chip-ok">Favorable</span>' : '<span class="chip chip-bad">Desfavorable</span>';
        body += '<tr>' +
          '<td>' + esc(l.detalle || l.concepto || l.id) + '</td>' +
          '<td class="text-muted small">' + esc(l.concepto || '') + '</td>' +
          '<td class="text-right">' + Fmt.money(proyTotal, cur) + '</td>' +
          '<td class="text-right">' + Fmt.money(realTotal, cur) + '</td>' +
          '<td class="text-muted">' + mesesConDato + ' de ' + H + '</td>' +
          '<td class="text-right ' + (diff == null ? '' : ((nat === 'Ingreso' ? diff : -diff) >= 0 ? 'pos' : 'neg')) + '">' + Fmt.money(diff, cur) + '</td>' +
          '<td class="text-right">' + Fmt.pct(diffPct, 1) + '</td>' +
          '<td>' + sem + '</td>' +
        '</tr>';
      });
      // Subtotal
      body += '<tr class="subtotal-row"><td colspan="2"><strong>Subtotal ' + nat + '</strong></td>' +
        '<td class="text-right"><strong>' + Fmt.money(totales[nat].proy, cur) + '</strong></td>' +
        '<td class="text-right"><strong>' + Fmt.money(totales[nat].real, cur) + '</strong></td>' +
        '<td></td>' +
        '<td class="text-right"><strong>' + Fmt.money(totales[nat].real - totales[nat].proy, cur) + '</strong></td>' +
        '<td></td><td></td></tr>';
    });

    el.innerHTML =
      '<p class="form-hint">Vista consolidada de todas las líneas del plan de cuentas, comparando el <strong>total proyectado</strong> (' + DataModel.ESCENARIOS_NOMBRE[currentScenario] + ' hasta el mes ' + H + ') con la <strong>ejecución real</strong> ingresada.</p>' +
      '<div class="table-scroll">' +
        '<table class="kpi-table sm">' +

    let head = '<tr><th>Mes</th><th>Avance físico (%)</th><th>Avance financiero (%)</th><th>Diferencia</th></tr>';
    let body = '';
    for (let i = 1; i <= H; i++) {
      const row = p.ejecucion.avances[i] || {};

      body += '<tr><td><strong>M' + i + '</strong></td>' +
        '<td><input class="av-cell" data-mes="' + i + '" data-key="avanceFisicoPct" type="number" step="0.1" min="0" max="100" value="' + (row.avanceFisicoPct != null ? row.avanceFisicoPct : '') + '"' + (habilitado ? '' : ' disabled') + '/></td>' +
        '<td><input class="av-cell" data-mes="' + i + '" data-key="avanceFinancieroPct" type="number" step="0.1" min="0" max="100" value="' + (row.avanceFinancieroPct != null ? row.avanceFinancieroPct : '') + '"' + (habilitado ? '' : ' disabled') + '/></td>' +
        '<td class="' + (dif == null ? '' : (Math.abs(dif) <= 5 ? 'pos' : (Math.abs(dif) <= 15 ? '' : 'neg'))) + '">' + (dif != null ? dif.toFixed(1) + ' pp' : '—') + '</td></tr>';
    }
    el.innerHTML =
      '<p class="form-hint">Registra el porcentaje de avance físico (entregables completados) y financiero (recursos ejecutados vs presupuesto) mes a mes.</p>' +
      '<div class="table-scroll"><table class="edit-grid"><thead>' + head + '</thead><tbody>' + body + '</tbody></table></div>';
    el.querySelectorAll('.av-cell').forEach(inp => {
      inp.addEventListener('change', () => {
        const mes = parseInt(inp.dataset.mes), key = inp.dataset.key;
        const v = inp.value === '' ? null : parseFloat(inp.value);
        p.ejecucion.avances[mes][key] = (v != null && isFinite(v)) ? v : null;
        markDirty();
        saveCurrentProject();
