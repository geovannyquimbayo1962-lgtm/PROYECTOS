  // -------------------- Sub-panel: Análisis y alertas --------------------
  function renderSegAnalisis(p) {
    const el = document.getElementById('seg-panel-analisis');
    if (!el) return;
    const H = p.meta.horizonteMeses;
    const s = Engine.computeScenarioSnapshot(p, currentScenario);
    const cur = p.meta.moneda;
    const realAgg = computeRealAggregates(p);

    // Detectar último mes con datos reales (en cualquier naturaleza)
    let ultimoMesReal = -1;
    for (let i = H; i >= 1; i--) {
      if (realAgg.ingresos[i] != null || realAgg.costos[i] != null || realAgg.gastos[i] != null) {
        ultimoMesReal = i; break;
      }
    }

    // Series acumuladas proyectado vs real (para la curva S)
    const flujoProyMensual = s.flujoMensual;
    const flujoRealMensual = flujoProyMensual.map((_, i) => {
      if (i === 0) return 0;
      const ing = realAgg.ingresos[i], cos = realAgg.costos[i], gas = realAgg.gastos[i];
      if (ing == null && cos == null && gas == null) return null;
      return (ing || 0) - (cos || 0) - (gas || 0);
    });
    const proyAcum = []; let ap = 0;
    for (const v of flujoProyMensual) { ap += v; proyAcum.push(ap); }
    const realAcum = []; let ar = 0;
    for (const v of flujoRealMensual) {
      if (v == null) { realAcum.push(null); continue; }
      ar += v; realAcum.push(ar);
    }

    el.innerHTML =
      '<div class="section-title">Curva S — Proyectado vs Real</div>' +
      '<div class="chart-panel" id="seg-curva-s"></div>' +
      '<div class="section-title">Ingresos mensuales · Proyectado vs Real</div>' +
      '<div class="chart-panel" id="seg-comparacion"></div>' +
      '<div class="section-title">Resumen consolidado</div>' +
      '<div id="seg-resumen"></div>' +
      '<div class="section-title">Alertas inteligentes</div>' +
      '<div id="seg-alertas"></div>';

    SvgChart.line(document.getElementById('seg-curva-s'), {
      title: 'Flujo acumulado · Proyectado vs Real', height: 340,
      xLabels: flujoProyMensual.map((_, i) => 'M' + i),
      series: [
        { name: 'Proyectado', color: SvgChart.COLORS.flujo, type: 'line', values: proyAcum },
        { name: 'Real', color: SvgChart.COLORS.real, type: 'line', values: realAcum }
      ]
    });
    SvgChart.line(document.getElementById('seg-comparacion'), {
      title: 'Ingresos mensuales', height: 300,
      xLabels: flujoProyMensual.map((_, i) => 'M' + i),
      series: [
        { name: 'Proyectado', color: SvgChart.COLORS.ingreso, type: 'line', values: s.ingresosMensuales },
        { name: 'Real', color: SvgChart.COLORS.real, type: 'line', values: realAgg.ingresos }
      ]
    });

    // Resumen consolidado hasta el último mes con datos
    const resumenEl = document.getElementById('seg-resumen');
    if (ultimoMesReal < 0) {
      resumenEl.innerHTML = '<div class="placeholder"><p>Sin datos reales todavía. Ve a "Cierre mensual" para ingresar la ejecución real.</p></div>';
    } else {
      const proyI = s.ingresosMensuales.slice(1, ultimoMesReal + 1).reduce((a, b) => a + b, 0);
      const proyC = s.costosMensuales.slice(1, ultimoMesReal + 1).reduce((a, b) => a + b, 0);
      const proyG = s.gastosMensuales.slice(1, ultimoMesReal + 1).reduce((a, b) => a + b, 0);
      const realI = realAgg.ingresos.slice(1, ultimoMesReal + 1).reduce((a, b) => a + (b || 0), 0);
      const realC = realAgg.costos.slice(1, ultimoMesReal + 1).reduce((a, b) => a + (b || 0), 0);
      const realG = realAgg.gastos.slice(1, ultimoMesReal + 1).reduce((a, b) => a + (b || 0), 0);
      const rows = [
        { label: 'Ingresos', proy: proyI, real: realI, better: 'higher' },
        { label: 'Costos', proy: proyC, real: realC, better: 'lower' },
        { label: 'Gastos', proy: proyG, real: realG, better: 'lower' },
        { label: 'Flujo Neto', proy: proyI - proyC - proyG, real: realI - realC - realG, better: 'higher' }
      ];
      let tbody = '';
      rows.forEach(r => {
        const diff = r.real - r.proy;
        const diffPct = r.proy !== 0 ? diff / Math.abs(r.proy) : null;
        const isBetter = (r.better === 'higher' && diff > 0) || (r.better === 'lower' && diff < 0);
        const isNeutral = Math.abs(diffPct || 0) < 0.05;
        const sem = isNeutral ? '<span class="chip chip-neutral">En rango</span>' :
                    isBetter ? '<span class="chip chip-ok">Favorable</span>' : '<span class="chip chip-bad">Desfavorable</span>';
        tbody += '<tr><td>' + r.label + '</td>' +
          '<td>' + Fmt.money(r.proy, cur) + '</td>' +
          '<td>' + Fmt.money(r.real, cur) + '</td>' +
          '<td class="' + (isBetter ? 'pos' : 'neg') + '">' + Fmt.money(diff, cur) + '</td>' +
          '<td class="' + (isBetter ? 'pos' : 'neg') + '">' + Fmt.pct(diffPct, 1) + '</td>' +
          '<td>' + sem + '</td></tr>';
      });
      resumenEl.innerHTML =
        '<p class="form-hint">Comparación acumulada hasta el <strong>Mes ' + ultimoMesReal + '</strong>.</p>' +
        '<table class="kpi-table"><thead><tr><th>Concepto</th><th>Proyectado</th><th>Real</th><th>Variación</th><th>Var. %</th><th>Estado</th></tr></thead><tbody>' + tbody + '</tbody></table>';
    }

    // Alertas (usando computeAlertas, ajustadas a la nueva estructura)
    const alertasEl = document.getElementById('seg-alertas');
    const alertas = computeAlertasV2(p, s, realAgg, ultimoMesReal);
    if (alertas.length === 0) {
      alertasEl.innerHTML = '<div class="placeholder"><p>Sin alertas activas.</p></div>';
    } else {
      alertasEl.innerHTML = alertas.map(a =>
        '<div class="alert-card alert-' + a.nivel + '">' +
          '<div class="alert-icon">' + (a.nivel === 'crit' ? '⚠' : a.nivel === 'warn' ? '⚠' : 'ℹ') + '</div>' +
          '<div class="alert-body">' +
            '<div class="alert-title">' + esc(a.titulo) + '</div>' +
            '<div class="alert-desc">' + esc(a.descripcion) + '</div>' +
            (a.recomendacion ? '<div class="alert-reco"><strong>Recomendación:</strong> ' + esc(a.recomendacion) + '</div>' : '') +
          '</div>' +
        '</div>'
      ).join('');
    }
  }

  function computeAlertasV2(p, snapshot, realAgg, ultimoMesReal) {
    if (ultimoMesReal < 0) return [];
    const alertas = [];
    const H = p.meta.horizonteMeses;
    const proyI = snapshot.ingresosMensuales.slice(1, ultimoMesReal + 1).reduce((a, b) => a + b, 0);
    const proyC = snapshot.costosMensuales.slice(1, ultimoMesReal + 1).reduce((a, b) => a + b, 0);
    const proyG = snapshot.gastosMensuales.slice(1, ultimoMesReal + 1).reduce((a, b) => a + b, 0);
    const realI = realAgg.ingresos.slice(1, ultimoMesReal + 1).reduce((a, b) => a + (b || 0), 0);
    const realC = realAgg.costos.slice(1, ultimoMesReal + 1).reduce((a, b) => a + (b || 0), 0);
    const realG = realAgg.gastos.slice(1, ultimoMesReal + 1).reduce((a, b) => a + (b || 0), 0);

    if (proyC > 0 && realC > proyC * 1.1) {
      const pct = ((realC / proyC - 1) * 100).toFixed(1);
      alertas.push({ nivel: 'crit', titulo: 'Sobrecosto crítico',
        descripcion: 'Los costos reales exceden lo proyectado en +' + pct + '% al mes M' + ultimoMesReal + '.',
        recomendacion: 'Ir a "Detalle por línea" para identificar qué líneas específicas están desviándose.' });
    } else if (proyC > 0 && realC > proyC * 1.05) {
      alertas.push({ nivel: 'warn', titulo: 'Costos por encima del plan',
        descripcion: 'Los costos reales están ' + ((realC / proyC - 1) * 100).toFixed(1) + '% arriba del proyectado.' });
    }

    if (proyI > 0 && realI < proyI * 0.9) {
      const nivel = realI < proyI * 0.7 ? 'crit' : 'warn';
      alertas.push({ nivel, titulo: 'Ingresos por debajo del plan',
        descripcion: 'Ingresos reales ' + ((1 - realI / proyI) * 100).toFixed(1) + '% menores a lo proyectado.',
        recomendacion: 'Revisar cantidad de servicios ejecutados vs. planeados.' });
    }

    const flujoReal = realI - realC - realG, flujoProy = proyI - proyC - proyG;
    if (flujoReal < 0 && flujoProy >= 0) {
      alertas.push({ nivel: 'crit', titulo: 'Flujo negativo no esperado',
        descripcion: 'El flujo neto acumulado real es negativo, cuando el plan lo preveía positivo.',
        recomendacion: 'Revisar necesidad de financiamiento adicional.' });
    }

    // Avance físico vs financiero
    const av = p.ejecucion.avances[ultimoMesReal];
    if (av && av.avanceFisicoPct != null && av.avanceFinancieroPct != null) {
      const diff = Math.abs(av.avanceFisicoPct - av.avanceFinancieroPct);
      if (diff > 15) {
        const mayor = av.avanceFisicoPct > av.avanceFinancieroPct ? 'físico' : 'financiero';
        alertas.push({ nivel: 'warn', titulo: 'Avance físico y financiero desalineados',
          descripcion: 'Diferencia de ' + diff.toFixed(1) + ' puntos (' + mayor + ' adelantado).' });
      }
    }

    // Buscar líneas específicas con desviaciones altas
    const desviaciones = [];
    for (const l of p.lineas) {
      if (l.tipoCalculo === 'cantidadServicios') continue;
      const grid = (p.grillas && p.grillas[currentScenario]) || {};
      const proyVec = grid[l.id] || [];
      const realVec = p.ejecucion.porLinea[l.id] || [];
      let proySum = 0, realSum = 0, hasReal = false;
      for (let i = 1; i <= ultimoMesReal; i++) {
        if (realVec[i] != null) { proySum += proyVec[i] || 0; realSum += realVec[i]; hasReal = true; }
      }
      if (!hasReal || proySum === 0) continue;
      const varPct = (realSum - proySum) / Math.abs(proySum);
      const nat = (l.naturaleza || '').toLowerCase();
      const bad = (nat === 'ingreso' && varPct < -0.15) || (nat !== 'ingreso' && varPct > 0.20);
      if (bad) {
        desviaciones.push({ label: l.detalle || l.concepto || l.id, varPct, nat });
      }
    }
    if (desviaciones.length > 0) {
      const detalle = desviaciones.slice(0, 3).map(d => d.label + ' (' + (d.varPct >= 0 ? '+' : '') + (d.varPct * 100).toFixed(1) + '%)').join(', ');
      alertas.push({ nivel: 'warn', titulo: 'Líneas con desviación significativa',
        descripcion: desviaciones.length + ' línea(s) con desviación mayor al umbral. Principales: ' + detalle + '.',
        recomendacion: 'Analizar en detalle desde "Detalle por línea".' });
    }

    return alertas;
  }

    const list = Storage.listProjects();
    const back = document.createElement('div');
    back.className = 'modal-backdrop';
    back.innerHTML =
      '<div class="modal modal-lg">' +
        '<h3>Mis proyectos</h3>' +
        '<p class="form-hint" style="margin-bottom: 16px;">Selecciona un proyecto para trabajar en él. Puedes renombrar, duplicar o eliminar desde el menú de cada uno.</p>' +
        '<div class="modal-project-list">' +

            const active = currentProject && currentProject.meta.id === p.id;
            return '<div class="modal-project-item' + (active ? ' active' : '') + '" data-id="' + p.id + '">' +
              '<div class="modal-project-info">' +
                '<div class="modal-project-name">' + esc(p.nombre) + '</div>' +
                (active ? '<span class="modal-project-badge">Activo</span>' : '') +
              '</div>' +
              '<div class="modal-project-buttons">' +
                (active ? '' : '<button class="btn-sm-mini" data-action="open" data-id="' + p.id + '">Abrir</button>') +
                '<button class="btn-sm-mini" data-action="rename" data-id="' + p.id + '">Renombrar</button>' +
                '<button class="btn-sm-mini" data-action="duplicate" data-id="' + p.id + '">Duplicar</button>' +
                '<button class="btn-sm-mini danger" data-action="delete" data-id="' + p.id + '">Eliminar</button>' +
              '</div>' +
            '</div>';
          }).join('') +
        '</div>' +

          '<button class="btn btn-primary" id="modal-new-project">+ Nuevo proyecto</button>' +
          '<button class="btn btn-secondary" id="modal-close">Cerrar</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(back);
    back.onclick = (e) => { if (e.target === back) back.remove(); };
    document.getElementById('modal-close').onclick = () => back.remove();
    document.getElementById('modal-new-project').onclick = () => { back.remove(); openNewProjectModal(); };
    back.querySelectorAll('[data-action]').forEach(btn => {
      btn.onclick = () => {
        const id = btn.dataset.id;
        if (btn.dataset.action === 'open') {
          currentProject = Storage.loadProject(id);
          if (currentProject && currentProject.meta.escenarioActivo) currentScenario = currentProject.meta.escenarioActivo;
          back.remove();
          renderAll();
        } else if (btn.dataset.action === 'rename') {
          back.remove();
          renameProject(id);
        } else if (btn.dataset.action === 'duplicate') {
          back.remove();
          duplicateProject(id);
        } else if (btn.dataset.action === 'delete') {
          back.remove();
          deleteProject(id);
        }
      };
    });
    // Clicking on the project item (not on buttons) also opens it
    back.querySelectorAll('.modal-project-item').forEach(item => {
      item.onclick = (e) => {
        if (e.target.closest('button')) return;
        const id = item.dataset.id;
        currentProject = Storage.loadProject(id);
        if (currentProject && currentProject.meta.escenarioActivo) currentScenario = currentProject.meta.escenarioActivo;
        back.remove();
        renderAll();
      };
    });
  }

  function wireNavigation() {
    const buttons = document.querySelectorAll('.sb-item');
    const panels = document.querySelectorAll('.panel');
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        const target = document.getElementById('panel-' + btn.dataset.nav);
        if (target) target.classList.add('active');
        if (btn.dataset.nav === 'flujo') renderFlujo(currentProject);
        if (btn.dataset.nav === 'comparador') renderComparador(currentProject);
        if (btn.dataset.nav === 'dashboard') { renderDashboard(currentProject); }
        if (btn.dataset.nav === 'requerimientos') renderRequerimientos(currentProject);
        if (btn.dataset.nav === 'seguimiento') renderSeguimiento(currentProject);
        if (btn.dataset.nav === 'contexto') renderContexto(currentProject);
        if (btn.dataset.nav === 'portafolio') renderPortafolio();
        if (btn.dataset.nav === 'presentacion') renderPresentacion(currentProject);
        if (btn.dataset.nav === 'guia') renderGuia();
        // Cerrar sidebar en móvil
        document.querySelector('.sidebar')?.classList.remove('mobile-open');
      });
    });
  }

  function wireScenarioSelector() {
    const sel = document.getElementById('scenario-selector');
    if (!sel) return;
    sel.value = currentScenario;
    sel.addEventListener('change', () => {
      currentScenario = sel.value;
      renderAll();
    });

  function renderAll() {
    if (!currentProject) {
      // Sin proyectos: mostrar mensaje en dashboard
      const dc = document.getElementById('dashboard-content');
      if (dc) dc.innerHTML = '<div class="placeholder"><h2>Bienvenido a PPM</h2><p>Crea tu primer proyecto desde la barra lateral.</p></div>';
      const ph = document.getElementById('project-header');
      if (ph) ph.innerHTML = '<h1>Sin proyecto abierto</h1><div class="project-meta"><span>Usa el botón <strong>+ Nuevo proyecto</strong> a la izquierda.</span></div>';
      renderSidebar();
      updateSaveBadge();
      updateCloudUI(currentProject);
      // Aún así renderizar portafolio si visible
      const portActive = document.getElementById('panel-portafolio');
      if (portActive && portActive.classList.contains('active')) renderPortafolio();
      return;
    }
    renderProjectHeader(currentProject);
    renderDashboard(currentProject);
    // Si el sub-tab de comparador/flujo está activo, re-renderizarlo
    const stabComp = document.getElementById('dash-stab-comparador');
    if (stabComp && stabComp.classList.contains('active')) renderComparador(currentProject);
    const stabFlujo = document.getElementById('dash-stab-flujos');
    if (stabFlujo && stabFlujo.classList.contains('active')) renderFlujo(currentProject);
    // Solo re-renderizar los editores si están visibles
    const reqActive = document.getElementById('panel-requerimientos');
    if (reqActive && reqActive.classList.contains('active')) renderRequerimientos(currentProject);
    const segActive = document.getElementById('panel-seguimiento');
    if (segActive && segActive.classList.contains('active')) renderSeguimiento(currentProject);
    const ctxActive = document.getElementById('panel-contexto');
    if (ctxActive && ctxActive.classList.contains('active')) renderContexto(currentProject);
    const portActive = document.getElementById('panel-portafolio');
    if (portActive && portActive.classList.contains('active')) renderPortafolio();
    renderSidebar();
    updateSaveBadge();
  }

  function init() {
    ensureSeedProject();
    currentProject = Storage.loadProject(DEFAULT_PROJECT_ID);
    if (currentProject && currentProject.meta.escenarioActivo) {
      currentScenario = currentProject.meta.escenarioActivo;
    }
    wireScenarioSelector();
    wireNavigation();
    // Sub-tabs del Dashboard
    document.querySelectorAll('.dash-stab').forEach(stab => {
      stab.addEventListener('click', () => {
        document.querySelectorAll('.dash-stab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.dash-stab-panel').forEach(x => x.classList.remove('active'));
        stab.classList.add('active');
        const panel = document.getElementById('dash-stab-' + stab.dataset.stab);
        if (panel) panel.classList.add('active');
        if (stab.dataset.stab === 'comparador') renderComparador(currentProject);
        if (stab.dataset.stab === 'flujos') renderFlujo(currentProject);
      });
    });
    const btnNew = document.getElementById('btn-new-project');
    if (btnNew) btnNew.addEventListener('click', openNewProjectModal);

    // Cloud buttons
    // Guardar local
    const _btnSL = document.getElementById('btn-save-local');
    if (_btnSL) _btnSL.onclick = () => {
      if (!currentProject) { showToast('Abre un proyecto primero.', 'warn'); return; }
      saveCurrentProject();
      showToast('💾 Guardado localmente.');
    };

    const _btnCS = document.getElementById('btn-cloud-save');
    if (_btnCS) _btnCS.onclick = () => { if (currentProject) cloudSave(currentProject); else showToast('Abre un proyecto primero.','warn'); };
    const _btnCO = document.getElementById('btn-cloud-open');
    if (_btnCO) _btnCO.onclick = () => openCloudProjects();
    const _btnCSet = document.getElementById('btn-cloud-settings');
    if (_btnCSet) _btnCSet.onclick = () => openCloudSettings();
    const _btnCL = document.getElementById('btn-cloud-link');
    if (_btnCL) _btnCL.onclick = () => { if (currentProject) copyShareLink(currentProject); };

    // ¿Viene la URL con ?bin=...? Carga automáticamente
    const _urlBin = Cloud.binFromUrl();
    if (_urlBin) {
      setTimeout(() => _loadCloudProject(_urlBin), 400);
    }
    const btnOpen = document.getElementById('btn-open-projects');
    if (btnOpen) btnOpen.addEventListener('click', openProjectsModal);
    // Mobile menu toggle
    const btnMenu = document.getElementById('mobile-menu-toggle');
    if (btnMenu) btnMenu.addEventListener('click', () => {
      document.querySelector('.sidebar').classList.toggle('mobile-open');
    });
    renderAll();
  }

  window.PPM = {
    DataModel, storage: Storage, formatters: Fmt, engine: Engine, chart: SvgChart,
    get currentProject() { return currentProject; },
    get currentScenario() { return currentScenario; },
    setScenario(e) { currentScenario = e; renderAll(); },
    saveNow: saveCurrentProject,
    resetSeed() {
      Object.keys(localStorage).filter(k => k.indexOf(NAMESPACE + ':') === 0).forEach(k => localStorage.removeItem(k));

    }
  };

  function renderContexto(p) {

          opts.options.map(o => '<option value="' + esc(o) + '"' + (val === o ? ' selected' : '') + '>' + esc(o) + '</option>').join('') +
        '</select>';
      } else if (kind === 'textarea') {
        inputHtml = '<textarea id="' + id + '" rows="' + (opts.rows || 3) + '">' + esc(val || '') + '</textarea>';
      } else {
        const type = kind || 'text';
        const extra = opts.extra || '';
        inputHtml = '<input id="' + id + '" type="' + type + '" value="' + esc(val != null ? val : '') + '" ' + extra + '/>';
      }
      return '<div class="contexto-field"><label for="' + id + '">' + esc(label) + '</label>' + inputHtml + '</div>';

    // Wire all
    const debSave = debounce(() => { markDirty(); saveCurrentProject(); }, 400);
    const bindT = (id, path) => {
      const inp = document.getElementById(id);
      if (!inp) return;
      inp.addEventListener('input', () => { setDeep(p, path, inp.value); debSave(); });
    };
    const bindN = (id, path, scale) => {
      const inp = document.getElementById(id);
      if (!inp) return;
      inp.addEventListener('input', () => {
        const v = parseFloat(inp.value);
        if (isFinite(v)) { setDeep(p, path, scale ? v * scale : v); debSave(); }
      });
    };
    // Cabecera
    bindT('cx-nombre', 'meta.nombre');
    bindT('cx-linea', 'meta.unidadNegocio');
    bindT('cx-pais', 'meta.pais');
    bindT('cx-sponsor', 'contexto.cabecera.sponsor');
    bindT('cx-complejidad', 'contexto.cabecera.complejidad');
    bindT('cx-tipo', 'contexto.cabecera.tipoProyecto');
    bindT('cx-fase', 'contexto.cabecera.fase');

    bindN('cx-meta-plazo', 'contexto.queEsElProyecto.meta.plazoAnos');
    bindN('cx-meta-mega', 'contexto.queEsElProyecto.meta.aporteMegaAnualPct', 0.01);

    bindT('cx-personal', 'contexto.comoImplementamos.personal');

    bindT('cx-cap-fut', 'contexto.comoImplementamos.capacidadFutura');
    // Visión
    bindN('cx-vis-ano', 'contexto.vision.anoObjetivo');
    bindT('cx-vis-desc', 'contexto.vision.descripcion');
    // Mercado
    bindN('cx-mkt-emp', 'contexto.mercado.totalEmpresas');
    bindN('cx-mkt-val', 'contexto.mercado.valorMercado');
    bindN('cx-mkt-ms', 'contexto.mercado.marketShareObjetivoPct', 0.01);
    bindT('cx-mkt-zonas', 'contexto.mercado.zonasGeograficas');
    bindT('cx-mkt-seg', 'contexto.mercado.segmentacion');
    bindT('cx-mkt-precio', 'contexto.mercado.estructuraPrecio');
    bindN('cx-mkt-rent', 'contexto.mercado.rentabilidadBrutaMinimaPct', 0.01);

    // Escenarios (visión)
    el.querySelectorAll('.ve-mensual, .ve-total, .ve-precio, .ve-margen').forEach(inp => {
      inp.addEventListener('input', () => {
        const escKey = inp.dataset.esc;
        const v = parseFloat(inp.value);
        if (!isFinite(v)) return;
        if (!c.vision.escenarios[escKey]) c.vision.escenarios[escKey] = {};
        if (inp.classList.contains('ve-mensual')) c.vision.escenarios[escKey].cantidadMensual = v;
        if (inp.classList.contains('ve-total')) c.vision.escenarios[escKey].cantidadTotal = v;
        if (inp.classList.contains('ve-precio')) c.vision.escenarios[escKey].precio = v;
        if (inp.classList.contains('ve-margen')) c.vision.escenarios[escKey].margenBrutoPct = v / 100;
        debSave();

    // Lists helper
    const listsMap = {
      'cx-riesgos': 'contexto.queEsElProyecto.riesgos',
      'cx-apoyo': 'contexto.comoImplementamos.apoyo',
      'cx-activ': 'contexto.comoImplementamos.actividadesClave',
      'cx-aliados': 'contexto.comoImplementamos.aliadosClave',
      'cx-mkt-comp': 'contexto.mercado.competenciaActual'
    };
    Object.entries(listsMap).forEach(([listId, path]) => {
      const container = document.getElementById(listId);
      if (!container) return;
      container.querySelectorAll('input').forEach(inp => {
        inp.addEventListener('input', () => {
          const arr = getDeep(p, path) || [];
          arr[parseInt(inp.dataset.idx)] = inp.value;
          setDeep(p, path, arr);
          debSave();
        });
      });
      container.querySelectorAll('[data-del]').forEach(btn => {
        btn.addEventListener('click', () => {
          const arr = getDeep(p, path) || [];
          arr.splice(parseInt(btn.dataset.del), 1);

          markDirty(); saveCurrentProject();
          renderContexto(p);
        });
      });

    el.querySelectorAll('[data-add-list]').forEach(btn => {

        renderContexto(p);
        const container = document.getElementById(listId);
        const inputs = container.querySelectorAll('input');
        if (inputs.length) inputs[inputs.length - 1].focus();

    });

    // Inversión editor
    const invContainer = document.getElementById('inv-editor');

          renderContexto(p);
        });

    }
    const btnAddInv = document.getElementById('btn-add-inv');

        renderContexto(p);
      });
    }
  }

  function loadAllProjects() {
    const list = Storage.listProjects();
    return list.map(item => Storage.loadProject(item.id)).filter(p => p != null);
  }

  function renderPortafolio() {
    const el = document.getElementById('portafolio-content');
    if (!el) return;
    const projects = loadAllProjects();
    if (projects.length === 0) {
      el.innerHTML = '<div class="placeholder"><h2>Sin proyectos</h2><p>Crea tu primer proyecto desde la barra lateral.</p></div>';
      return;
    }

    // Calcular KPIs por proyecto (usando el escenario activo del proyecto)
    const rows = projects.map(p => {
      const esc = p.meta.escenarioActivo || 'R';
      const s = Engine.computeScenarioSnapshot(p, esc);
      return {
        p, esc, s,
        nombre: p.meta.nombre, cliente: p.meta.cliente || '—',
        estado: p.meta.estado, unidad: p.meta.unidadNegocio || 'Sin unidad',
        tipo: p.meta.tipoProyecto || '—', moneda: p.meta.moneda || 'COP',
        inv: s.inversionInicial, ing: s.totalIngresos,
        un: s.utilidadNeta, van: s.van, tir: s.tirAnual,
        roi: s.ir, payback: s.paybackMeses
      };
    });

    // KPIs agregados (asumen misma moneda, si no, muestran advertencia)
    const monedas = new Set(rows.map(r => r.moneda));
    const monedaBase = monedas.size === 1 ? [...monedas][0] : 'MIX';
    const totalInv = rows.reduce((a, r) => a + (r.inv || 0), 0);
    const totalIng = rows.reduce((a, r) => a + (r.ing || 0), 0);
    const totalUN = rows.reduce((a, r) => a + (r.un || 0), 0);
    const totalVAN = rows.reduce((a, r) => a + (r.van || 0), 0);

  function duplicateProject(id) {
    const src = Storage.loadProject(id);
    if (!src) return;
    const nombre = prompt('Nombre del proyecto duplicado:', src.meta.nombre + ' (copia)');
    if (!nombre) return;
    const clone = JSON.parse(JSON.stringify(src));
    clone.meta.id = 'proj_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    clone.meta.nombre = nombre;
    clone.meta.estado = 'planning';
    clone.ejecucion = { mensual: [] };
    delete clone.meta.createdAt;
    delete clone.meta.updatedAt;
    Storage.saveProject(clone);
    renderAll();
    alert('Proyecto duplicado.');
  }

  function deleteProject(id) {
    const src = Storage.loadProject(id);
    if (!src) return;
    if (!confirm('¿Eliminar el proyecto "' + src.meta.nombre + '"? Esta acción no se puede deshacer.')) return;
    localStorage.removeItem(NAMESPACE + ':project:' + id);
    const idx = JSON.parse(localStorage.getItem(NAMESPACE + ':index') || '{}');
    delete idx[id];
    localStorage.setItem(NAMESPACE + ':index', JSON.stringify(idx));
    // Si estaba abierto, cambiar al primero disponible
    if (currentProject && currentProject.meta.id === id) {
      const remaining = Storage.listProjects();
      if (remaining.length > 0) {
        currentProject = Storage.loadProject(remaining[0].id);
        if (currentProject && currentProject.meta.escenarioActivo) currentScenario = currentProject.meta.escenarioActivo;
      } else {
        currentProject = null;
      }
    }
    renderAll();
  }

  function renameProject(id) {
    const src = Storage.loadProject(id);
    if (!src) return;
    const nuevo = prompt('Nuevo nombre:', src.meta.nombre);
    if (!nuevo || nuevo === src.meta.nombre) return;
    src.meta.nombre = nuevo;
    Storage.saveProject(src);
    if (currentProject && currentProject.meta.id === id) currentProject = src;
    renderAll();
  }

  function goToTab(name) {
    if (name === 'comparador' || name === 'flujo') {
      const dashBtn = document.querySelector('.sb-item[data-nav="dashboard"]');
      if (dashBtn) dashBtn.click();
      setTimeout(() => {
        const stab = document.querySelector('.dash-stab[data-stab="' + (name === 'flujo' ? 'flujos' : name) + '"]');
        if (stab) stab.click();
      }, 60);
      return;
    }
    const btn = document.querySelector('.sb-item[data-nav="' + name + '"]');
    if (btn) btn.click();
  }

  const PRES_COLORS = { O: '#1d6e3a', R: '#1a4f8a', C: '#b85e10', P: '#b83433' };

  // Normaliza KPIs a 0..1 para el radar (relativo al mejor escenario)
  function normalizeRadar(snaps, e, p) {
    const escs = DataModel.ESCENARIOS;
    const H = p.meta.horizonteMeses;
    const maxOf = (fn) => Math.max(...escs.map(x => Math.abs(fn(snaps[x]) || 0))) || 1;
    const maxMN = maxOf(s => s.margenNetoPct);
    const maxTIR = maxOf(s => s.tirMensual);
    const maxVAN = maxOf(s => s.van);
    const maxEB = maxOf(s => s.ebitdaPct);
    const s = snaps[e];
    // Payback: invertido (menor es mejor)
    const pb = s.paybackMeses != null ? s.paybackMeses : H;
    const pbScore = Math.max(0, 1 - (pb / H));
    return [
      Math.max(0, (s.margenNetoPct || 0) / maxMN),
      Math.max(0, (s.tirMensual || 0) / maxTIR),
      Math.max(0, (s.van || 0) / maxVAN),
      pbScore,
      Math.max(0, (s.ebitdaPct || 0) / maxEB)
    ];
  }

  function buildCostBuckets(p, escenario) {
    const grid = (p.grillas && p.grillas[escenario]) || {};
    const H = p.meta.horizonteMeses;
    const buckets = {};
    for (const l of p.lineas) {
      const nat = (l.naturaleza || '').trim().toLowerCase();
      if (nat !== 'costo' && nat !== 'gastos') continue;
      const key = l.concepto || l.detalle || 'Otro';
      const v = grid[l.id] || [];
      let sum = 0;
      for (let i = 1; i <= H; i++) sum += (v[i] || 0);
      if (sum <= 0) continue;
      buckets[key] = (buckets[key] || 0) + sum;
    }
    const entries = Object.entries(buckets).sort((a, b) => b[1] - a[1]);
    const top = entries.slice(0, 6);
    const otros = entries.slice(6).reduce((s, [, v]) => s + v, 0);
    if (otros > 0) top.push(['Otros', otros]);
    const palette = ['#1a4f8a', '#c9972b', '#1a6b6b', '#b83433', '#b85e10', '#1d6e3a', '#354656'];
    return top.map(([label, value], i) => ({ label, value, color: palette[i % palette.length] }));
  }

  function findWorst(arr, cur) {
    let idx = 0, w = arr[0];
    for (let i = 1; i < arr.length; i++) if (arr[i] < w) { w = arr[i]; idx = i; }
    return Fmt.money(w, cur) + ' (M' + idx + ')';
  }
  function findBest(arr, cur) {
    let idx = 0, b = arr[0];
    for (let i = 1; i < arr.length; i++) if (arr[i] > b) { b = arr[i]; idx = i; }
    return Fmt.money(b, cur) + ' (M' + idx + ')';
  }

  function calcHealthScore(s, p) {
    // Composite score 0-100 basado en VAN, TIR, Payback, Margen
    const H = p.meta.horizonteMeses;
    let score = 50;
    if (s.van > 0) score += 20;
    if (s.van > s.inversionInicial) score += 10;
    if (s.tirAnual != null && s.tirAnual > p.parametros.tasaDescuentoAnual) score += 10;
    if (s.paybackMeses != null && s.paybackMeses < H * 0.5) score += 10;
    else if (s.paybackMeses == null) score -= 10;
    if (s.margenNetoPct != null && s.margenNetoPct > 0.1) score += 5;
    if (s.margenNetoPct != null && s.margenNetoPct > 0.2) score += 5;
    if (s.utilidadNeta < 0) score -= 30;
    score = Math.max(0, Math.min(100, score));
    let color, verdict;
    if (score >= 75) { color = 'green'; verdict = '✓ Proyecto altamente recomendado'; }
    else if (score >= 55) { color = 'blue'; verdict = '✓ Proyecto viable con seguimiento'; }
    else if (score >= 35) { color = 'amber'; verdict = '⚠ Proyecto con reservas — revisar supuestos'; }
    else { color = 'rose'; verdict = '✗ Proyecto no recomendado — reevaluar'; }
    return { score, color, verdict };
  }

  // Financiamiento: cuota de crédito incluida en el flujo
  function renderComparadorAnual(el, project, snapshots, cur) {
    if (!el || !project) return;
    const H = project.meta.horizonteMeses;
    const nAños = Math.floor(H / 12);
    if (nAños < 1) { el.innerHTML = '<p class="form-hint">El horizonte es menor a 1 año.</p>'; return; }
    const años = Array.from({length: nAños}, (_, i) => 'Año ' + (i + 1));
    const C = { O: SvgChart.COLORS.o, R: SvgChart.COLORS.r, C: SvgChart.COLORS.c, P: SvgChart.COLORS.p };
    const ESC_COLORS = { O:'#1d6e3a', R:'#1a4f8a', C:'#b85e10', P:'#b83433' };

    // ─── helpers ───────────────────────────────────────────────────
    function yearSlice(snap, key, y) {
      const from = y * 12 + 1, to = Math.min((y + 1) * 12, H);
      let v = 0;
      for (let m = from; m <= to; m++) {
        if (key === 'ing')  v += snap.ingresosMensuales[m] || 0;
        else if (key === 'cos') v += snap.costosMensuales[m] || 0;
        else if (key === 'gas') v += snap.gastosMensuales[m] || 0;
        else if (key === 'flujo') v += snap.flujoMensual[m] || 0;
      }
      return v;
    }
    function yearArr(esc, key) {
      const snap = snapshots[esc];
      return Array.from({length: nAños}, (_, y) => yearSlice(snap, key, y));
    }

    // ─── tablas de KPIs por año ────────────────────────────────────
    const kpiAnual = [
      { label: 'Ingresos',       key: 'ing',   higher: true  },
      { label: 'Costos',         key: 'cos',   higher: false },
      { label: 'Gastos',         key: 'gas',   higher: false },
      { label: 'Flujo neto',     key: 'flujo', higher: true  },
    ];

    function buildKpiTable(kpi) {
      let head = '<tr><th>' + kpi.label + '</th>' +
        años.map(a => '<th class="text-right">' + a + '</th>').join('') +
        '<th class="text-right total-col">Total</th></tr>';
      let body = '';
      DataModel.ESCENARIOS.forEach(e => {
        const vals = yearArr(e, kpi.key);
        const total = vals.reduce((a,b) => a+b, 0);
        const isActive = e === currentScenario;
        // Mejor año de este escenario
        const maxVal = Math.max(...vals.map(v => kpi.higher ? v : -v));
        body += '<tr class="anual-row' + (isActive ? ' anual-row-active' : '') + '">' +
          '<td class="anual-esc-cell">' +
            '<span class="anual-dot" style="background:' + ESC_COLORS[e] + '"></span>' +
            DataModel.ESCENARIOS_NOMBRE[e] +
            (isActive ? ' <span class="anual-badge">Base</span>' : '') +
          '</td>' +
          vals.map((v, yi) => {
            const isBest = kpi.higher ? v === Math.max(...vals) : v === Math.min(...vals);
            return '<td class="text-right' + (isBest ? ' anual-best' : '') + '">' + Fmt.money(v, cur) + '</td>';
          }).join('') +
          '<td class="text-right total-col"><strong>' + Fmt.money(total, cur) + '</strong></td>' +
        '</tr>';
      });
      return '<table class="anual-table"><thead>' + head + '</thead><tbody>' + body + '</tbody></table>';
    }

    // ─── render HTML ───────────────────────────────────────────────
    el.innerHTML =
      // Gráficos
      '<div class="anual-charts-row">' +
        '<div class="chart-panel anual-chart-cell" id="comp-anual-ing"></div>' +
        '<div class="chart-panel anual-chart-cell" id="comp-anual-flujo"></div>' +
      '</div>' +
      // Tablas estilizadas
      '<div class="anual-tables-grid">' +
        kpiAnual.map(kpi =>
          '<div class="anual-table-card">' +
            '<div class="anual-table-title">' + kpi.label + ' por año</div>' +
            buildKpiTable(kpi) +
          '</div>'
        ).join('') +
      '</div>';

    // Gráficos
    SvgChart.groupedBar(document.getElementById('comp-anual-ing'), {
      title: 'Ingresos anuales por escenario', height: 300, groups: años,
      series: DataModel.ESCENARIOS.map(e => ({
        name: DataModel.ESCENARIOS_NOMBRE[e], color: C[e],
        values: yearArr(e, 'ing')
      }))
    });
    SvgChart.groupedBar(document.getElementById('comp-anual-flujo'), {
      title: 'Flujo neto anual por escenario', height: 300, groups: años,
      series: DataModel.ESCENARIOS.map(e => ({
        name: DataModel.ESCENARIOS_NOMBRE[e], color: C[e],
        values: yearArr(e, 'flujo')
      }))
    });
  }

  function buildConclusiones(project, snaps) {
    const cur = project.meta.moneda;
    const inv = project.parametros.inversionInicial;
    const td = project.parametros.tasaDescuentoAnual;
    const sR = snaps.R;
    const items = [];

    // VAN
    if (sR.van > 0) {
      items.push({ icon: '✅', text: 'El proyecto genera valor en el escenario Realista: el VAN de <strong>' +
        Fmt.money(sR.van, cur) + '</strong> indica que se supera el costo de capital de ' +
        Fmt.pct(td, 2) + '.' });
    } else {
      items.push({ icon: '⚠️', text: 'En el escenario Realista el VAN es negativo (' + Fmt.money(sR.van, cur) +
        '): el proyecto no supera el costo de capital de ' + Fmt.pct(td, 2) + '. Se recomienda revisar precios o estructura de costos.' });
    }
    // TIR vs tasa
    if (sR.tirMensual != null) {
      const tCompM = DataModel.annualToMonthly(td);
      if (sR.tirMensual > tCompM) {
        items.push({ icon: '✅', text: 'La TIR mensual (' + Fmt.pct(sR.tirMensual, 2) +
          ') supera la tasa de descuento mensual (' + Fmt.pct(tCompM, 3) + '), lo que confirma la rentabilidad del proyecto.' });
      } else {
        items.push({ icon: '⚠️', text: 'La TIR mensual (' + Fmt.pct(sR.tirMensual, 2) +
          ') es inferior a la tasa de descuento mensual (' + Fmt.pct(tCompM, 3) + '). El proyecto no supera el umbral de rentabilidad mínima.' });
      }
    }
    // Payback
    const H = project.meta.horizonteMeses;
    if (sR.paybackMeses != null && sR.paybackMeses < H) {
      items.push({ icon: '✅', text: 'El período de recuperación de la inversión se alcanza en el mes <strong>' +
        Math.ceil(sR.paybackMeses) + '</strong> de ' + H + ', dentro del horizonte del proyecto.' });
    }
    // Margen
    if (sR.margenBrutoPct > 0.4) {
      items.push({ icon: '✅', text: 'El margen bruto del <strong>' + Fmt.pct(sR.margenBrutoPct, 1) +
        '</strong> indica una estructura de costos eficiente respecto a los ingresos proyectados.' });
    } else if (sR.margenBrutoPct > 0) {
      items.push({ icon: 'ℹ️', text: 'El margen bruto es de <strong>' + Fmt.pct(sR.margenBrutoPct, 1) +
        '</strong>. Se recomienda evaluar oportunidades de mejora en la estructura de costos.' });
    }
    // Comparación escenarios
    const vanO = snaps.O.van, vanP = snaps.P.van;
    if (vanP > 0) {
      items.push({ icon: '✅', text: 'El proyecto es rentable incluso en el escenario Pesimista (VAN: ' +
        Fmt.money(vanP, cur) + '), lo que refleja robustez ante escenarios adversos.' });
    } else if (vanO > 0 && vanP <= 0) {
      items.push({ icon: 'ℹ️', text: 'El proyecto es viable en escenarios Optimista y Realista, pero en el Pesimista el VAN cae a ' +
        Fmt.money(vanP, cur) + '. Se recomienda plan de contingencia.' });
    }

    return items.map(it =>
      '<div class="ctx-concl-item">' +
        '<span class="ctx-concl-icon">' + it.icon + '</span>' +
        '<span class="ctx-concl-text">' + it.text + '</span>' +
      '</div>'
    ).join('');
  }


  // ─── Presentación: mejor escenario + análisis ───────────────────
  function presGetBestScenario(snaps, project) {
    // El mejor escenario es el que maximiza VAN > 0 con TIR > tasa descuento
    const td = DataModel.annualToMonthly(project.parametros.tasaDescuentoAnual);
    let best = null, bestScore = -Infinity;
    DataModel.ESCENARIOS.forEach(e => {
      const s = snaps[e];
      if (!s.van || !isFinite(s.van)) return;
      // Score compuesto: VAN normalizado + bonus si TIR > td
      const score = s.van + (s.tirMensual > td ? s.van * 0.2 : 0);
      if (score > bestScore) { bestScore = score; best = e; }
    });
    if (!best) best = 'R';
    return 'Mejor escenario: ' + DataModel.ESCENARIOS_NOMBRE[best];
  }

              return '<div class="pres2-concl-esc">' +
                '<span class="pres2-concl-dot pres2-concl-' + (ok ? 'ok' : 'fail') + '"></span>' +
                DataModel.ESCENARIOS_NOMBRE[e] + ': ' +
                Fmt.money(s.van, cur) + (ok ? ' ✓' : ' ✗') +
              '</div>';
            }).join('') +
          '</div>' +
          '<div class="pres2-concl-card pres2-concl-recom">' +
            '<div class="pres2-concl-icon">✅</div>' +
            '<h3>Recomendación</h3>' +
            '<p>' + (positivos >= 3
              ? 'El proyecto presenta fundamentos financieros sólidos. Se recomienda <strong>aprobarlo</strong> con base en el escenario ' + ESC_LABEL + ' y activar el seguimiento mensual de ejecución.'
              : positivos === 2
              ? 'El proyecto es viable en los escenarios optimistas pero con riesgo en los conservadores. Se recomienda aprobarlo <strong>condicionado</strong> a la validación de los supuestos clave.'
              : 'El proyecto presenta un riesgo financiero elevado. Se recomienda <strong>replantear</strong> la estructura de costos o los supuestos de demanda antes de la aprobación.'
            ) + '</p>' +
          '</div>' +
        '</div>';

  // Paleta de colores para el Excel
  const XL_COLORS = {
    navy:  '1A3A5C', teal:  '1A6B6B', gold:  'C9972B',
    amber: 'B85E10', rose:  'B83433', green: '1D6E3A',
    blue:  '1A4F8A', white: 'FFFFFF', lgray: 'F0F2F5',
    dgray: '8892A0', yellow:'FFF3CD',
    mgreen:'D6F0DD', mblue: 'E8F0FB', mamber:'FFF2E6', mrose: 'FDECEA'
  };

  const ESC_NAT_FILL = {
    ingreso: 'mgreen', costo: 'mblue', gastos: 'mamber', inversion: 'mrose'
  };

  function xlCell(v, opts) {
    // opts: { t, s } where s = style object for SheetJS
    return { v, t: opts && opts.t ? opts.t : (typeof v === 'number' ? 'n' : 's'),
             s: opts && opts.s ? opts.s : {} };
  }

  function xlHdr(text, bgKey, fgHex, bold, sz) {
    bgKey = bgKey || 'navy'; fgHex = fgHex || 'FFFFFF'; sz = sz || 11;
    return {
      v: text, t: 's',
      s: {
        font: { name: 'Arial', bold: bold !== false, color: { rgb: fgHex }, sz },
        fill: { patternType: 'solid', fgColor: { rgb: XL_COLORS[bgKey] || bgKey } },
        alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
        border: { top:{style:'thin'}, bottom:{style:'thin'}, left:{style:'thin'}, right:{style:'thin'} }
      }
    };
  }

  function xlVal(v, bgKey, bold, fmt, color) {
    bgKey = bgKey || 'yellow';
    const s = {
      font: { name: 'Arial', bold: !!bold, color: { rgb: color || '000000' }, sz: 10 },
      fill: { patternType: 'solid', fgColor: { rgb: XL_COLORS[bgKey] || bgKey } },
      alignment: { vertical: 'center' },
      border: { top:{style:'thin'}, bottom:{style:'thin'}, left:{style:'thin'}, right:{style:'thin'} }
    };
    if (fmt) s.numFmt = fmt;
    return { v, t: typeof v === 'number' ? 'n' : (typeof v === 'boolean' ? 'b' : 's'), s };
  }

  function xlLbl(text) {
    return xlVal(text, 'lgray', true, null, XL_COLORS.navy);
  }

    const NAT_ORDER = {ingreso:0, costo:1, gastos:2, inversion:3};

      xlHdr('Concepto','navy',null,true,9), xlHdr('Detalle','navy',null,true,9),
      xlHdr('Tipo cálculo','navy',null,true,9), xlHdr('Valor base','navy',null,true,9),
      xlHdr('Periodicidad','navy',null,true,9), xlHdr('Mes inicio','navy',null,true,9),
      xlHdr('Mes fin','navy',null,true,9), xlHdr('Sin IPC','navy',null,true,9),
      xlHdr('Es deprec.','navy',null,true,9), xlHdr('Es amort.','navy',null,true,9),
      xlHdr('% Esc.O','green',null,true,9), xlHdr('% Esc.R','blue',null,true,9),
      xlHdr('% Esc.C','amber',null,true,9), xlHdr('% Esc.P','rose',null,true,9),

    const planData = [

  // ─── IMPORTAR ──────────────────────────────────────────────────
  function importProjectFromExcel(file, project, onDone) {
    if (typeof XLSX === 'undefined') {
      alert('La librería de Excel no está cargada.'); return;
    }
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(ev.target.result, { type: 'array', cellStyles: true });
        const P = JSON.parse(JSON.stringify(project));

        // ── Hoja Proyecto ──
        const wsP = wb.Sheets['Proyecto'];
        if (wsP) {
          const rows = XLSX.utils.sheet_to_json(wsP, { header: 1 });
          // row 0 = title, row 1 = headers, rows 2+ = data
          const META_KEYS = [
            'id','codigo','nombre','cliente','responsable','area','unidadNegocio',
            'tipoProyecto','pais','moneda','horizonteMeses','fechaInicio','fechaFin',
            'estado','escenarioActivo','observaciones'
          ];
          for (let i = 0; i < META_KEYS.length; i++) {
            const dataRow = rows[i + 2];
            if (dataRow && dataRow[1] !== undefined && dataRow[1] !== '') {
              const key = META_KEYS[i];
              let val = dataRow[1];
              if (key === 'horizonteMeses') val = parseInt(val) || P.meta.horizonteMeses;
              P.meta[key] = val;
            }
          }
        }

        // ── Hoja Parámetros ──
        const wsPar = wb.Sheets['Parametros'];
        if (wsPar) {
          const rows = XLSX.utils.sheet_to_json(wsPar, { header: 1 });
          const PARAM_KEYS = [
            'ipcAnual','tasaDescuentoAnual','tasaImpositiva','inversionInicial',
            null,
            'financiado','montoFinanciar','tasaFinanciamientoAnual','costoOportunidadAnual'
          ];
          let dataIdx = 0;
          for (let i = 2; i < rows.length && dataIdx < PARAM_KEYS.length; i++) {
            const row = rows[i];
            if (!row || !row[0]) continue;
            const key = PARAM_KEYS[dataIdx++];
            if (!key) { dataIdx++; i--; continue; }
            if (row[1] !== undefined && row[1] !== '') {
              let val = row[1];
              if (key === 'financiado') val = val === true || String(val).toUpperCase() === 'TRUE';
              else val = parseFloat(val);
              if (!isNaN(val) || key === 'financiado') P.parametros[key] = val;
            }
          }
        }

        // ── Hoja Plan de Cuentas ──
        const wsPlan = wb.Sheets['PlanDeCuentas'];
        if (wsPlan) {
          const rows = XLSX.utils.sheet_to_json(wsPlan, { header: 1 });
          // row 0 = title, row 1 = headers, row 2+ = data or separators
          const updatedLines = {};
          for (let i = 2; i < rows.length; i++) {
            const row = rows[i];
            if (!row || !row[0]) continue;
            const id = String(row[0]).trim();
            if (!id || id.startsWith('▸') || !id.startsWith('lin_')) continue;
            // Find matching line
            const line = P.lineas.find(l => l.id === id);
            if (!line) continue;
            // Columns: 0=id,1=nat,2=concepto,3=detalle,4=tipo,5=valorBase,6=period,
            //          7=mesIni,8=mesFin,9=sinIPC,10=deprec,11=amort,12..15=pct ORCP,16=pctIng
            if (row[2] !== undefined) line.concepto    = String(row[2]);
            if (row[3] !== undefined) line.detalle     = String(row[3]);
            if (row[4] !== undefined) line.tipoCalculo = String(row[4]);
            if (row[5] !== undefined) line.valorBase   = parseFloat(row[5]) || 0;
            if (row[6] !== undefined) line.periodicidad= String(row[6]);
            if (row[7] !== undefined) line.mesInicio   = parseInt(row[7]);
            if (row[8] !== undefined) line.mesFin      = parseInt(row[8]);
            if (row[9] !== undefined) line.esIgnoraIPC = String(row[9]).toUpperCase() === 'SI';
            if (row[10]!== undefined) line.esDepreciacion= String(row[10]).toUpperCase() === 'SI';
            if (row[11]!== undefined) line.esAmortizacion= String(row[11]).toUpperCase() === 'SI';
            if (!line.escenariosPct) line.escenariosPct = {O:1,R:1,C:1,P:1};
            if (row[12]!== undefined) line.escenariosPct.O = parseFloat(row[12]) || 1;
            if (row[13]!== undefined) line.escenariosPct.R = parseFloat(row[13]) || 1;
            if (row[14]!== undefined) line.escenariosPct.C = parseFloat(row[14]) || 1;
            if (row[15]!== undefined) line.escenariosPct.P = parseFloat(row[15]) || 1;
            if (row[16]!== undefined) line.pctIngreso  = parseFloat(row[16]) || 0;
            updatedLines[id] = true;
          }
        }

        // ── Hoja Servicios ──
        const wsSrv = wb.Sheets['Servicios'];
        if (wsSrv) {
          const rows = XLSX.utils.sheet_to_json(wsSrv, { header: 1 });
          // row 0 = title, row 1 = headers, rows 2-5 = O/R/C/P
          const ESC_ROW = {O:2, R:3, C:4, P:5};
          const H = P.meta.horizonteMeses;
          for (const esc of DataModel.ESCENARIOS) {
            const row = rows[ESC_ROW[esc]];
            if (!row) continue;
            // cols 0=name, 1=mesIni, 2=cantIni, 3=cantObj, 4=mesesRamp, 5=crecPct, 6..=M0..MH
            if (!P.cantidadServiciosConfig) P.cantidadServiciosConfig = {};
            if (!P.cantidadServiciosConfig[esc]) P.cantidadServiciosConfig[esc] = {};
            const cfg = P.cantidadServiciosConfig[esc];
            if (row[1] !== undefined) cfg.mesInicio          = parseInt(row[1]) || 0;
            if (row[2] !== undefined) cfg.cantidadInicial     = parseInt(row[2]) || 0;
            if (row[3] !== undefined) cfg.cantidadObjetivo    = parseInt(row[3]) || 0;
            if (row[4] !== undefined) cfg.mesesRampUp         = parseInt(row[4]) || 0;
            if (row[5] !== undefined) cfg.crecimientoAnualPct = parseFloat(row[5]) || 0;
            if (!P.cantidadServicios) P.cantidadServicios = {};
            P.cantidadServicios[esc] = [];
            for (let m = 0; m <= H; m++) {
              P.cantidadServicios[esc][m] = parseInt(row[6 + m]) || 0;
            }
          }
        }

        // Recomputar grillas con los nuevos parámetros
        Engine.recomputeGrillas(P);
        onDone(P);
      } catch (err) {
        console.error('Import error:', err);
        alert('Error al importar el Excel: ' + err.message + '\nVerifica que sea un archivo exportado por la app.');
      }
    };
    reader.readAsArrayBuffer(file);
  }


  function showToast(msg, type) {
    type = type || 'success';
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:28px;right:28px;z-index:9999;' +
      'background:' + (type==='error'?'var(--danger)':'var(--success)') + ';' +
      'color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;' +
      'box-shadow:0 4px 16px rgba(0,0,0,0.3);animation:toastIn 0.2s ease;';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; }, 2800);
    setTimeout(() => t.remove(), 3200);
  }


  // ================================================================
  // ☁️  Cloud Sync — JSONBin.io
  // ================================================================
  const Cloud = {
    BASE: 'https://api.jsonbin.io/v3',

    _apiKey() {
      return localStorage.getItem('ppm_cloud_apikey') || '';
    },
    _headers(extra) {
      const h = {
        'Content-Type': 'application/json',
        'Accept': 'application/json',
        'X-Access-Key': this._apiKey()
      };
      return Object.assign(h, extra || {});
    },

    // Guarda / actualiza el proyecto en JSONBin.
    // Si el proyecto ya tiene meta.cloudBinId lo actualiza (PUT),
    // si no lo crea (POST) y guarda el ID devuelto en meta.cloudBinId.
    async saveToCloud(project) {
      const key = this._apiKey();
      if (!key) throw new Error('Configura tu API key de JSONBin primero.');

      const payload = {
        record: JSON.parse(JSON.stringify(project)),
        // Nombre del bin = "PPM — <nombre proyecto>"
        name: 'PPM - ' + (project.meta.nombre || 'Proyecto').replace(/[^\x00-\x7F]/g, '')
      };

      let res, data;
      if (project.meta.cloudBinId) {
        // Actualizar bin existente
        res = await fetch(this.BASE + '/b/' + project.meta.cloudBinId, {
          method: 'PUT',
          headers: this._headers(),
          body: JSON.stringify(payload.record)
        });
      } else {
        // Crear bin nuevo
        res = await fetch(this.BASE + '/b', {
          method: 'POST',
          headers: this._headers({ 'X-Bin-Name': encodeURIComponent(payload.name).slice(0,128), 'X-Bin-Private': 'false' }),
          body: JSON.stringify(payload.record)
        });
      }
      if (!res.ok) {
        const err = await res.text();
        throw new Error('JSONBin error ' + res.status + ': ' + err);
      }
      data = await res.json();
      const binId = data.metadata ? data.metadata.id : (data.record && data.record.meta && data.record.meta.cloudBinId);
      if (binId && !project.meta.cloudBinId) {
        project.meta.cloudBinId = binId;
        Storage.saveProject(project);
      }
      return { binId: project.meta.cloudBinId, url: Cloud.shareUrl(project.meta.cloudBinId) };
    },

    // Carga un proyecto desde un binId
    async loadFromCloud(binId) {
      const res = await fetch(this.BASE + '/b/' + binId + '/latest', {
        headers: { 'X-Access-Key': this._apiKey() }
      });
      if (!res.ok) throw new Error('No se pudo cargar el proyecto (bin: ' + binId + '). Verifica el link y tu API key.');
      const data = await res.json();
      return data.record; // el objeto proyecto completo
    },

    // Lista todos los bins del usuario (requiere API key)
    async listBins() {
      const res = await fetch(this.BASE + '/b', {
        headers: { 'X-Access-Key': this._apiKey() }
      });
      if (!res.ok) return [];
      const data = await res.json();
      return (data || []).filter(b => b.snippetMeta && b.snippetMeta.name &&
        b.snippetMeta.name.startsWith('PPM'));
    },

    shareUrl(binId) {
      if (!binId) return '';
      return window.location.origin + window.location.pathname + '?bin=' + binId;
    },

    // Al cargar la app, ¿hay ?bin= en la URL?
    binFromUrl() {
      try {
        return new URLSearchParams(window.location.search).get('bin');
      } catch(e) { return null; }
    }
  };

  async function cloudSave(project) {

    saveCurrentProject();

    if (!Cloud._apiKey()) {
      showToast('💾 Guardado local. Configura tu API key para sincronizar en la nube.');
      openCloudSettings();
      return;
    }
    const btn = document.getElementById('btn-cloud-save');
    if (btn) { btn.textContent = '☁️ Guardando…'; btn.disabled = true; }
    try {
      const result = await Cloud.saveToCloud(project);
      updateCloudUI(project);
      showToast('💾 Guardado local + ☁️ sincronizado en la nube.');
    } catch(err) {
      // El guardado local YA se hizo — la nube falló pero no hay pérdida de datos
      showToast('💾 Guardado local. Error en la nube: ' + err.message, 'warn');
      console.error('Cloud save error:', err);
    } finally {
      if (btn) { btn.textContent = '☁️ Guardar en nube'; btn.disabled = false; }

      let val = document.getElementById('cloud-direct-link').value.trim();
      if (!val) return;
      // Extraer binId del link si es URL completa
      try { val = new URL(val).searchParams.get('bin') || val; } catch(e) {}
      back.remove();
      _loadCloudProject(val);
    };
  }

  async function _loadCloudProject(binId) {
    showToast('☁️ Cargando proyecto…');
    try {
      const project = await Cloud.loadFromCloud(binId);
      if (!project || !project.meta) throw new Error('Formato inválido');
      // Guardar localmente y abrir
      project.meta.cloudBinId = binId;
      Storage.saveProject(project);
      currentProject = project;
      if (project.meta.escenarioActivo) currentScenario = project.meta.escenarioActivo;
      renderAll();
      updateCloudUI(project);
      showToast('✓ Proyecto "' + project.meta.nombre + '" cargado desde la nube.');
    } catch(err) {
      showToast('Error al cargar: ' + err.message, 'error');
    }
  }

  // Actualiza los indicadores visuales de la nube en la topbar
  function updateCloudUI(project) {
    const badge = document.getElementById('cloud-sync-badge');
    const linkBtn = document.getElementById('btn-cloud-link');
    if (!badge) return;
    if (project && project.meta && project.meta.cloudBinId) {
      badge.textContent = '☁️ En nube';
      badge.className = 'cloud-badge cloud-badge-ok';
      if (linkBtn) {
